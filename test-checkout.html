<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Checkout</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    input { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; background: #256B42; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    label { font-size: 13px; color: #444; }
    p { font-size: 13px; color: #888; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>Test Checkout</h2>
  <label>Your email</label>
  <input type="email" id="email" placeholder="you@example.com">
  <label>Test Price ID (from Stripe test mode)</label>
  <input type="text" id="priceId" placeholder="price_test_...">
  <button onclick="go()">Go to Test Checkout</button>
  <p>Use card 4242 4242 4242 4242, any future date, any CVC.</p>

  <script>
    async function go() {
      const email = document.getElementById('email').value;
      const priceId = document.getElementById('priceId').value;
      if (!email || !priceId) { alert('Fill in both fields'); return; }
      const r = await fetch('/api/test-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, priceId })
      });
      const d = await r.json();
      if (d.url) window.location.href = d.url;
      else alert(d.error);
    }
  </script>
</body>
</html>
