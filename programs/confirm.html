<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing You In — MiRAjO Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --warm-parchment: #EDE8DF;
      --p-dark: #1A1228;
      --p-light: #8B72C8;
      --p-silver: #C8C4DC;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--p-dark);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .confirm-card {
      text-align: center;
      max-width: 420px;
    }
    .confirm-logo {
      height: 80px;
      width: auto;
      margin: 0 auto 40px;
      display: block;
    }
    .confirm-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(139,114,200,0.2);
      border-top-color: var(--p-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .confirm-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--warm-parchment);
      margin-bottom: 12px;
    }
    .confirm-sub {
      font-size: 15px;
      color: var(--p-silver);
      line-height: 1.7;
    }
    .confirm-error {
      display: none;
      font-size: 14px;
      color: #E88080;
      margin-top: 20px;
      line-height: 1.6;
    }
    .confirm-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 13px;
      color: var(--p-light);
      text-decoration: none;
    }
    .confirm-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="confirm-card">
  <img src="/img/Where Authenticity is the new blue check (250 x 150 px) (800 x 312 px) (450 x 70 px) (Logo) (1).png" alt="MiRAjO" class="confirm-logo">
  <div class="confirm-spinner" id="spinner"></div>
  <h1 class="confirm-title" id="confirm-title">Signing you in...</h1>
  <p class="confirm-sub" id="confirm-sub">Just a moment while we verify your link.</p>
  <p class="confirm-error" id="confirm-error"></p>
  <a href="/programs/login" class="confirm-link" id="confirm-link" style="display:none">← Try logging in again</a>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabase = window.supabase.createClient(
    window.SUPABASE_URL,
    window.SUPABASE_ANON_KEY
  );

  async function handleConfirm() {
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', '?'));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const errorDesc = params.get('error_description');

    if (errorDesc) {
      showError(decodeURIComponent(errorDesc.replace(/\+/g, ' ')));
      return;
    }

    if (accessToken && refreshToken) {
      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });
      if (error) {
        showError('Your link has expired. Please request a new one.');
        return;
      }
      window.location.href = '/programs/dashboard';
      return;
    }

    // Try getSession fallback
    const { data: { session }, error } = await supabase.auth.getSession();
    if (session) {
      window.location.href = '/programs/dashboard';
    } else {
      showError('Your link has expired or is invalid. Please request a new one.');
    }
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('confirm-title').textContent = 'Link expired';
    document.getElementById('confirm-sub').textContent = '';
    document.getElementById('confirm-error').textContent = msg;
    document.getElementById('confirm-error').style.display = 'block';
    document.getElementById('confirm-link').style.display = 'inline-block';
  }

  handleConfirm();
</script>

</body>
</html>
