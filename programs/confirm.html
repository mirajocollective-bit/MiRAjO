<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing You In — MiRAjO Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest: #122012;
      --new-growth: #6DC48A;
      --warm-parchment: #F2EBD9;
      --text-muted-dark: #8FAA8A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--deep-forest);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .confirm-card {
      text-align: center;
      max-width: 420px;
    }
    .confirm-logo {
      height: 80px;
      width: auto;
      margin: 0 auto 40px;
      display: block;
    }
    .confirm-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(109,196,138,0.15);
      border-top-color: var(--new-growth);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .confirm-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--warm-parchment);
      margin-bottom: 12px;
    }
    .confirm-sub {
      font-size: 15px;
      color: var(--text-muted-dark);
      line-height: 1.7;
    }
    .confirm-error {
      display: none;
      font-size: 14px;
      color: #E88080;
      margin-top: 20px;
      line-height: 1.6;
    }
    .confirm-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 13px;
      color: var(--new-growth);
      text-decoration: none;
    }
    .confirm-link:hover { text-decoration: underline; }
    .resend-form {
      display: none;
      margin-top: 28px;
      text-align: left;
    }
    .resend-note {
      font-size: 13px;
      color: var(--text-muted-dark);
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .resend-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(242,235,217,0.06);
      border: 1px solid rgba(109,196,138,0.2);
      border-radius: 8px;
      font-size: 14px;
      color: var(--warm-parchment);
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .resend-input:focus { border-color: var(--new-growth); }
    .resend-input::placeholder { color: rgba(143,170,138,0.4); }
    .resend-btn {
      width: 100%;
      padding: 14px;
      background: var(--new-growth);
      color: var(--deep-forest);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.2s;
    }
    .resend-btn:hover { opacity: 0.88; }
    .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .resend-success {
      display: none;
      margin-top: 14px;
      font-size: 13px;
      color: var(--new-growth);
      line-height: 1.6;
    }
  </style>
  <!-- Site Analytics -->
  <script src="/analytics.js"></script>
</head>
<body>

<div class="confirm-card">
  <img src="/img/logo-horizontal.png" alt="MiRAjO" class="confirm-logo">
  <div class="confirm-spinner" id="spinner"></div>
  <h1 class="confirm-title" id="confirm-title">Signing you in...</h1>
  <p class="confirm-sub" id="confirm-sub">Just a moment while we verify your link.</p>
  <p class="confirm-error" id="confirm-error"></p>

  <!-- Set password form (shown when ?setup=1) -->
  <div id="set-password-section" style="display:none;margin-top:8px;text-align:left;">
    <input type="password" id="pw-input" class="resend-input" placeholder="New password (min 8 characters)" />
    <input type="password" id="pw-confirm" class="resend-input" placeholder="Confirm password" style="margin-top:10px;" />
    <button class="resend-btn" id="pw-btn" style="margin-top:10px;" onclick="setPassword()">Set Password &amp; Enter Course</button>
    <p id="pw-msg" style="display:none;margin-top:12px;font-size:13px;line-height:1.6;"></p>
  </div>

  <div class="resend-form" id="resend-form">
    <p class="resend-note">No stress — links expire after a short while. Enter your email below and we'll send a fresh one right now.</p>
    <input type="email" class="resend-input" id="resend-email" placeholder="Your email address" />
    <button class="resend-btn" id="resend-btn" onclick="resendLink()">Send a New Link</button>
    <p class="resend-success" id="resend-success">Done — check your inbox. The link is on its way.</p>
  </div>

  <a href="/programs/login" class="confirm-link" id="confirm-link" style="display:none">← Back to login</a>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  async function handleConfirm() {
    try {
    const db = window.supabase.createClient(
      window.SUPABASE_URL,
      window.SUPABASE_ANON_KEY
    );
    // Check for errors in hash or query string
    const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
    const queryParams = new URLSearchParams(window.location.search);

    const errorDesc = hashParams.get('error_description') || queryParams.get('error_description');
    if (errorDesc) {
      showError(decodeURIComponent(errorDesc.replace(/\+/g, ' ')));
      return;
    }

    // PKCE flow: ?code= in query string (Supabase JS v2 default)
    const code = queryParams.get('code');
    const isSetup = queryParams.get('setup') === '1';
    if (code) {
      const { error } = await db.auth.exchangeCodeForSession(code);
      if (error) {
        showError('Your link has expired. Please request a new one.');
        return;
      }
      if (isSetup) {
        // Show set-password form instead of redirecting
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('confirm-title').textContent = 'Set your password';
        document.getElementById('confirm-sub').textContent = 'Choose a password to use every time you log in.';
        document.getElementById('set-password-section').style.display = 'block';
        return;
      }
      window.location.href = '/programs/dashboard';
      return;
    }

    // Legacy implicit flow: #access_token in hash
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    if (accessToken && refreshToken) {
      const { error } = await db.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });
      if (error) {
        showError('Your link has expired. Please request a new one.');
        return;
      }
      window.location.href = '/programs/dashboard';
      return;
    }

    // Fallback: already have a session
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      window.location.href = '/programs/dashboard';
    } else {
      showError('Your link has expired or is invalid. Please request a new one.');
    }
    } catch (err) {
      showError('Something went wrong: ' + err.message);
    }
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('confirm-title').textContent = 'That link has expired';
    document.getElementById('confirm-sub').textContent = "These links are single-use and don't last long — totally normal. Let's get you a new one.";
    document.getElementById('confirm-error').textContent = '';
    document.getElementById('confirm-error').style.display = 'none';
    document.getElementById('resend-form').style.display = 'block';
    document.getElementById('confirm-link').style.display = 'inline-block';
  }

  async function setPassword() {
    const pw = document.getElementById('pw-input').value;
    const confirm = document.getElementById('pw-confirm').value;
    const btn = document.getElementById('pw-btn');
    const msg = document.getElementById('pw-msg');

    if (pw.length < 8) {
      msg.textContent = 'Password must be at least 8 characters.';
      msg.style.color = '#E88080';
      msg.style.display = 'block';
      return;
    }
    if (pw !== confirm) {
      msg.textContent = 'Passwords do not match.';
      msg.style.color = '#E88080';
      msg.style.display = 'block';
      return;
    }

    btn.textContent = 'Setting password...';
    btn.disabled = true;

    const { error } = await db.auth.updateUser({ password: pw });
    if (error) {
      msg.textContent = 'Something went wrong: ' + error.message;
      msg.style.color = '#E88080';
      msg.style.display = 'block';
      btn.textContent = 'Set Password & Enter Course';
      btn.disabled = false;
      return;
    }

    msg.textContent = 'Password set! Taking you to your course...';
    msg.style.color = 'var(--new-growth)';
    msg.style.display = 'block';
    setTimeout(() => { window.location.href = '/programs/dashboard'; }, 1200);
  }

  async function resendLink() {
    const emailInput = document.getElementById('resend-email');
    const btn = document.getElementById('resend-btn');
    const success = document.getElementById('resend-success');
    const email = emailInput.value.trim();
    if (!email) { emailInput.focus(); return; }

    btn.textContent = 'Sending...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      if (res.ok) {
        emailInput.style.display = 'none';
        btn.style.display = 'none';
        success.style.display = 'block';
      } else {
        btn.textContent = 'Try Again';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'Try Again';
      btn.disabled = false;
    }
  }

  handleConfirm().catch(err => {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('confirm-title').textContent = 'Something went wrong';
    document.getElementById('confirm-error').textContent = err.message;
    document.getElementById('confirm-error').style.display = 'block';
    document.getElementById('confirm-link').style.display = 'inline-block';
  });
</script>

<script src="/js/social-bar.js"></script>
</body>
</html>
