<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Dashboard — Couples in Entrepreneurship | MiRAjO</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:      #0D0D0D;
      --white:      #FFFFFF;
      --red:        #B82038;
      --red-lt:     #D43A56;
      --pink:       #E8547A;
      --pink-lt:    #F2899E;
      --pink-bg:    #FFF0F4;
      --gold:       #C4A245;
      --muted:      #666666;
      --muted-lt:   #999999;
      --border:     rgba(13,13,13,0.12);
      --green:      #2F8A5A;

      /* legacy aliases so any remaining references still resolve */
      --cie-dark:      #0D0D0D;
      --cie-crimson:   #B82038;
      --cie-crimson-lt:#D43A56;
      --cie-rose:      #E8547A;
      --cie-gold:      #C4A245;
      --cie-muted:     #666666;
      --cie-muted-lt:  #999999;
      --cie-border:    rgba(13,13,13,0.12);
      --cie-blush-lt:  #FFF0F4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      color: var(--black);
    }

    /* ═══ NAV ═══ */
    .dash-nav {
      background: var(--black);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dash-nav-logo img { height: 56px; width: auto; display: block; filter: brightness(0) invert(1); }
    .dash-nav-right { display: flex; align-items: center; gap: 20px; }
    .dash-nav-name { font-size: 13px; color: rgba(255,255,255,0.6); }
    .dash-logout {
      font-size: 12px;
      color: var(--white);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.2s;
    }
    .dash-logout:hover { background: rgba(255,255,255,0.18); }

    /* ═══ HEADER ═══ */
    .dash-header {
      background: var(--black);
      padding: 56px 40px 52px;
      border-bottom: 3px solid var(--red);
    }
    .dash-header-inner { max-width: 1100px; margin: 0 auto; }
    .dash-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--pink);
      font-weight: 600;
      margin-bottom: 14px;
    }
    .dash-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 400;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .dash-title em { color: var(--pink); font-style: italic; }
    .dash-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      line-height: 1.65;
      max-width: 560px;
    }

    /* Journey strip */
    .journey-strip {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      max-width: 680px;
    }
    .journey-step {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .journey-step:last-child { border-right: none; }
    .journey-step.active { background: rgba(232,84,122,0.12); }
    .journey-step.done { background: rgba(47,138,90,0.1); }
    .journey-num {
      width: 28px; height: 28px; min-width: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .journey-step.active .journey-num { background: var(--pink); border-color: var(--pink); color: #fff; }
    .journey-step.done .journey-num { background: var(--green); border-color: var(--green); color: #fff; }
    .journey-info {}
    .journey-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; margin-bottom: 2px; }
    .journey-step.active .journey-label { color: var(--pink-lt); }
    .journey-step.done .journey-label { color: rgba(47,138,90,0.9); }
    .journey-name { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 500; }

    /* ═══ CONTENT ═══ */
    .dash-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 52px 40px;
    }
    .section-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ═══ DIAGNOSTIC STATUS CARD ═══ */
    .diagnostic-card {
      background: var(--white);
      border: 1.5px solid var(--black);
      border-radius: 14px;
      padding: 36px 40px;
      margin-bottom: 40px;
    }
    .diagnostic-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .diagnostic-card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--black);
      margin-bottom: 6px;
    }
    .diagnostic-card-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 560px;
    }
    /* Domain pills on diagnostic card */
    .domain-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 20px 0 28px;
    }
    .domain-pill {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      color: var(--muted);
      background: #F5F5F5;
    }
    .domain-pill.done { background: var(--black); color: var(--white); border-color: var(--black); }
    .domain-pill.active { background: var(--red); color: var(--white); border-color: var(--red); }
    .partner-status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .partner-status-item {
      background: #F8F8F8;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .partner-status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-complete { background: var(--green); box-shadow: 0 0 6px rgba(47,138,90,0.4); }
    .dot-pending  { background: var(--red);   box-shadow: 0 0 6px rgba(184,32,56,0.4); }
    .dot-waiting  { background: #CCCCCC; }
    .partner-status-name { font-size: 14px; font-weight: 600; color: var(--black); margin-bottom: 2px; }
    .partner-status-label { font-size: 12px; color: var(--muted); }
    .diagnostic-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    .btn-gold {
      display: inline-block;
      padding: 13px 28px;
      background: var(--red);
      color: #ffffff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-gold:hover { background: var(--red-lt); transform: translateY(-1px); }
    .btn-outline {
      display: inline-block;
      padding: 12px 24px;
      background: transparent;
      color: var(--black);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid var(--border);
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: var(--black); }

    /* Report ready banner */
    .report-ready-banner {
      background: var(--black);
      border-radius: 14px;
      padding: 32px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .report-ready-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--pink);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .report-ready-title {
      font-family: 'Instrument Serif', serif;
      font-size: 24px;
      color: var(--white);
      font-weight: 400;
      margin-bottom: 6px;
    }
    .report-ready-sub { font-size: 14px; color: rgba(255,255,255,0.6); }
    .btn-green {
      display: inline-block;
      padding: 13px 28px;
      background: var(--pink);
      color: #ffffff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-green:hover { background: var(--pink-lt); transform: translateY(-1px); }

    /* ═══ MODULE GRID ═══ */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 56px;
    }
    .module-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 26px 26px 22px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
      overflow: hidden;
    }
    .module-card.unlocked:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(13,13,13,0.1);
      border-color: var(--black);
    }
    .module-card.locked {
      opacity: 0.4;
      cursor: not-allowed;
      background: #F8F8F8;
    }
    .module-card-top { display: flex; align-items: center; justify-content: space-between; }
    .module-card-num {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 700;
    }
    .module-domain-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 9px;
      border-radius: 12px;
      background: var(--pink-bg);
      color: var(--pink);
      border: 1px solid rgba(232,84,122,0.2);
    }
    .module-card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--black);
      line-height: 1.25;
    }
    .module-card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      flex: 1;
    }
    .module-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .module-card-status {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .status-locked   { color: var(--muted-lt); }
    .status-unlocked { color: var(--red); }
    .status-started  { color: var(--pink); }
    .status-complete { color: var(--green); }
    .module-progress-bar {
      height: 3px;
      background: #EEEEEE;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .module-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--pink));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Foundation module */
    .module-card.foundation {
      border-color: var(--black);
      border-width: 2px;
    }
    .module-card.foundation::before {
      content: 'START HERE';
      position: absolute;
      top: 14px; right: 14px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--white);
      font-weight: 700;
      background: var(--black);
      border-radius: 4px;
      padding: 4px 8px;
    }

    /* ═══ COACHING CTA ═══ */
    .coaching-cta {
      background: var(--black);
      border-radius: 14px;
      padding: 48px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }
    .coaching-cta-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--pink);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .coaching-cta-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 400;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .coaching-cta-title em { font-style: italic; color: var(--pink); }
    .coaching-cta-sub { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7; max-width: 460px; }

    /* ═══ SUPPORT ═══ */
    .support-strip {
      background: #F8F8F8;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }
    .support-strip-text { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .support-strip-text strong { color: var(--black); }
    .support-link { font-size: 14px; font-weight: 700; color: var(--red); text-decoration: none; white-space: nowrap; }
    .support-link:hover { color: var(--red-lt); }

    /* ═══ PROFILE BANNER ═══ */
    .profile-banner {
      background: var(--pink-bg);
      border: 1.5px solid rgba(232,84,122,0.3);
      border-radius: 12px;
      padding: 24px 32px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .profile-banner-text { flex: 1; min-width: 220px; }
    .profile-banner-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .profile-banner-title {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      color: var(--black);
      font-weight: 400;
      margin-bottom: 4px;
    }
    .profile-banner-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* ═══ INVITE BANNER ═══ */
    .invite-banner {
      background: var(--white);
      border: 1.5px solid var(--black);
      border-radius: 12px;
      padding: 32px 36px;
      margin-bottom: 36px;
      display: flex;
      align-items: flex-start;
      gap: 32px;
      flex-wrap: wrap;
    }
    .invite-banner-text { flex: 1; min-width: 220px; }
    .invite-banner-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .invite-banner-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--black);
      font-weight: 400;
      margin-bottom: 8px;
    }
    .invite-banner-sub { font-size: 13px; color: var(--muted); line-height: 1.65; }
    .invite-banner-form { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
    .invite-banner-form input[type="email"] {
      padding: 12px 16px;
      background: #F8F8F8;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--black);
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      width: 240px;
      transition: border-color 0.2s;
    }
    .invite-banner-form input:focus { border-color: var(--black); }
    .invite-banner-form input::placeholder { color: var(--muted-lt); }
    @media (max-width: 768px) {
      .invite-banner { flex-direction: column; padding: 24px; }
      .invite-banner-form { width: 100%; }
      .invite-banner-form input { width: 100%; }
      .invite-banner-form .btn-gold { width: 100%; text-align: center; }
    }

    /* ═══ LOADING ═══ */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(184,32,56,0.15);
      border-top-color: var(--cie-crimson);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 768px) {
      .dash-nav { padding: 14px 20px; }
      .dash-nav-logo img { height: 52px; }
      .dash-nav-name { display: none; }
      .dash-header { padding: 40px 24px 32px; }
      .dash-content { padding: 40px 24px; }
      .diagnostic-card { padding: 28px 24px; }
      .partner-status-grid { grid-template-columns: 1fr; }
      .modules-grid { grid-template-columns: 1fr; }
      .coaching-cta { padding: 32px 24px; }
      .coaching-cta .btn-gold { width: 100%; text-align: center; }
      .support-strip { flex-direction: column; align-items: flex-start; }
      .report-ready-banner { flex-direction: column; }
      .report-ready-banner .btn-green { width: 100%; text-align: center; }
    }
  </style>
  <!-- Site Analytics -->
  <script src="/analytics.js"></script>
</head>
<body>

<nav class="dash-nav">
  <a href="/programs/couples-dashboard" class="dash-nav-logo">
    <img src="/img/logo-horizontal.png" alt="MiRAjO">
  </a>
  <div class="dash-nav-right">
    <span class="dash-nav-name" id="user-name"></span>
    <button class="dash-logout" id="logout-btn">Sign Out</button>
  </div>
</nav>

<div class="dash-header">
  <div class="dash-header-inner">
    <div class="dash-eyebrow">Couples in Entrepreneurship</div>
    <h1 class="dash-title">Your <em>Partner Dashboard</em></h1>
    <p class="dash-sub">Track your diagnostic, view your Partnership Report, and work through your course together.</p>
    <div id="journey-strip-placeholder"></div>
  </div>
</div>

<div class="dash-content" id="main-content">
  <div class="loading"><div class="loading-spinner"></div></div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
let _currentUser = null;

const MODULES = [
  { num: 1, slug: 'the-cost-of-misalignment',  title: 'The Cost of Misalignment',  desc: 'Understand what misalignment is costing your business — and your relationship. Every couple starts here.', unlock_domain: null },
  { num: 2, slug: 'the-financial-playbook',     title: 'The Financial Playbook',     desc: 'Get aligned on money — personal, business, reinvestment, and what financial security means to both of you.', unlock_domain: 'finances' },
  { num: 3, slug: 'the-game-plan',              title: 'The Game Plan',              desc: 'Build a shared vision for where the business is going and how you\'ll get there — together.', unlock_domain: 'business' },
  { num: 4, slug: 'who-runs-what',              title: 'Who Runs What',              desc: 'Define roles, responsibilities, and how decisions get made — so nothing falls through the cracks.', unlock_domain: 'business' },
  { num: 5, slug: 'the-life-architecture',      title: 'The Life Architecture',      desc: 'Design a home life that supports the business without sacrificing the family.', unlock_domain: 'family' },
  { num: 6, slug: 'protect-what-you-built',     title: 'Protect What You Built',     desc: 'Strengthen intimacy, connection, and partnership — because the relationship is the foundation.', unlock_domain: 'relationship' },
  { num: 7, slug: 'getting-on-the-same-page',   title: 'Getting on the Same Page',   desc: 'Master communication and conflict — the skills that keep couples from letting business issues become relationship issues.', unlock_domain: 'relationship' },
  { num: 8, slug: 'the-win',                    title: 'The Win',                    desc: 'Celebrate how far you\'ve come. Reflect on what you\'ve built — together.', unlock_domain: null },
];

async function init() {
  let { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = '/programs/login'; return; }

  const { data: refreshed } = await db.auth.refreshSession();
  if (refreshed?.session) session = refreshed.session;

  const user = session.user;
  _currentUser = user;
  const firstName = user.user_metadata?.first_name || user.email;
  document.getElementById('user-name').textContent = firstName;

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await db.auth.signOut();
    window.location.href = '/programs/login';
  });

  await renderDashboard(user);
}

async function renderDashboard(user) {
  const content = document.getElementById('main-content');

  // Load couple record
  const { data: coupleRow } = await db
    .from('couples')
    .select('id, partner_a_user_id, partner_b_user_id')
    .or(`partner_a_user_id.eq.${user.id},partner_b_user_id.eq.${user.id}`)
    .single();

  if (!coupleRow) {
    content.innerHTML = errorState('No couple record found. Please contact support.', true);
    return;
  }

  const coupleId = coupleRow.id;
  const partnerId = user.id === coupleRow.partner_a_user_id ? coupleRow.partner_b_user_id : coupleRow.partner_a_user_id;

  // Load profile status
  const { data: profileRow } = await db
    .from('partner_profiles')
    .select('completed_at')
    .eq('user_id', user.id)
    .eq('couple_id', coupleId)
    .single();
  const profileComplete = !!profileRow?.completed_at;

  // Load diagnostic completion for both partners
  const { data: completions } = await db
    .from('diagnostic_completion')
    .select('user_id, completed_at')
    .eq('couple_id', coupleId);

  const myCompletion     = completions?.find(c => c.user_id === user.id);
  const partnerCompletion = completions?.find(c => c.user_id === partnerId);

  // Load partnership report
  const { data: report } = await db
    .from('partnership_reports')
    .select('id, generated_at, unlocked_domains')
    .eq('couple_id', coupleId)
    .single();

  // Load module progress for THIS user
  const { data: courseEnrollment } = await db
    .from('enrollments')
    .select('course_id, courses(id, slug)')
    .eq('user_id', user.id)
    .eq('courses.slug', 'couples-in-entrepreneurship')
    .single();

  let moduleProgress = {};
  if (courseEnrollment?.course_id) {
    const { data: progressRows } = await db
      .from('progress')
      .select('lesson_id, completed, lessons(module_id)')
      .eq('user_id', user.id)
      .eq('completed', true);

    // Group by module
    if (progressRows) {
      for (const row of progressRows) {
        const mid = row.lessons?.module_id;
        if (mid) moduleProgress[mid] = (moduleProgress[mid] || 0) + 1;
      }
    }
  }

  // Load modules with lesson counts
  const { data: dbModules } = await db
    .from('modules')
    .select('id, unlock_domain, position, lessons(count)')
    .eq('course_id', courseEnrollment?.course_id || '')
    .order('position');

  const unlockedDomains = report?.unlocked_domains || [];
  const reportReady     = !!report;
  const bothComplete    = !!(myCompletion && partnerCompletion);

  // Load how far through the diagnostic THIS user is (by domain)
  const { data: myAnswers } = await db
    .from('diagnostic_answers')
    .select('domain')
    .eq('couple_id', coupleId)
    .eq('user_id', user.id);
  const answeredDomains = new Set((myAnswers || []).map(a => a.domain));

  // Module 1 progress (for display only — no longer gates anything)
  const dbMod1             = dbModules?.find(m => m.position === 1);
  const mod1LessonCount    = dbMod1?.lessons?.[0]?.count || 0;
  const mod1CompletedCount = dbMod1 ? (moduleProgress[dbMod1.id] || 0) : 0;
  const mod1Complete       = mod1LessonCount > 0 && mod1CompletedCount >= mod1LessonCount;

  // Partner names
  const firstName  = (await db.auth.getUser()).data?.user?.user_metadata?.first_name || 'You';
  const partnerLabel = 'Your Partner';

  // ── JOURNEY STRIP ──
  const journeySteps = [
    { label: 'Step 1', name: 'Partner Profiles', done: profileComplete, active: !profileComplete },
    { label: 'Step 2', name: 'Diagnostic', done: !!myCompletion, active: profileComplete && !myCompletion },
    { label: 'Step 3', name: 'Course Path', done: reportReady, active: bothComplete && !reportReady },
  ];
  const journeyHtml = `<div class="journey-strip">${journeySteps.map(s => `
    <div class="journey-step${s.done ? ' done' : s.active ? ' active' : ''}">
      <div class="journey-num">${s.done ? '✓' : ''}</div>
      <div class="journey-info">
        <div class="journey-label">${s.label}</div>
        <div class="journey-name">${s.name}</div>
      </div>
    </div>`).join('')}</div>`;
  document.getElementById('journey-strip-placeholder').innerHTML = journeyHtml;

  let html = '';

  // ── PROFILE BANNER ──
  if (!profileComplete) {
    html += `<div class="profile-banner">
      <div class="profile-banner-text">
        <div class="profile-banner-label">Action Needed</div>
        <div class="profile-banner-title">Complete your individual profile</div>
        <div class="profile-banner-sub">Takes 5 minutes. Your profile adds real context to your Partnership Report and personalizes your experience.</div>
      </div>
      <a href="/programs/couples-profile" class="btn-gold" style="flex-shrink:0;">Build My Profile →</a>
    </div>`;
  }

  // ── INVITE BANNER (partner B not yet joined) ──
  const partnerLinked = !!coupleRow.partner_b_user_id;
  if (!partnerLinked) {
    html += `<div class="invite-banner" id="invite-banner">
      <div class="invite-banner-text">
        <div class="invite-banner-label">Partner Not Yet Joined</div>
        <div class="invite-banner-title">Invite your partner to get started</div>
        <div class="invite-banner-sub">The diagnostic, report, and most of the course require both partners. Enter their email below and we'll send them everything they need.<br><br><strong>You can start Module 1 now</strong> while you wait for them to accept the invite.</div>
      </div>
      <div class="invite-banner-form">
        <input type="email" id="invite-email-input" placeholder="partner@email.com">
        <button class="btn-gold" id="invite-send-btn" onclick="sendInvite()">Send Invite</button>
      </div>
      <div id="invite-msg" style="font-size:13px;margin-top:12px;display:none;"></div>
    </div>`;
  }

  // ── MODULE 1 FEATURED CARD ──
  html += `<div class="section-label">Start Here — The Foundation</div>`;
  const mod1 = MODULES[0];
  const mod1Pct = mod1LessonCount > 0 ? Math.round((mod1CompletedCount / mod1LessonCount) * 100) : 0;
  let mod1StatusHtml = '';
  if (mod1Pct === 100) {
    mod1StatusHtml = `<span class="module-card-status status-complete">&#10003; Complete</span>`;
  } else if (mod1Pct > 0) {
    mod1StatusHtml = `<span class="module-card-status status-started">${mod1Pct}% done</span>`;
  } else {
    mod1StatusHtml = `<span class="module-card-status status-unlocked">Ready to start</span>`;
  }
  html += `<a href="/programs/couples-course/${mod1.slug}" class="module-card unlocked foundation" style="margin-bottom:40px;max-width:520px;">
    <div class="module-card-top">
      <span class="module-card-num">Module 1</span>
    </div>
    <div class="module-card-title">${mod1.title}</div>
    <div class="module-card-desc">${mod1.desc}</div>
    <div class="module-card-footer">
      ${mod1StatusHtml}
      ${mod1LessonCount > 0 ? `<span style="font-size:11px;color:var(--muted);">${mod1CompletedCount}/${mod1LessonCount} lessons</span>` : ''}
    </div>
    ${mod1Pct > 0 ? `<div class="module-progress-bar"><div class="module-progress-fill" style="width:${mod1Pct}%"></div></div>` : ''}
  </a>`;

  // ── STEP 2 — DIAGNOSTIC CARD ──
  const domainPillsHtml = `<div class="domain-pills">
    ${['Business','Finances','Family','Relationship'].map(d => {
      const key = d.toLowerCase();
      const cls = myCompletion ? 'done' : answeredDomains.has(key) ? 'active' : '';
      return `<span class="domain-pill ${cls}">${d}</span>`;
    }).join('')}
  </div>`;

  html += `<div class="section-label" style="margin-top:8px;">Step 1 — The Partnership Diagnostic</div>`;
  html += `<div class="diagnostic-card">
    <div class="diagnostic-card-header">
      <div>
        <div class="diagnostic-card-title">The Partnership Diagnostic</div>
        <div class="diagnostic-card-sub">Each partner answers privately. You'll read real scenarios and choose how you see them — no right or wrong. When both are done, your Partnership Report generates automatically.</div>
      </div>
    </div>
    ${domainPillsHtml}
    <div class="partner-status-grid">
      <div class="partner-status-item">
        <div class="partner-status-dot ${myCompletion ? 'dot-complete' : 'dot-pending'}"></div>
        <div class="partner-status-info">
          <div class="partner-status-name">${firstName}</div>
          <div class="partner-status-label">${myCompletion ? 'Diagnostic complete' : answeredDomains.size > 0 ? `${answeredDomains.size} of 4 domains answered` : 'Not started yet'}</div>
        </div>
      </div>
      <div class="partner-status-item">
        <div class="partner-status-dot ${partnerCompletion ? 'dot-complete' : 'dot-waiting'}"></div>
        <div class="partner-status-info">
          <div class="partner-status-name">${partnerLabel}</div>
          <div class="partner-status-label">${partnerCompletion ? 'Diagnostic complete' : 'Waiting on their answers'}</div>
        </div>
      </div>
    </div>
    <div class="diagnostic-actions">
      ${!myCompletion
        ? profileComplete
          ? `<a href="/programs/couples-diagnostic" class="btn-gold">${answeredDomains.size > 0 ? 'Continue Diagnostic' : 'Take the Diagnostic'}</a>`
          : `<span class="btn-outline" style="cursor:default;opacity:0.6;">&#128274; Complete your profile first</span>`
        : `<span class="btn-outline" style="cursor:default;opacity:0.6;">&#10003; Diagnostic Complete</span>`
      }
      ${!myCompletion && !profileComplete
        ? `<span style="font-size:13px;color:var(--muted);line-height:1.5;">Complete your individual profile to unlock the diagnostic.</span>`
        : ''
      }
      ${myCompletion && !partnerCompletion
        ? `<span style="font-size:13px;color:var(--muted);line-height:1.5;">Waiting for your partner to finish theirs. You'll both get an email when the report is ready.</span>`
        : ''
      }
    </div>
  </div>`;

  // ── REPORT READY BANNER ──
  if (bothComplete && reportReady) {
    html += `<div class="report-ready-banner">
      <div class="report-ready-text">
        <div class="report-ready-label">Report Ready</div>
        <div class="report-ready-title">Your Partnership Report is ready to view</div>
        <div class="report-ready-sub">See where you're aligned, where the gaps are, and which modules are unlocked for your path.</div>
      </div>
      <a href="/programs/couples-report" class="btn-green">View Report</a>
    </div>`;
  }

  // ── STEP 3 — MODULES 2–8 ──
  const DOMAIN_LABELS = { business: 'Business', finances: 'Finances', family: 'Family', relationship: 'Relationship' };
  html += `<div class="section-label" style="margin-top:8px;">Step 2 — Your Course Path</div>`;
  html += `<div class="modules-grid">`;

  for (const mod of MODULES) {
    if (mod.num === 1) continue; // Module 1 is already shown above

    // Determine lock state
    let unlocked = false;
    if (mod.num === 8) unlocked = reportReady;
    else unlocked = reportReady && (unlockedDomains.includes(mod.unlock_domain) || unlockedDomains.includes('all'));

    // Match to DB module for progress
    const dbMod = dbModules?.find(m => m.position === mod.num);
    const lessonCount    = dbMod?.lessons?.[0]?.count || 0;
    const completedCount = dbMod ? (moduleProgress[dbMod.id] || 0) : 0;
    const pct = lessonCount > 0 ? Math.round((completedCount / lessonCount) * 100) : 0;

    let statusHtml = '';
    if (!unlocked) {
      statusHtml = `<span class="module-card-status status-locked">&#128274; Locked</span>`;
    } else if (pct === 100) {
      statusHtml = `<span class="module-card-status status-complete">&#10003; Complete</span>`;
    } else if (pct > 0) {
      statusHtml = `<span class="module-card-status status-started">${pct}% done</span>`;
    } else {
      statusHtml = `<span class="module-card-status status-unlocked">Unlocked</span>`;
    }

    const domainLabel = mod.unlock_domain ? DOMAIN_LABELS[mod.unlock_domain] : null;
    const cardClass   = `module-card${unlocked ? ' unlocked' : ' locked'}`;
    const cardTag     = unlocked ? `a href="/programs/couples-course/${mod.slug}"` : 'div';

    html += `<${cardTag} class="${cardClass}">
      <div class="module-card-top">
        <span class="module-card-num">Module ${mod.num}</span>
        ${domainLabel ? `<span class="module-domain-tag">${domainLabel}</span>` : ''}
      </div>
      <div class="module-card-title">${mod.title}</div>
      <div class="module-card-desc">${mod.desc}</div>
      <div class="module-card-footer">
        ${statusHtml}
        ${unlocked && lessonCount > 0 ? `<span style="font-size:11px;color:var(--muted);">${completedCount}/${lessonCount} lessons</span>` : ''}
      </div>
      ${unlocked && pct > 0 ? `<div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%"></div></div>` : ''}
    </${cardTag === 'div' ? 'div' : 'a'}>`;
  }

  html += `</div>`;

  // ── COACHING CTA ──
  html += `<div class="coaching-cta">
    <div>
      <div class="coaching-cta-eyebrow">Go Further</div>
      <h2 class="coaching-cta-title">Want to work with <em>Miranda</em> directly?</h2>
      <p class="coaching-cta-sub">Private coaching is available for couples who want hands-on support — working through your specific gaps with someone who's been in the room.</p>
    </div>
    <a href="https://www.mirajoco.org/coaching" class="btn-gold">Explore Coaching</a>
  </div>`;

  // ── SUPPORT ──
  html += `<div class="support-strip">
    <p class="support-strip-text"><strong>Need help with your account or course access?</strong> We're here for you.</p>
    <a href="mailto:programs@mirajoco.org" class="support-link">programs@mirajoco.org →</a>
  </div>`;

  content.innerHTML = html;
}

async function sendInvite() {
  const input = document.getElementById('invite-email-input');
  const btn   = document.getElementById('invite-send-btn');
  const msg   = document.getElementById('invite-msg');
  const email = input?.value?.trim();

  if (!email || !email.includes('@')) {
    msg.style.display = 'block';
    msg.style.color   = '#E07070';
    msg.textContent   = 'Please enter a valid email address.';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Sending…';
  msg.style.display = 'none';

  try {
    const firstName = _currentUser?.user_metadata?.first_name || '';
    const resp = await fetch('/api/couples-invite', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        partner_a_user_id:    _currentUser?.id,
        partner_b_email:      email,
        partner_a_first_name: firstName,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to send invite');

    msg.style.display = 'block';
    msg.style.color   = '#5DBE8A';
    msg.textContent   = `Invite sent to ${email}. They'll receive an email with their login link.`;
    input.value = '';
    btn.textContent = 'Sent!';
  } catch (err) {
    msg.style.display = 'block';
    msg.style.color   = '#E07070';
    msg.textContent   = err.message || 'Something went wrong. Please try again.';
    btn.disabled    = false;
    btn.textContent = 'Send Invite';
  }
}

function errorState(msg, showSupport = false) {
  return `<div style="text-align:center;padding:80px 40px;">
    <p style="font-family:'Instrument Serif',serif;font-size:26px;color:var(--black);margin-bottom:12px;">Something went wrong</p>
    <p style="font-size:14px;color:var(--muted);margin-bottom:${showSupport ? '24px' : '0'}">${msg}</p>
    ${showSupport ? `<a href="mailto:programs@mirajoco.org" style="font-size:14px;color:var(--red);">programs@mirajoco.org</a>` : ''}
  </div>`;
}

init();
</script>

<script src="/js/social-bar.js"></script>
