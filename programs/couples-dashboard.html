<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Dashboard — Couples in Entrepreneurship | MiRAjO</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cie-dark:      #14090F;
      --cie-plum:      #1E0F1C;
      --cie-plum-dark: #2A0A14;
      --cie-crimson:   #B82038;
      --cie-crimson-lt:#D43A56;
      --cie-rose:      #D4607A;
      --cie-rose-lt:   #E8879A;
      --cie-blush:     #FBE8EE;
      --cie-blush-lt:  #FDF3F6;
      --cie-gold:      #C4A245;
      --cie-gold-lt:   #D9B96A;
      --cie-cream:     #FDF6F8;
      --cie-warm:      #F2E4E8;
      --cie-muted:     #7A6B74;
      --cie-muted-lt:  #B8A0A8;
      --cie-border:    rgba(184,32,56,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--cie-blush-lt);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      color: var(--cie-dark);
    }

    /* ═══ NAV ═══ */
    .dash-nav {
      background: #ffffff;
      border-bottom: 1px solid var(--cie-border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dash-nav-logo img { height: 72px; width: auto; display: block; }
    .dash-nav-right { display: flex; align-items: center; gap: 20px; }
    .dash-nav-name { font-size: 13px; color: var(--cie-muted); }
    .dash-logout {
      font-size: 12px;
      color: var(--cie-crimson);
      background: rgba(184,32,56,0.06);
      border: 1px solid var(--cie-border);
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.2s;
    }
    .dash-logout:hover { background: rgba(184,32,56,0.12); color: var(--cie-crimson-lt); }

    /* ═══ HEADER ═══ */
    .dash-header {
      background: linear-gradient(180deg, var(--cie-blush) 0%, var(--cie-blush-lt) 100%);
      border-bottom: 1px solid var(--cie-border);
      padding: 56px 40px 48px;
    }
    .dash-header-inner { max-width: 1100px; margin: 0 auto; }
    .dash-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .dash-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 400;
      color: var(--cie-dark);
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .dash-title em { color: var(--cie-crimson); font-style: italic; }
    .dash-sub {
      font-size: 15px;
      color: var(--cie-muted);
      line-height: 1.6;
      max-width: 560px;
    }

    /* ═══ CONTENT ═══ */
    .dash-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 40px;
    }
    .section-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 600;
      margin-bottom: 24px;
    }

    /* ═══ DIAGNOSTIC STATUS CARD ═══ */
    .diagnostic-card {
      background: #ffffff;
      border: 1px solid var(--cie-border);
      border-radius: 16px;
      padding: 36px 40px;
      margin-bottom: 48px;
      box-shadow: 0 2px 20px rgba(184,32,56,0.06);
    }
    .diagnostic-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .diagnostic-card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--cie-dark);
      margin-bottom: 6px;
    }
    .diagnostic-card-sub {
      font-size: 14px;
      color: #4A3A42;
      line-height: 1.6;
      max-width: 480px;
    }
    .partner-status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .partner-status-item {
      background: var(--cie-blush-lt);
      border: 1px solid var(--cie-border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .partner-status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-complete { background: #3A8A5A; box-shadow: 0 0 8px rgba(58,138,90,0.3); }
    .dot-pending  { background: var(--cie-crimson); box-shadow: 0 0 8px rgba(184,32,56,0.3); }
    .dot-waiting  { background: rgba(122,107,116,0.3); }
    .partner-status-info {}
    .partner-status-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--cie-dark);
      margin-bottom: 3px;
    }
    .partner-status-label {
      font-size: 12px;
      color: #5A4850;
      letter-spacing: 0.5px;
    }
    .diagnostic-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .btn-gold {
      display: inline-block;
      padding: 13px 28px;
      background: var(--cie-crimson);
      color: #ffffff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background 0.2s, transform 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-gold:hover { background: var(--cie-crimson-lt); transform: translateY(-1px); }
    .btn-outline {
      display: inline-block;
      padding: 13px 28px;
      background: transparent;
      color: var(--cie-crimson);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--cie-border);
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(184,32,56,0.06); border-color: var(--cie-crimson); }

    /* Both complete → report banner */
    .report-ready-banner {
      background: linear-gradient(135deg, #F0FAF4 0%, #E6F5EC 100%);
      border: 1px solid rgba(58,138,90,0.3);
      border-radius: 14px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .report-ready-text {}
    .report-ready-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #3A8A5A;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .report-ready-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--cie-dark);
      font-weight: 400;
      margin-bottom: 6px;
    }
    .report-ready-sub {
      font-size: 14px;
      color: var(--cie-muted);
    }
    .btn-green {
      display: inline-block;
      padding: 13px 28px;
      background: #3A8A5A;
      color: #ffffff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-green:hover { background: #4AA06A; transform: translateY(-1px); }

    /* ═══ MODULE GRID ═══ */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 64px;
    }
    .module-card {
      background: #ffffff;
      border: 1px solid var(--cie-border);
      border-radius: 14px;
      padding: 28px 28px 24px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .module-card.unlocked:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(184,32,56,0.12);
      border-color: rgba(184,32,56,0.3);
    }
    .module-card.locked {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .module-card-num {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 600;
    }
    .module-card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--cie-dark);
      line-height: 1.25;
    }
    .module-card-desc {
      font-size: 13px;
      color: #4A3A42;
      line-height: 1.6;
      flex: 1;
    }
    .module-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--cie-border);
      margin-top: auto;
    }
    .module-card-status {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-locked { color: var(--cie-muted-lt); }
    .status-unlocked { color: var(--cie-crimson); }
    .status-started { color: var(--cie-rose); }
    .status-complete { color: #3A8A5A; }
    .module-progress-bar {
      height: 3px;
      background: rgba(184,32,56,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .module-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cie-crimson), var(--cie-rose));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Foundation module (always unlocked) */
    .module-card.foundation {
      border-color: rgba(184,32,56,0.25);
      background: linear-gradient(135deg, #ffffff 0%, var(--cie-blush-lt) 100%);
    }
    .module-card.foundation::before {
      content: 'START HERE';
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cie-crimson);
      font-weight: 700;
      background: rgba(184,32,56,0.08);
      border: 1px solid rgba(184,32,56,0.2);
      border-radius: 4px;
      padding: 4px 8px;
    }

    /* ═══ COACHING CTA ═══ */
    .coaching-cta {
      background: linear-gradient(135deg, #2A0A14 0%, #1A0509 100%);
      border: 1px solid rgba(184,32,56,0.3);
      border-radius: 16px;
      padding: 48px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 64px;
      flex-wrap: wrap;
    }
    .coaching-cta-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cie-gold);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .coaching-cta-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 400;
      color: var(--cie-cream);
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .coaching-cta-title em { font-style: italic; color: var(--cie-gold); }
    .coaching-cta-sub { font-size: 14px; color: rgba(253,246,248,0.7); line-height: 1.7; max-width: 460px; }

    /* ═══ SUPPORT ═══ */
    .support-strip {
      background: #ffffff;
      border: 1px solid var(--cie-border);
      border-radius: 14px;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 64px;
      flex-wrap: wrap;
    }
    .support-strip-text { font-size: 14px; color: var(--cie-muted); line-height: 1.6; }
    .support-strip-text strong { color: var(--cie-dark); }
    .support-link { font-size: 14px; font-weight: 600; color: var(--cie-crimson); text-decoration: none; white-space: nowrap; }
    .support-link:hover { color: var(--cie-crimson-lt); }

    /* ═══ INVITE BANNER ═══ */
    .invite-banner {
      background: #ffffff;
      border: 1px solid rgba(184,32,56,0.25);
      border-radius: 16px;
      padding: 32px 36px;
      margin-bottom: 40px;
      display: flex;
      align-items: flex-start;
      gap: 32px;
      flex-wrap: wrap;
      box-shadow: 0 2px 20px rgba(184,32,56,0.06);
    }
    .invite-banner-text { flex: 1; min-width: 220px; }
    .invite-banner-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .invite-banner-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--cie-dark);
      font-weight: 400;
      margin-bottom: 8px;
    }
    .invite-banner-sub {
      font-size: 13px;
      color: var(--cie-muted);
      line-height: 1.65;
    }
    .invite-banner-form {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .invite-banner-form input[type="email"] {
      padding: 12px 16px;
      background: var(--cie-blush-lt);
      border: 1px solid var(--cie-border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--cie-dark);
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      width: 240px;
      transition: border-color 0.2s;
    }
    .invite-banner-form input:focus { border-color: var(--cie-crimson); }
    .invite-banner-form input::placeholder { color: var(--cie-muted-lt); }
    @media (max-width: 768px) {
      .invite-banner { flex-direction: column; padding: 24px; }
      .invite-banner-form { width: 100%; }
      .invite-banner-form input { width: 100%; }
      .invite-banner-form .btn-gold { width: 100%; text-align: center; }
    }

    /* ═══ LOADING ═══ */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(184,32,56,0.15);
      border-top-color: var(--cie-crimson);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 768px) {
      .dash-nav { padding: 14px 20px; }
      .dash-nav-logo img { height: 52px; }
      .dash-nav-name { display: none; }
      .dash-header { padding: 40px 24px 32px; }
      .dash-content { padding: 40px 24px; }
      .diagnostic-card { padding: 28px 24px; }
      .partner-status-grid { grid-template-columns: 1fr; }
      .modules-grid { grid-template-columns: 1fr; }
      .coaching-cta { padding: 32px 24px; }
      .coaching-cta .btn-gold { width: 100%; text-align: center; }
      .support-strip { flex-direction: column; align-items: flex-start; }
      .report-ready-banner { flex-direction: column; }
      .report-ready-banner .btn-green { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<nav class="dash-nav">
  <a href="/programs/couples-dashboard" class="dash-nav-logo">
    <img src="/img/Where Authenticity is the new blue check (250 x 150 px) (800 x 312 px) (450 x 70 px) (Logo) (1).png" alt="MiRAjO">
  </a>
  <div class="dash-nav-right">
    <span class="dash-nav-name" id="user-name"></span>
    <button class="dash-logout" id="logout-btn">Sign Out</button>
  </div>
</nav>

<div class="dash-header">
  <div class="dash-header-inner">
    <div class="dash-eyebrow">Couples in Entrepreneurship</div>
    <h1 class="dash-title">Your <em>Partner Dashboard</em></h1>
    <p class="dash-sub">Track your diagnostic, view your Partnership Report, and work through your course together.</p>
  </div>
</div>

<div class="dash-content" id="main-content">
  <div class="loading"><div class="loading-spinner"></div></div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
let _currentUser = null;

const MODULES = [
  { num: 1, slug: 'the-cost-of-misalignment',  title: 'The Cost of Misalignment',  desc: 'Understand what misalignment is costing your business — and your relationship. Every couple starts here.', unlock_domain: null },
  { num: 2, slug: 'the-financial-playbook',     title: 'The Financial Playbook',     desc: 'Get aligned on money — personal, business, reinvestment, and what financial security means to both of you.', unlock_domain: 'finances' },
  { num: 3, slug: 'the-game-plan',              title: 'The Game Plan',              desc: 'Build a shared vision for where the business is going and how you\'ll get there — together.', unlock_domain: 'business' },
  { num: 4, slug: 'who-runs-what',              title: 'Who Runs What',              desc: 'Define roles, responsibilities, and how decisions get made — so nothing falls through the cracks.', unlock_domain: 'business' },
  { num: 5, slug: 'the-life-architecture',      title: 'The Life Architecture',      desc: 'Design a home life that supports the business without sacrificing the family.', unlock_domain: 'family' },
  { num: 6, slug: 'protect-what-you-built',     title: 'Protect What You Built',     desc: 'Strengthen intimacy, connection, and partnership — because the relationship is the foundation.', unlock_domain: 'relationship' },
  { num: 7, slug: 'getting-on-the-same-page',   title: 'Getting on the Same Page',   desc: 'Master communication and conflict — the skills that keep couples from letting business issues become relationship issues.', unlock_domain: 'relationship' },
  { num: 8, slug: 'the-win',                    title: 'The Win',                    desc: 'Celebrate how far you\'ve come. Reflect on what you\'ve built — together.', unlock_domain: null },
];

async function init() {
  let { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = '/programs/login'; return; }

  const { data: refreshed } = await db.auth.refreshSession();
  if (refreshed?.session) session = refreshed.session;

  const user = session.user;
  _currentUser = user;
  const firstName = user.user_metadata?.first_name || user.email;
  document.getElementById('user-name').textContent = firstName;

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await db.auth.signOut();
    window.location.href = '/programs/login';
  });

  await renderDashboard(user);
}

async function renderDashboard(user) {
  const content = document.getElementById('main-content');

  // Load couple record
  const { data: coupleRow } = await db
    .from('couples')
    .select('id, partner_a_user_id, partner_b_user_id')
    .or(`partner_a_user_id.eq.${user.id},partner_b_user_id.eq.${user.id}`)
    .single();

  if (!coupleRow) {
    content.innerHTML = errorState('No couple record found. Please contact support.', true);
    return;
  }

  const coupleId = coupleRow.id;
  const partnerId = user.id === coupleRow.partner_a_user_id ? coupleRow.partner_b_user_id : coupleRow.partner_a_user_id;

  // Load diagnostic completion for both partners
  const { data: completions } = await db
    .from('diagnostic_completion')
    .select('user_id, completed_at')
    .eq('couple_id', coupleId);

  const myCompletion     = completions?.find(c => c.user_id === user.id);
  const partnerCompletion = completions?.find(c => c.user_id === partnerId);

  // Load partnership report
  const { data: report } = await db
    .from('partnership_reports')
    .select('id, generated_at, unlocked_domains')
    .eq('couple_id', coupleId)
    .single();

  // Load module progress for THIS user
  const { data: courseEnrollment } = await db
    .from('enrollments')
    .select('course_id, courses(id, slug)')
    .eq('user_id', user.id)
    .eq('courses.slug', 'couples-in-entrepreneurship')
    .single();

  let moduleProgress = {};
  if (courseEnrollment?.course_id) {
    const { data: progressRows } = await db
      .from('progress')
      .select('lesson_id, completed, lessons(module_id)')
      .eq('user_id', user.id)
      .eq('completed', true);

    // Group by module
    if (progressRows) {
      for (const row of progressRows) {
        const mid = row.lessons?.module_id;
        if (mid) moduleProgress[mid] = (moduleProgress[mid] || 0) + 1;
      }
    }
  }

  // Load modules with lesson counts
  const { data: dbModules } = await db
    .from('modules')
    .select('id, unlock_domain, position, lessons(count)')
    .eq('course_id', courseEnrollment?.course_id || '')
    .order('position');

  const unlockedDomains = report?.unlocked_domains || [];
  const reportReady     = !!report;
  const bothComplete    = !!(myCompletion && partnerCompletion);

  // Partner names
  const firstName  = (await db.auth.getUser()).data?.user?.user_metadata?.first_name || 'You';
  const partnerLabel = 'Your Partner';

  let html = '';

  // ── INVITE BANNER (partner B not yet joined) ──
  const partnerLinked = !!coupleRow.partner_b_user_id;
  if (!partnerLinked) {
    html += `<div class="invite-banner" id="invite-banner">
      <div class="invite-banner-text">
        <div class="invite-banner-label">Partner Not Yet Joined</div>
        <div class="invite-banner-title">Invite your partner to get started</div>
        <div class="invite-banner-sub">The diagnostic, report, and course all require both partners. Enter their email below and we'll send them everything they need.</div>
      </div>
      <div class="invite-banner-form">
        <input type="email" id="invite-email-input" placeholder="partner@email.com">
        <button class="btn-gold" id="invite-send-btn" onclick="sendInvite()">Send Invite</button>
      </div>
      <div id="invite-msg" style="font-size:13px;margin-top:12px;display:none;"></div>
    </div>`;
  }

  // ── DIAGNOSTIC STATUS CARD ──
  html += `<div class="section-label">Step 1 — The Partnership Diagnostic</div>`;
  html += `<div class="diagnostic-card">
    <div class="diagnostic-card-header">
      <div>
        <div class="diagnostic-card-title">The Partnership Diagnostic</div>
        <div class="diagnostic-card-sub">Each partner answers privately. When both are done, your Partnership Report generates automatically — showing where you're aligned and where to focus.</div>
      </div>
    </div>
    <div class="partner-status-grid">
      <div class="partner-status-item">
        <div class="partner-status-dot ${myCompletion ? 'dot-complete' : 'dot-pending'}"></div>
        <div class="partner-status-info">
          <div class="partner-status-name">${firstName}</div>
          <div class="partner-status-label">${myCompletion ? 'Diagnostic complete' : 'Not started yet'}</div>
        </div>
      </div>
      <div class="partner-status-item">
        <div class="partner-status-dot ${partnerCompletion ? 'dot-complete' : 'dot-waiting'}"></div>
        <div class="partner-status-info">
          <div class="partner-status-name">${partnerLabel}</div>
          <div class="partner-status-label">${partnerCompletion ? 'Diagnostic complete' : 'Waiting on their answers'}</div>
        </div>
      </div>
    </div>
    <div class="diagnostic-actions">
      ${!myCompletion
        ? `<a href="/programs/couples-diagnostic" class="btn-gold">Take the Diagnostic</a>`
        : `<span class="btn-outline" style="cursor:default;opacity:0.6;">Diagnostic Complete</span>`
      }
      ${myCompletion && !partnerCompletion
        ? `<span style="font-size:13px;color:var(--cie-muted);line-height:1.5;">Waiting for your partner to complete theirs. We'll email you both when the report is ready.</span>`
        : ''
      }
    </div>
  </div>`;

  // ── REPORT READY BANNER ──
  if (bothComplete && reportReady) {
    html += `<div class="report-ready-banner">
      <div class="report-ready-text">
        <div class="report-ready-label">Report Ready</div>
        <div class="report-ready-title">Your Partnership Report is ready to view</div>
        <div class="report-ready-sub">See where you're aligned, where the gaps are, and which modules are unlocked for your path.</div>
      </div>
      <a href="/programs/couples-report" class="btn-green">View Report</a>
    </div>`;
  }

  // ── MODULES ──
  html += `<div class="section-label" style="margin-top:8px;">Step 2 — Your Course Path</div>`;
  html += `<div class="modules-grid">`;

  for (const mod of MODULES) {
    // Determine lock state
    let unlocked = false;
    if (mod.num === 1) unlocked = true; // foundation always open
    else if (mod.num === 8) unlocked = reportReady; // The Win unlocks when report exists
    else unlocked = reportReady && (unlockedDomains.includes(mod.unlock_domain) || unlockedDomains.includes('all'));

    // Match to DB module for progress
    const dbMod = dbModules?.find(m => m.position === mod.num);
    const lessonCount = dbMod?.lessons?.[0]?.count || 0;
    const completedCount = dbMod ? (moduleProgress[dbMod.id] || 0) : 0;
    const pct = lessonCount > 0 ? Math.round((completedCount / lessonCount) * 100) : 0;

    let statusHtml = '';
    let statusClass = '';
    if (!unlocked) {
      statusHtml = `<span class="module-card-status status-locked">&#128274; Locked</span>`;
    } else if (pct === 100) {
      statusHtml = `<span class="module-card-status status-complete">&#10003; Complete</span>`;
    } else if (pct > 0) {
      statusHtml = `<span class="module-card-status status-started">${pct}% done</span>`;
    } else {
      statusHtml = `<span class="module-card-status status-unlocked">Unlocked</span>`;
    }

    const cardClass = `module-card${unlocked ? ' unlocked' : ' locked'}${mod.num === 1 ? ' foundation' : ''}`;
    const cardTag   = unlocked ? `a href="/programs/couples-course/${mod.slug}"` : 'div';

    html += `<${cardTag} class="${cardClass}">
      <div class="module-card-num">Module ${mod.num}</div>
      <div class="module-card-title">${mod.title}</div>
      <div class="module-card-desc">${mod.desc}</div>
      <div class="module-card-footer">
        ${statusHtml}
        ${unlocked && lessonCount > 0 ? `<span style="font-size:11px;color:var(--cie-muted);">${completedCount}/${lessonCount} lessons</span>` : ''}
      </div>
      ${unlocked && pct > 0 ? `<div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%"></div></div>` : ''}
    </${cardTag === 'div' ? 'div' : 'a'}>`;
  }

  html += `</div>`;

  // ── COACHING CTA ──
  html += `<div class="coaching-cta">
    <div>
      <div class="coaching-cta-eyebrow">Go Further</div>
      <h2 class="coaching-cta-title">Want to work with <em>Miranda</em> directly?</h2>
      <p class="coaching-cta-sub">Private coaching is available for couples who want hands-on support — working through your specific gaps with someone who's been in the room.</p>
    </div>
    <a href="https://www.mirajoco.org/coaching" class="btn-gold">Explore Coaching</a>
  </div>`;

  // ── SUPPORT ──
  html += `<div class="support-strip">
    <p class="support-strip-text"><strong>Need help with your account or course access?</strong> We're here for you.</p>
    <a href="mailto:programs@mirajoco.org" class="support-link">programs@mirajoco.org →</a>
  </div>`;

  content.innerHTML = html;
}

async function sendInvite() {
  const input = document.getElementById('invite-email-input');
  const btn   = document.getElementById('invite-send-btn');
  const msg   = document.getElementById('invite-msg');
  const email = input?.value?.trim();

  if (!email || !email.includes('@')) {
    msg.style.display = 'block';
    msg.style.color   = '#E07070';
    msg.textContent   = 'Please enter a valid email address.';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Sending…';
  msg.style.display = 'none';

  try {
    const firstName = _currentUser?.user_metadata?.first_name || '';
    const resp = await fetch('/api/couples-invite', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        partner_a_user_id:    _currentUser?.id,
        partner_b_email:      email,
        partner_a_first_name: firstName,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to send invite');

    msg.style.display = 'block';
    msg.style.color   = '#5DBE8A';
    msg.textContent   = `Invite sent to ${email}. They'll receive an email with their login link.`;
    input.value = '';
    btn.textContent = 'Sent!';
  } catch (err) {
    msg.style.display = 'block';
    msg.style.color   = '#E07070';
    msg.textContent   = err.message || 'Something went wrong. Please try again.';
    btn.disabled    = false;
    btn.textContent = 'Send Invite';
  }
}

function errorState(msg, showSupport = false) {
  return `<div style="text-align:center;padding:80px 40px;">
    <p style="font-family:'Instrument Serif',serif;font-size:26px;color:var(--cie-cream);margin-bottom:12px;">Something went wrong</p>
    <p style="font-size:14px;color:var(--cie-muted);margin-bottom:${showSupport ? '24px' : '0'}">${msg}</p>
    ${showSupport ? `<a href="mailto:programs@mirajoco.org" style="font-size:14px;color:var(--cie-gold);">programs@mirajoco.org</a>` : ''}
  </div>`;
}

init();
</script>
