<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Partnership Diagnostic — Couples in Entrepreneurship | MiRAjO</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cie-dark:      #14090F;
      --cie-crimson:   #B82038;
      --cie-crimson-lt:#D43A56;
      --cie-rose:      #D4607A;
      --cie-blush:     #FBE8EE;
      --cie-blush-lt:  #FDF3F6;
      --cie-gold:      #C4A245;
      --cie-gold-lt:   #D9B96A;
      --cie-muted:     #7A6B74;
      --cie-border:    rgba(184,32,56,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--cie-blush-lt); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; color: var(--cie-dark); }

    /* NAV */
    .top-bar { background: #fff; border-bottom: 1px solid var(--cie-border); padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .top-bar-logo img { height: 52px; width: auto; }
    .top-bar-right { display: flex; align-items: center; gap: 16px; }
    .top-bar-name { font-size: 13px; color: var(--cie-muted); }
    .top-bar-exit { font-size: 12px; color: var(--cie-crimson); background: rgba(184,32,56,0.06); border: 1px solid var(--cie-border); border-radius: 6px; padding: 8px 16px; text-decoration: none; }

    /* DOMAIN STEPS */
    .domain-steps { background: #fff; border-bottom: 1px solid var(--cie-border); padding: 0 40px; }
    .domain-steps-inner { max-width: 800px; margin: 0 auto; display: flex; }
    .domain-step { flex: 1; padding: 14px 0; text-align: center; border-bottom: 3px solid transparent; transition: border-color 0.2s; }
    .domain-step.active { border-bottom-color: var(--cie-crimson); }
    .domain-step.done { border-bottom-color: rgba(93,190,138,0.6); }
    .domain-step-num { font-size: 11px; font-weight: 700; color: var(--cie-muted); letter-spacing: 1px; }
    .domain-step.active .domain-step-num { color: var(--cie-crimson); }
    .domain-step.done .domain-step-num { color: #5DBE8A; }
    .domain-step-name { font-size: 12px; color: var(--cie-muted); margin-top: 2px; }
    .domain-step.active .domain-step-name { color: var(--cie-dark); font-weight: 600; }

    /* MAIN */
    .main { max-width: 800px; margin: 0 auto; padding: 48px 40px 80px; }

    /* INTRO */
    .intro-eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--cie-crimson); font-weight: 700; margin-bottom: 16px; }
    .intro-title { font-family: 'Instrument Serif', serif; font-size: clamp(28px, 4vw, 42px); color: var(--cie-dark); line-height: 1.2; margin-bottom: 20px; }
    .intro-body { font-size: 15px; color: var(--cie-muted); line-height: 1.8; margin-bottom: 16px; }
    .intro-note { background: rgba(184,32,56,0.05); border: 1px solid var(--cie-border); border-radius: 10px; padding: 16px 20px; font-size: 14px; color: var(--cie-muted); line-height: 1.7; margin-bottom: 32px; }
    .intro-note strong { color: var(--cie-dark); }

    /* DOMAIN HEADER */
    .domain-eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--cie-crimson); font-weight: 700; margin-bottom: 12px; }
    .domain-title { font-family: 'Instrument Serif', serif; font-size: clamp(24px, 3.5vw, 36px); color: var(--cie-dark); margin-bottom: 10px; }
    .domain-intro { font-size: 14px; color: var(--cie-muted); line-height: 1.7; margin-bottom: 36px; }

    /* SCENARIO CARD */
    .scenario-card { background: #fff; border: 1px solid var(--cie-border); border-radius: 12px; padding: 28px; margin-bottom: 20px; transition: border-color 0.2s; }
    .scenario-card.answered { border-color: rgba(184,32,56,0.35); }
    .scenario-story { font-size: 14px; line-height: 1.85; color: var(--cie-dark); margin-bottom: 18px; }
    .scenario-question { font-size: 14px; font-weight: 700; color: var(--cie-dark); margin-bottom: 16px; }
    .scenario-options { display: flex; flex-direction: column; gap: 10px; }
    .scenario-option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--cie-border); border-radius: 8px; cursor: pointer; transition: all 0.18s; }
    .scenario-option:hover { border-color: var(--cie-crimson); background: rgba(184,32,56,0.03); }
    .scenario-option.selected { border-color: var(--cie-crimson); background: rgba(184,32,56,0.06); }
    .scenario-option input[type="radio"] { display: none; }
    .option-key { width: 24px; height: 24px; min-width: 24px; border: 1.5px solid var(--cie-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--cie-muted); transition: all 0.18s; }
    .scenario-option.selected .option-key { background: var(--cie-crimson); border-color: var(--cie-crimson); color: #fff; }
    .option-text { font-size: 13.5px; line-height: 1.65; color: var(--cie-dark); padding-top: 2px; }

    /* NOTES */
    .notes-block { margin-top: 32px; }
    .notes-label { font-size: 13px; font-weight: 600; color: var(--cie-muted); margin-bottom: 8px; }
    .notes-block textarea { width: 100%; border: 1px solid var(--cie-border); border-radius: 8px; padding: 14px 16px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13.5px; color: var(--cie-dark); background: #fff; resize: vertical; min-height: 80px; line-height: 1.65; }
    .notes-block textarea:focus { outline: none; border-color: var(--cie-rose); }

    /* NAV BUTTONS */
    .nav-buttons { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
    .btn-back { background: transparent; border: 1px solid var(--cie-border); color: var(--cie-muted); border-radius: 8px; padding: 12px 24px; font-size: 14px; cursor: pointer; }
    .btn-next { background: var(--cie-crimson); color: #fff; border: none; border-radius: 8px; padding: 14px 32px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-next:hover { background: var(--cie-crimson-lt); }
    .form-error { color: var(--cie-crimson); font-size: 13px; margin-top: 16px; display: none; }

    /* SPINNER */
    .spinner { width: 36px; height: 36px; border: 3px solid var(--cie-border); border-top-color: var(--cie-crimson); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SAVE INDICATOR */
    .save-indicator { font-size: 12px; color: var(--cie-muted); }
    .save-indicator.saved { color: #5DBE8A; }

    @media (max-width: 600px) {
      .top-bar { padding: 14px 20px; }
      .domain-steps { padding: 0 20px; }
      .domain-step-name { display: none; }
      .main { padding: 32px 20px 60px; }
      .scenario-card { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo"><a href="/programs/couples-dashboard"><img src="/img/logo-horizontal.png" alt="MiRAjO"></a></div>
  <div class="top-bar-right">
    <span class="top-bar-name" id="topName"></span>
    <span class="save-indicator" id="saveIndicator">Saving...</span>
    <a href="/programs/couples-dashboard" class="top-bar-exit">Dashboard</a>
  </div>
</div>

<div class="domain-steps">
  <div class="domain-steps-inner">
    <div class="domain-step" data-step="1"><div class="domain-step-num">01</div><div class="domain-step-name">Business</div></div>
    <div class="domain-step" data-step="2"><div class="domain-step-num">02</div><div class="domain-step-name">Finances</div></div>
    <div class="domain-step" data-step="3"><div class="domain-step-num">03</div><div class="domain-step-name">Family</div></div>
    <div class="domain-step" data-step="4"><div class="domain-step-num">04</div><div class="domain-step-name">Relationship</div></div>
  </div>
</div>

<div class="main" id="main"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

// ═══ ALL SCENARIOS ═══
// condition: null = base (everyone), otherwise { field, values } or { type, fields }
// scores are internal only — never shown to users

const SCENARIOS = {
  business: [
    {
      key: 'B1', condition: null,
      story: 'You need to give someone an answer today. Not a massive call, but not nothing either. Your partner is unreachable and the window is closing.',
      question: 'What do you do?',
      options: [
        { key: 'A', text: 'You make the call, keep a note of what you decided and why, and fill them in when they are back.', score: 4 },
        { key: 'B', text: 'You let the window close. A decision this size should not happen without both of you.', score: 2 },
        { key: 'C', text: 'You make the call and mention it later when it comes up naturally.', score: 3 },
        { key: 'D', text: 'You handle it. If it goes well, great. If not, you will figure it out then.', score: 1 },
      ]
    },
    {
      key: 'B2', condition: null,
      story: 'Something real lands. More revenue, more reach. You are ready to move. Your partner is not so sure.',
      question: 'What do you do?',
      options: [
        { key: 'A', text: 'You slow down and ask what is making them hesitate before you say another word about it.', score: 4 },
        { key: 'B', text: 'You lay out your full case and ask for a proper sit-down before either of you decides.', score: 3 },
        { key: 'C', text: 'You push forward. You believe in it and sometimes one person has to lead.', score: 2 },
        { key: 'D', text: 'You let it go. If both of you are not in it, the opportunity is not worth the tension.', score: 1 },
      ]
    },
    {
      key: 'B3', condition: null,
      story: 'A mentor, advisor, or investor gives you feedback about the business. It is good feedback. But it directly contradicts the way your partner has been running their side of things.',
      question: 'What do you do?',
      options: [
        { key: 'A', text: 'You share it with your partner as something worth considering, not as proof they are wrong.', score: 4 },
        { key: 'B', text: 'You sit on it. You do not want to start something based on one person\'s opinion.', score: 2 },
        { key: 'C', text: 'You bring it up the next time you two disagree because now you have backup.', score: 1 },
        { key: 'D', text: 'You implement what makes sense and tell your partner what you changed and why.', score: 3 },
      ]
    },
    {
      key: 'B4', condition: null,
      story: 'You keep doing things that both of you agreed were your partner\'s responsibility. Not because they are dropping the ball. Just because things fall and you pick them up.',
      question: 'What do you do?',
      options: [
        { key: 'A', text: 'You bring it up. Not as a complaint, just as a check-in on whether the split still makes sense.', score: 4 },
        { key: 'B', text: 'You keep handling it. The work needs to get done and right now you are the one doing it.', score: 2 },
        { key: 'C', text: 'You stop doing it and wait to see if they notice.', score: 1 },
        { key: 'D', text: 'You mention it once and then let them handle it however they handle it.', score: 3 },
      ]
    },
    {
      key: 'B5', condition: null,
      story: 'Something in the business is not working and it is connected to what your partner is leading. You have noticed it for a while. So have the numbers.',
      question: 'What do you do?',
      options: [
        { key: 'A', text: 'You ask to look at it together. Not to point fingers, just to understand what is happening.', score: 4 },
        { key: 'B', text: 'You bring it up directly. The business cannot wait for a comfortable moment.', score: 3 },
        { key: 'C', text: 'You quietly take on some of the work yourself to help without making it a conversation.', score: 2 },
        { key: 'D', text: 'You wait. You do not want to bring up a problem before you have a solution to go with it.', score: 1 },
      ]
    },
    {
      key: 'B6', condition: { field: 'both_full_time', values: ['one-of-us', 'neither'] },
      story: 'One of you wants to quit the job and go all in. Full focus, build this thing for real. The other is not ready to make that call yet.',
      question: 'What happens next?',
      options: [
        { key: 'A', text: 'You map out what it would actually take financially before either of you says yes or no.', score: 4 },
        { key: 'B', text: 'The one who wants to go in goes in. The other will follow when they are ready.', score: 2 },
        { key: 'C', text: 'You both agree to stay where you are until you are fully aligned. You will not rush it.', score: 3 },
        { key: 'D', text: 'You drop the conversation. It always ends in tension and right now you cannot afford that.', score: 1 },
      ]
    },
    {
      key: 'B7', condition: { type: 'vision_gap' },
      story: 'Someone approaches you about investing in the business. Real money. But their expectations do not quite match where one of you sees this going long term.',
      question: 'What do you do?',
      options: [
        { key: 'A', text: 'You both take 48 hours separately to think about what you actually want before you respond.', score: 4 },
        { key: 'B', text: 'You turn it down. Outside money changes the dynamic and you are not ready for that conversation.', score: 2 },
        { key: 'C', text: 'You move forward with the conversation and let it show you both what you really want.', score: 3 },
        { key: 'D', text: 'The partner who feels more strongly about it makes the call.', score: 1 },
      ]
    },
    {
      key: 'B8', condition: { field: 'business_role', values: ['i-lead', 'they-lead'] },
      story: 'A major client makes it clear they prefer dealing with one of you. The other partner starts quietly stepping back from client conversations.',
      question: 'What do you do?',
      options: [
        { key: 'A', text: 'You name it. You ask your partner directly how they are feeling about it and whether the current setup is still working for both of you.', score: 4 },
        { key: 'B', text: 'You let it be. If it is working for the client, you will sort out the internal piece later.', score: 2 },
        { key: 'C', text: 'You make sure your partner stays looped in on key updates so they do not feel cut out.', score: 3 },
        { key: 'D', text: 'You do not bring it up. If they have a problem with it, they will say something.', score: 1 },
      ]
    },
  ],

  finances: [
    {
      key: 'F1', condition: null,
      story: 'Marcus and Denise had their best quarter yet. Forty thousand more than expected. Marcus immediately started pricing out a new truck for the business. Denise booked the vacation they had been putting off for two years. Neither told the other before they did it. When the statements came in they had their first real fight in months.',
      question: 'What should they do now?',
      options: [
        { key: 'A', text: 'Agree on a split going forward — a set percentage back into the business and a set amount personal, every time there is surplus.', score: 4 },
        { key: 'B', text: 'Have a long conversation about priorities so they understand each other better before the next good month comes.', score: 3 },
        { key: 'C', text: 'Let this one go and make a rule for next time. They were both doing what felt natural.', score: 2 },
        { key: 'D', text: 'Keep personal spending separate going forward so money does not become a recurring argument.', score: 1 },
      ]
    },
    {
      key: 'F2', condition: null,
      story: 'James has been managing the books for their marketing company. The last quarter was rough — down nearly $18,000 from where they projected. He has not told his wife Keisha yet because he wants to have a plan before he brings her a problem. She finds the statements on his laptop while printing something and sits in silence for a long time before he gets home.',
      question: 'What should Keisha say when James walks in?',
      options: [
        { key: 'A', text: 'She focuses on the numbers first. She asks him to walk her through where they actually are and what the plan is.', score: 3 },
        { key: 'B', text: 'She tells him what she found and asks him to help her understand why he carried this alone.', score: 4 },
        { key: 'C', text: 'She brings it up but keeps it light. She does not want him to feel attacked when he was already trying to fix it.', score: 2 },
        { key: 'D', text: 'She waits for him to bring it up. He knows she uses that printer. He will say something.', score: 1 },
      ]
    },
    {
      key: 'F3', condition: null,
      story: 'Tanya and Devon run a catering company together. The business account has $9,000. Their personal account is nearly empty after a slow month. Devon transfers $2,500 to cover their mortgage before talking to Tanya about it. He figures it is their business and their house, so it is all the same money. Tanya sees the transfer notification and her stomach drops.',
      question: 'What is Tanya\'s real concern?',
      options: [
        { key: 'A', text: 'The amount. $2,500 is significant and he should have checked in first.', score: 3 },
        { key: 'B', text: 'The pattern. If he moved money without asking once, there is nothing stopping him from doing it again.', score: 4 },
        { key: 'C', text: 'Nothing serious. He solved a real problem and the mortgage is paid. She should let this one go.', score: 1 },
        { key: 'D', text: 'The fact that she found out from a notification and not from him.', score: 2 },
      ]
    },
    {
      key: 'F4', condition: null,
      story: 'Simone and Ray have been running their consulting firm for two years without taking a real salary. They finally have enough to make a move. Ray wants to reinvest everything and scale. Simone wants to start paying themselves. She is tired of feeling like they are building something they cannot touch. They are both right. They both know it. That is the problem.',
      question: 'What should Ray say to Simone?',
      options: [
        { key: 'A', text: 'Tell me what taking a salary would actually mean for you right now.', score: 4 },
        { key: 'B', text: 'Look at these numbers. Reinvesting now is the only way we get to where we want to be.', score: 1 },
        { key: 'C', text: 'What if we agree on a small salary now and revisit the split every six months as the business grows.', score: 3 },
        { key: 'D', text: 'Let\'s bring someone else in to weigh in so it\'s not just us going back and forth on this.', score: 2 },
      ]
    },
    {
      key: 'F5', condition: null,
      story: 'Adrienne and Marcus have not been fighting. They have not been laughing either. The business has been slow for three months and neither of them has said that out loud yet. The conversations are shorter. The evenings are quieter. Adrienne thinks Marcus is pulling away. Marcus thinks Adrienne is disappointed in him.',
      question: 'What is the most dangerous thing about this situation?',
      options: [
        { key: 'A', text: 'They are both building a story about what the other person is thinking and neither story is accurate.', score: 4 },
        { key: 'B', text: 'The business problems are not getting solved because they are too busy managing the distance.', score: 3 },
        { key: 'C', text: 'They have not had a real conversation in a while and the longer they wait the harder it gets.', score: 2 },
        { key: 'D', text: 'Adrienne is carrying something that is not hers to carry alone.', score: 1 },
      ]
    },
    {
      key: 'F6', condition: null,
      story: 'Lisa and Tony have a clear division in their business — she runs marketing, he runs operations. Lisa approved a $3,500 ad campaign without checking with Tony. In her mind it was her area and her decision to make. He found out when the payment hit and felt blindsided. She thinks he is overreacting. He thinks she crossed a line.',
      question: 'Tony is upset. What is the most useful thing Lisa could say?',
      options: [
        { key: 'A', text: 'You are right. Anything over a certain amount should be a conversation first, regardless of whose lane it is.', score: 4 },
        { key: 'B', text: 'I understand why you feel blindsided but this was my call to make.', score: 1 },
        { key: 'C', text: 'I should have told you. What would you need from me going forward?', score: 3 },
        { key: 'D', text: 'Next time I will tell you first. But I still think it was the right spend.', score: 2 },
      ]
    },
    {
      key: 'F7', condition: { field: 'primary_income', values: ['yes'] },
      story: 'Brendan and Camille quit their jobs eight months ago to run their business full time. This month is the thinnest it has been. Brendan wants to take a small business loan to get through the quarter. Camille wants to cut everything they can before they take on debt. They are scared and they are showing it differently.',
      question: 'What does this couple need most right now?',
      options: [
        { key: 'A', text: 'A decision. One of them needs to make the call and they both need to commit.', score: 2 },
        { key: 'B', text: 'A real number. Exactly how long can they last and at what point does the loan become the only move.', score: 4 },
        { key: 'C', text: 'To say out loud that they are both scared. The decisions will be clearer once they stop pretending otherwise.', score: 3 },
        { key: 'D', text: 'Someone else to weigh in. A mentor or advisor who has been through this before.', score: 1 },
      ]
    },
    {
      key: 'F8', condition: { field: 'debt_level', values: ['significant', 'overwhelming'] },
      story: 'Before they started the business Nadia came in with $40,000 in student loan debt. Her husband Darius came in debt free. The business is growing but Nadia\'s debt sits in the background of every financial conversation. Darius has never said it is her problem. But Nadia feels it every time the budget comes up.',
      question: 'What is Nadia really waiting for?',
      options: [
        { key: 'A', text: 'For the debt to be paid off so she can stop feeling like a liability in her own marriage.', score: 2 },
        { key: 'B', text: 'For Darius to say, without her asking, that they are in this together regardless of where the debt came from.', score: 4 },
        { key: 'C', text: 'For a real plan that makes the number feel manageable instead of like a cloud over everything.', score: 3 },
        { key: 'D', text: 'For permission to bring it up without feeling like she is making it his problem.', score: 1 },
      ]
    },
    {
      key: 'F9', condition: { field: 'savings_runway', values: ['none', '1-3-months'] },
      story: 'Jade and Chris have three months of runway left. A wholesale deal just landed that could 4x their revenue but it requires $12,000 upfront they do not have sitting still. Jade wants to find a way to make it work. Chris wants to protect what little cushion they have.',

      options: [
        { key: 'A', text: 'Take the deal. The risk of staying small is greater than the risk of running out.', score: 1 },
        { key: 'B', text: 'Pass. You cannot build on an empty foundation and three months is not enough cushion to risk.', score: 2 },
        { key: 'C', text: 'Map out what yes looks like in 90 days and what no looks like in 90 days, then decide.', score: 3 },
        { key: 'D', text: 'Find out if the terms are flexible. A payment plan or partial upfront changes the entire equation.', score: 4 },
      ]
    },
  ],

  family: [
    {
      key: 'Fam1', condition: null,
      story: 'Vanessa and Derek both work in the business full time. Vanessa also handles most of what happens at home — the appointments, the groceries, the errands, the household admin. She has not said anything directly but Derek has noticed she is tired in a way that is different. He tells himself she would say something if it was a problem.',
      question: 'What is Derek missing?',
      options: [
        { key: 'A', text: 'That Vanessa is waiting to be asked, not waiting to complain.', score: 4 },
        { key: 'B', text: 'That Vanessa\'s tiredness is starting to show up in her work.', score: 2 },
        { key: 'C', text: 'That they need to sit down and officially divide up the home responsibilities.', score: 3 },
        { key: 'D', text: 'Nothing. If it were serious she would have said something by now.', score: 1 },
      ]
    },
    {

      story: 'Jerome and Patrice decided to expand their business last year. More clients, more hours, more stress. They talked about it as a business decision. They never talked about what it would mean for their evenings, their weekends, their kids\' routines. Six months in the expansion is working. The family is fraying.',
      question: 'What did Jerome and Patrice skip?',

      ]
    },
    {
      key: 'Fam2b', condition: { field: 'family_structure', values: ['no-kids', 'unsure'] },

      question: 'What did Jerome and Patrice skip?',

const DOMAIN_META = {
  business:      { label: 'Business',      intro: 'Read each situation and choose the answer that feels most true — not what you think you should say, but what actually resonates.' },
  finances:      { label: 'Finances',      intro: 'These situations are real. Some of them will feel familiar. Just go with what comes first.' },
  family:        { label: 'Family',        intro: 'Take your time with these. There is no wrong way to read a story.' },
  relationship:  { label: 'Relationship',  intro: 'This is the one most people rush through. Do not. Read slowly.' },
};

const DOMAIN_ORDER = ['business', 'finances', 'family', 'relationship'];
const SCALE_MAP = { low: 1, medium: 2, high: 3 };
const VIS_MAP   = { 'very-private': 1, 'mostly-private': 2, 'selective': 3, 'comfortable': 4, 'personal-brand': 5 };

let userId, coupleId, myProfile, partnerProfile;
let currentDomain = 0;
let answers   = {}; // { scenarioKey: { option: 'A', score: 4 } }
let notes     = {}; // { domain: text }
let saveTimer = null;

async function init() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) { window.location.href = '/programs/couples-join'; return; }
  userId = user.id;

  const firstName = user.user_metadata?.first_name || user.email?.split('@')[0] || 'Partner';
  document.getElementById('topName').textContent = firstName;

  // Get couple
  const { data: couples } = await db
    .from('couples')
    .select('id, partner_a_user_id, partner_b_user_id')
    .or(`partner_a_user_id.eq.${userId},partner_b_user_id.eq.${userId}`)
    .limit(1);

  if (!couples?.length) { window.location.href = '/programs/couples-dashboard'; return; }
  const couple = couples[0];
  coupleId = couple.id;

  const partnerId = userId === couple.partner_a_user_id
    ? couple.partner_b_user_id
    : couple.partner_a_user_id;

  // Load both profiles for conditional branching
  const { data: profiles } = await db
    .from('partner_profiles')
    .select('*')
    .eq('couple_id', coupleId);

  myProfile      = profiles?.find(p => p.user_id === userId) || {};
  partnerProfile = profiles?.find(p => p.user_id === partnerId) || {};

  // Load existing answers
  const { data: existing } = await db
    .from('diagnostic_answers')
    .select('scenario_key, selected_option, score')
    .eq('couple_id', coupleId)
    .eq('user_id', userId);

  for (const row of (existing || [])) {
    answers[row.scenario_key] = { option: row.selected_option, score: row.score };
  }

  // Load existing notes
  const { data: existingNotes } = await db
    .from('diagnostic_notes')
    .select('domain, note_text')
    .eq('couple_id', coupleId)
    .eq('user_id', userId);

  for (const row of (existingNotes || [])) {
    notes[row.domain] = row.note_text;
  }

  setSaveStatus('saved');
  showIntro();
}

function shouldShow(scenario) {
  if (!scenario.condition) return true;
  const c = scenario.condition;

  if (c.field) {
    return c.values.includes(myProfile[c.field]);
  }
  if (c.type === 'vision_gap') {
    return myProfile.long_term_vision && partnerProfile.long_term_vision &&
           myProfile.long_term_vision !== partnerProfile.long_term_vision;
  }
  if (c.type === 'visibility_or_politics_gap') {
    const polA = SCALE_MAP[myProfile.political_importance] || 0;
    const polB = SCALE_MAP[partnerProfile.political_importance] || 0;
    const visA = VIS_MAP[myProfile.public_visibility] || 0;
    const visB = VIS_MAP[partnerProfile.public_visibility] || 0;
    return Math.abs(polA - polB) >= 2 || Math.abs(visA - visB) >= 2;
  }
  return false;
}

function domainScenarios(domain) {
  return SCENARIOS[domain].filter(s => shouldShow(s));
}

function selectOption(scenarioKey, optionKey, score) {
  answers[scenarioKey] = { option: optionKey, score };

  // Update UI
  document.querySelectorAll(`[data-scenario="${scenarioKey}"] .scenario-option`).forEach(el => {
    el.classList.toggle('selected', el.dataset.option === optionKey);
  });
  const card = document.querySelector(`[data-scenario="${scenarioKey}"]`);
  if (card) card.classList.add('answered');

  scheduleSave();
}

function scheduleSave() {
  setSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 1200);
}

async function flushSave() {
  const rows = Object.entries(answers).map(([scenario_key, { option, score }]) => ({
    couple_id: coupleId,
    user_id:   userId,
    domain:    getDomainForKey(scenario_key),
    scenario_key,
    selected_option: option,
    score,
  }));

  if (rows.length) {
    await db.from('diagnostic_answers')
      .upsert(rows, { onConflict: 'couple_id,user_id,scenario_key' });
  }

  // Save notes
  const noteRows = Object.entries(notes)
    .filter(([, t]) => t?.trim())
    .map(([domain, note_text]) => ({
      couple_id: coupleId, user_id: userId, domain, note_text,
      updated_at: new Date().toISOString(),
    }));
  if (noteRows.length) {
    await db.from('diagnostic_notes')
      .upsert(noteRows, { onConflict: 'couple_id,user_id,domain' });
  }

  setSaveStatus('saved');
}

function getDomainForKey(key) {
  for (const [domain, scenarios] of Object.entries(SCENARIOS)) {
    if (scenarios.find(s => s.key === key)) return domain;
  }
  return null;
}

function setSaveStatus(state) {
  const el = document.getElementById('saveIndicator');
  el.textContent = state === 'saved' ? 'Saved' : 'Saving...';
  el.className = 'save-indicator' + (state === 'saved' ? ' saved' : '');
}

function updateStepBar(stepIndex) {
  document.querySelectorAll('.domain-step').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.remove('active', 'done');
    if (s === stepIndex + 1) el.classList.add('active');
    else if (s < stepIndex + 1) el.classList.add('done');
  });
}

function showIntro() {
  updateStepBar(-1);
  document.getElementById('main').innerHTML = `
    <div class="intro-eyebrow">The Partnership Diagnostic</div>
    <h1 class="intro-title">Time to see yourselves clearly.</h1>
    <p class="intro-body">You are going to read through a series of real situations — couples navigating the same things you are. For each one, choose the answer that actually resonates. Not the one that sounds best. The one that feels true.</p>
    <p class="intro-body">There are four areas: Business, Finances, Family, and Relationship. Your partner is doing this separately. Your individual answers stay private — only the picture they create together is shared.</p>
    <div class="intro-note"><strong>Take your time.</strong> Your answers save automatically as you go. You can leave and come back at any point.</div>
    <div class="nav-buttons" style="justify-content:flex-end;">
      <button class="btn-next" onclick="showDomain(0)">Begin →</button>
    </div>`;
}

function showDomain(index) {
  currentDomain = index;
  updateStepBar(index);
  const domain = DOMAIN_ORDER[index];
  const meta = DOMAIN_META[domain];
  const scenarios = domainScenarios(domain);

  let html = `
    <div class="domain-eyebrow">Part ${index + 1} of 4</div>
    <h2 class="domain-title">${meta.label}</h2>
    <p class="domain-intro">${meta.intro}</p>`;

  for (const s of scenarios) {
    const answered = answers[s.key];
    html += `
      <div class="scenario-card${answered ? ' answered' : ''}" data-scenario="${s.key}">
        <p class="scenario-story">${escHtml(s.story)}</p>
        <p class="scenario-question">${escHtml(s.question)}</p>
        <div class="scenario-options">
          ${s.options.map(o => `
            <div class="scenario-option${answered?.option === o.key ? ' selected' : ''}"
                 data-option="${o.key}"
                 onclick="selectOption('${s.key}','${o.key}',${o.score})">
              <input type="radio" name="${s.key}" value="${o.key}" ${answered?.option === o.key ? 'checked' : ''}>
              <div class="option-key">${o.key}</div>
              <div class="option-text">${escHtml(o.text)}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  html += `
    <div class="notes-block">
      <div class="notes-label">Anything you want to add about this area? <span style="font-weight:400;color:var(--cie-muted);">(optional — just for you)</span></div>
      <textarea placeholder="Your thoughts..." oninput="notes['${domain}']=this.value;scheduleSave()">${escHtml(notes[domain] || '')}</textarea>
    </div>
    <div class="form-error" id="domain-error">Please answer every scenario before continuing.</div>
    <div class="nav-buttons">
      ${index > 0 ? `<button class="btn-back" onclick="showDomain(${index - 1})">← Back</button>` : '<div></div>'}
      <button class="btn-next" onclick="${index < 3 ? `nextDomain(${index})` : 'submitDiagnostic()'}">${index < 3 ? 'Next →' : 'Submit Diagnostic'}</button>
    </div>`;

  document.getElementById('main').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextDomain(index) {
  const domain = DOMAIN_ORDER[index];
  const scenarios = domainScenarios(domain);
  const unanswered = scenarios.filter(s => !answers[s.key]);
  if (unanswered.length) {
    const err = document.getElementById('domain-error');
    err.style.display = 'block';
    err.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  showDomain(index + 1);
}

async function submitDiagnostic() {
  const domain = DOMAIN_ORDER[3];
  const scenarios = domainScenarios(domain);
  const unanswered = scenarios.filter(s => !answers[s.key]);
  if (unanswered.length) {
    const err = document.getElementById('domain-error');
    err.style.display = 'block';
    err.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // Final save before submit
  clearTimeout(saveTimer);
  await flushSave();

  document.getElementById('main').innerHTML = `
    <div style="text-align:center;padding:80px 0;">
      <div class="spinner"></div>
      <div style="font-family:'Instrument Serif',serif;font-size:28px;color:var(--cie-dark);margin-bottom:12px;">Submitting your diagnostic...</div>
      <p style="font-size:14px;color:var(--cie-muted);">Just a moment.</p>
    </div>`;

  try {
    const res = await fetch('/api/couples-submit-diagnostic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, couple_id: coupleId }),
    });
    const data = await res.json();

    if (data.report_ready) {
      document.getElementById('main').innerHTML = `
        <div style="text-align:center;padding:80px 0 40px;">
          <div style="font-family:'Instrument Serif',serif;font-size:36px;color:var(--cie-dark);margin-bottom:16px;">Your report is ready.</div>
          <p style="font-size:15px;color:var(--cie-muted);max-width:480px;margin:0 auto 32px;line-height:1.7;">Both of you have completed the diagnostic. Your Partnership Report is waiting.</p>
          <a href="/programs/couples-report" style="display:inline-block;padding:14px 32px;background:var(--cie-crimson);color:#fff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">View Your Report →</a>
        </div>`;
    } else {
      document.getElementById('main').innerHTML = `
        <div style="text-align:center;padding:80px 0 40px;">
          <div style="font-family:'Instrument Serif',serif;font-size:36px;color:var(--cie-dark);margin-bottom:16px;">You are done.</div>
          <p style="font-size:15px;color:var(--cie-muted);max-width:480px;margin:0 auto 32px;line-height:1.7;">Your answers are in. Your report generates as soon as your partner finishes. We will email you both when it is ready.</p>
          <a href="/programs/couples-dashboard" style="display:inline-block;padding:14px 32px;background:var(--cie-crimson);color:#fff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">Back to Dashboard</a>
        </div>`;
    }
  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div style="text-align:center;padding:80px 0 40px;">
        <div style="font-family:'Instrument Serif',serif;font-size:28px;color:var(--cie-dark);margin-bottom:12px;">Something went wrong.</div>
        <p style="font-size:14px;color:var(--cie-muted);margin-bottom:24px;">Your answers are saved. Please try again.</p>
        <button class="btn-next" onclick="showDomain(3)">← Go Back</button>
      </div>`;
  }
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

init();
</script>
