<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Partnership Diagnostic — Couples in Entrepreneurship | MiRAjO</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cie-dark:      #14090F;
      --cie-crimson:   #B82038;
      --cie-crimson-lt:#D43A56;
      --cie-rose:      #D4607A;
      --cie-blush:     #FBE8EE;
      --cie-blush-lt:  #FDF3F6;
      --cie-gold:      #C4A245;
      --cie-gold-lt:   #D9B96A;
      --cie-muted:     #7A6B74;
      --cie-border:    rgba(184,32,56,0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--cie-blush-lt);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      color: var(--cie-dark);
    }

    /* ═══ TOP BAR ═══ */
    .top-bar {
      background: #ffffff;
      border-bottom: 1px solid var(--cie-border);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar-logo img { height: 56px; width: auto; display: block; }
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar-save {
      font-size: 12px;
      color: var(--cie-muted);
    }
    .top-bar-exit {
      font-size: 12px;
      color: var(--cie-crimson);
      text-decoration: none;
      background: rgba(184,32,56,0.06);
      border: 1px solid var(--cie-border);
      border-radius: 6px;
      padding: 8px 16px;
      transition: all 0.2s;
    }
    .top-bar-exit:hover { background: rgba(184,32,56,0.12); }

    /* ═══ PROGRESS STEPS ═══ */
    .progress-bar-wrap {
      background: #ffffff;
      border-bottom: 1px solid var(--cie-border);
      padding: 0 40px;
    }
    .progress-steps {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: stretch;
    }
    .progress-step {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      border-bottom: 3px solid transparent;
      transition: border-color 0.2s;
      cursor: default;
    }
    .progress-step.active { border-bottom-color: var(--cie-crimson); }
    .progress-step.done   { border-bottom-color: rgba(93,190,138,0.6); }
    .progress-step-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cie-muted);
      margin-bottom: 2px;
    }
    .progress-step.active .progress-step-num { color: var(--cie-crimson); }
    .progress-step.done .progress-step-num   { color: #5DBE8A; }
    .progress-step-name {
      font-size: 12px;
      font-weight: 500;
      color: rgba(20,9,15,0.35);
    }
    .progress-step.active .progress-step-name { color: var(--cie-dark); }
    .progress-step.done .progress-step-name   { color: rgba(93,190,138,0.8); }

    /* ═══ MAIN ═══ */
    .main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 40px 80px;
    }

    /* ═══ INTRO SCREEN ═══ */
    .intro-screen {
      text-align: center;
      padding: 24px 0 40px;
    }
    .intro-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 600;
      margin-bottom: 20px;
    }
    .intro-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 400;
      color: var(--cie-dark);
      line-height: 1.2;
      margin-bottom: 24px;
    }
    .intro-body {
      font-size: 16px;
      color: var(--cie-muted);
      line-height: 1.8;
      max-width: 580px;
      margin: 0 auto 16px;
    }
    .intro-note {
      display: inline-block;
      background: rgba(184,32,56,0.05);
      border: 1px solid var(--cie-border);
      border-radius: 10px;
      padding: 16px 24px;
      font-size: 13px;
      color: var(--cie-dark);
      line-height: 1.7;
      margin: 24px auto 40px;
      max-width: 560px;
    }
    .intro-note strong { color: var(--cie-crimson); }

    /* ═══ DOMAIN SCREEN ═══ */
    .domain-screen { display: none; }
    .domain-screen.active { display: block; }
    .domain-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .domain-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 400;
      color: var(--cie-dark);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .domain-intro {
      font-size: 15px;
      color: var(--cie-muted);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 600px;
    }

    /* ═══ QUESTION ═══ */
    .question-block {
      margin-bottom: 36px;
    }
    .question-label {
      font-size: 16px;
      font-weight: 500;
      color: var(--cie-dark);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .question-hint {
      font-size: 13px;
      color: var(--cie-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    textarea {
      width: 100%;
      background: #ffffff;
      border: 1px solid rgba(184,32,56,0.2);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 15px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--cie-dark);
      line-height: 1.7;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s, background 0.2s;
    }
    textarea::placeholder { color: rgba(122,107,116,0.4); }
    textarea:focus {
      outline: none;
      border-color: var(--cie-crimson);
      background: #ffffff;
    }

    /* ═══ ALIGNMENT RATING ═══ */
    .rating-block {
      margin: 48px 0 40px;
      padding: 28px 32px;
      background: rgba(184,32,56,0.04);
      border: 1px solid var(--cie-border);
      border-radius: 14px;
    }
    .rating-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--cie-dark);
      margin-bottom: 8px;
    }
    .rating-sub {
      font-size: 13px;
      color: var(--cie-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .rating-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .rating-option input[type="radio"] { display: none; }
    .rating-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(184,32,56,0.15);
      background: #ffffff;
      transition: all 0.2s;
      min-width: 100px;
      flex: 1;
    }
    .rating-option label:hover { background: rgba(184,32,56,0.05); border-color: rgba(184,32,56,0.3); }
    .rating-option input:checked + label {
      background: rgba(184,32,56,0.08);
      border-color: var(--cie-crimson);
    }
    .rating-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--cie-crimson);
      line-height: 1;
    }
    .rating-text {
      font-size: 11px;
      color: var(--cie-muted);
      text-align: center;
      line-height: 1.3;
    }
    .rating-option input:checked + label .rating-text { color: var(--cie-dark); }

    /* ═══ DIVIDER ═══ */
    .domain-divider {
      border: none;
      border-top: 1px solid rgba(184,32,56,0.1);
      margin: 48px 0;
    }

    /* ═══ NAVIGATION ═══ */
    .nav-buttons {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid rgba(184,32,56,0.1);
    }
    .btn-back {
      font-size: 14px;
      color: var(--cie-muted);
      background: transparent;
      border: 1px solid rgba(184,32,56,0.15);
      border-radius: 8px;
      padding: 13px 28px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.2s;
    }
    .btn-back:hover { color: var(--cie-dark); border-color: rgba(184,32,56,0.35); }
    .btn-next {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      background: var(--cie-crimson);
      border: none;
      border-radius: 8px;
      padding: 13px 32px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background 0.2s, transform 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-next:hover { background: var(--cie-crimson-lt); transform: translateY(-1px); }
    .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-next-spacer { flex: 1; }

    /* ═══ SUBMIT STATE ═══ */
    .submitting-screen { display: none; text-align: center; padding: 80px 0; }
    .submitting-screen.active { display: block; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(184,32,56,0.15);
      border-top-color: var(--cie-crimson);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .submitting-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      color: var(--cie-dark);
      margin-bottom: 12px;
    }
    .submitting-sub { font-size: 15px; color: var(--cie-muted); }

    /* ═══ ERROR ═══ */
    .form-error {
      background: rgba(168,104,94,0.12);
      border: 1px solid rgba(168,104,94,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      color: #E89088;
      margin-top: 16px;
      display: none;
    }

    /* ═══ LOADING ═══ */
    .page-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }

    @media (max-width: 640px) {
      .top-bar { padding: 14px 20px; }
      .progress-bar-wrap { padding: 0 20px; }
      .progress-step-name { display: none; }
      .main { padding: 40px 24px 60px; }
      .rating-options { gap: 6px; }
      .rating-option label { min-width: 0; padding: 10px 8px; }
      .rating-num { font-size: 18px; }
      .rating-text { font-size: 10px; }
      .nav-buttons { flex-wrap: wrap; }
      .btn-next { width: 100%; text-align: center; order: -1; }
      .btn-back { width: 100%; text-align: center; }
    }
  </style>
  <!-- Site Analytics -->
  <script src="/analytics.js"></script>
</head>
<body>

<div class="top-bar">
  <a href="/programs/couples-dashboard" class="top-bar-logo">
    <img src="/img/logo-horizontal.png" alt="MiRAjO">
  </a>
  <div class="top-bar-right">
    <span class="top-bar-save" id="save-status"></span>
    <a href="/programs/couples-dashboard" class="top-bar-exit">Save &amp; Exit</a>
  </div>
</div>

<div class="progress-bar-wrap" id="progress-bar-wrap" style="display:none;">
  <div class="progress-steps">
    <div class="progress-step" data-step="1">
      <div class="progress-step-num">01</div>
      <div class="progress-step-name">Business</div>
    </div>
    <div class="progress-step" data-step="2">
      <div class="progress-step-num">02</div>
      <div class="progress-step-name">Finances</div>
    </div>
    <div class="progress-step" data-step="3">
      <div class="progress-step-num">03</div>
      <div class="progress-step-name">Family</div>
    </div>
    <div class="progress-step" data-step="4">
      <div class="progress-step-num">04</div>
      <div class="progress-step-name">Relationship</div>
    </div>
  </div>
</div>

<div class="main" id="main">
  <div class="page-loading"><div class="spinner"></div></div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

const DOMAINS = [
  {
    key: 'business',
    title: 'Business',
    intro: 'Answer honestly. There is no right answer — just your perspective. Your partner will not see your responses here.',
    questions: [
      { key: 'q1', label: 'What is your vision for the business in 3 years?', hint: 'Where do you see it going? What does success look like to you?' },
      { key: 'q2', label: 'What is your current role in the business — and is it working?', hint: 'Be honest about whether your role fits you and whether it feels sustainable.' },
      { key: 'q3', label: 'How are business decisions made — and do you feel heard?', hint: 'Think about how the two of you actually operate when it\'s time to decide something.' },
      { key: 'q4', label: 'How do you feel about the current pace of growth?', hint: 'Too fast, too slow, or just right — and why?' },
    ],
  },
  {
    key: 'finances',
    title: 'Finances',
    intro: 'Money is one of the most common stress points for couples in business. Answer openly — this is just for you.',
    questions: [
      { key: 'q1', label: 'How do you currently handle personal vs. business money?', hint: 'Are they separate? Mixed? Is the system working?' },
      { key: 'q2', label: 'Who manages the finances — and does that arrangement feel right to you?', hint: 'Not just who does it, but whether you feel informed and included.' },
      { key: 'q3', label: 'Are you aligned on how much to reinvest in the business vs. take home?', hint: 'Where do you stand on this? What feels fair?' },
      { key: 'q4', label: 'What does financial security mean to you personally?', hint: 'This matters because partners often have very different answers.' },
    ],
  },
  {
    key: 'family',
    title: 'Family & Home',
    intro: 'The home is where the business spills into life. Be honest about where the friction is.',
    questions: [
      { key: 'q1', label: 'How are home responsibilities divided between you?', hint: 'Who does what — and does it feel equitable?' },
      { key: 'q2', label: 'If you have children, how is parenting managed alongside the business?', hint: 'If no children, speak to any family responsibilities (aging parents, extended family, etc.).' },
      { key: 'q3', label: 'Where are the biggest points of friction in your daily home life?', hint: 'What keeps coming up? What never fully gets resolved?' },
      { key: 'q4', label: 'Do you feel the business takes too much from your family time?', hint: 'Be honest. What would you change if you could?' },
    ],
  },
  {
    key: 'relationship',
    title: 'Relationship',
    intro: 'This is the part most people skip — and the part that matters most. This section covers more ground than the others — allow a bit more time and answer with care.',
    questions: [
      { key: 'q1', label: 'How do you communicate when you disagree about the business?', hint: 'What does a disagreement actually look like between you two?' },
      { key: 'q2', label: 'How do you handle conflict — do you tend to resolve it or avoid it?', hint: 'Be honest. Both patterns are common.' },
      { key: 'q3', label: 'How has intimacy changed since starting the business together?', hint: 'Emotional closeness, physical connection, time together — all of it.' },
      { key: 'q4', label: 'Do you feel like partners first — or business partners first?', hint: 'Which one leads? How does that show up?' },
      { key: 'q5', label: 'What do you need more of from each other?', hint: 'Say it here, privately, before you say it anywhere else.' },
      { key: 'q6', label: 'Do you have a shared spiritual or faith practice?', hint: 'Prayer, meditation, church, values-based rituals — whatever that looks like for you.' },
      { key: 'q7', label: 'Is faith or shared values something you want to be more present in how you run your business?', hint: 'Not asking what your partner wants — what do you want?' },
      { key: 'q8', label: 'When things get genuinely hard, what do you return to together?', hint: 'What holds you? What grounds you as a couple?' },
    ],
  },
];

const STORAGE_KEY = 'cie_diagnostic_draft';
let currentStep = 0; // 0 = intro, 1-4 = domains
let userId = null;
let coupleId = null;
let alreadyComplete = false;

function getDraft() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveDraft(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const el = document.getElementById('save-status');
  if (el) { el.textContent = 'Saved'; setTimeout(() => { el.textContent = ''; }, 2000); }
}

async function init() {
  let { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = '/programs/login'; return; }

  const { data: refreshed } = await db.auth.refreshSession();
  if (refreshed?.session) session = refreshed.session;

  userId = session.user.id;

  // Find couple
  const { data: couple } = await db
    .from('couples')
    .select('id')
    .or(`partner_a_user_id.eq.${userId},partner_b_user_id.eq.${userId}`)
    .single();

  if (!couple) {
    document.getElementById('main').innerHTML = `<p style="color:var(--cie-muted);text-align:center;padding:80px 0;">No couple record found. Please contact <a href="mailto:programs@mirajoco.org" style="color:var(--cie-crimson);">support</a>.</p>`;
    return;
  }
  coupleId = couple.id;

  // Check if already complete
  const { data: completion } = await db
    .from('diagnostic_completion')
    .select('completed_at')
    .eq('couple_id', coupleId)
    .eq('user_id', userId)
    .single();

  if (completion) {
    alreadyComplete = true;
    document.getElementById('main').innerHTML = `
      <div style="text-align:center;padding:80px 0 40px;">
        <div style="font-family:'Instrument Serif',serif;font-size:32px;color:var(--cie-dark);margin-bottom:16px;">You're done.</div>
        <p style="font-size:16px;color:var(--cie-muted);margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7;">You've already completed The Partnership Diagnostic. Once your partner finishes theirs, your Partnership Report will be ready on your dashboard.</p>
        <a href="/programs/couples-dashboard" style="display:inline-block;padding:14px 32px;background:var(--cie-crimson);color:#ffffff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">Back to Dashboard</a>
      </div>`;
    return;
  }

  // Load existing responses from Supabase into draft
  const { data: existing } = await db
    .from('diagnostic_responses')
    .select('domain, question_key, response_text')
    .eq('couple_id', coupleId)
    .eq('user_id', userId);

  if (existing?.length) {
    const draft = getDraft();
    for (const row of existing) {
      if (!draft[row.domain]) draft[row.domain] = {};
      draft[row.domain][row.question_key] = row.response_text;
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(draft));
  }

  document.getElementById('progress-bar-wrap').style.display = '';
  renderIntro();
}

function renderIntro() {
  currentStep = 0;
  updateProgressBar();
  document.getElementById('main').innerHTML = `
    <div class="intro-screen">
      <div class="intro-eyebrow">Couples in Entrepreneurship</div>
      <h1 class="intro-title">The Partnership Diagnostic</h1>
      <p class="intro-body">This is your private assessment. Your partner will not see your answers — and you will not see theirs. The system compares your responses and generates your Partnership Report once you're both done.</p>
      <p class="intro-body">There are four domains: Business, Finances, Family, and Relationship. Answer honestly. Take your time. You can save and return at any point.</p>
      <div class="intro-note">
        <strong>Private by design.</strong> Your partner cannot access this page or view any of your responses before the report generates. The only thing they will know is whether you've completed it.
      </div>
      <button class="btn-next" onclick="goToStep(1)">Begin the Diagnostic</button>
    </div>`;
}

function renderDomain(stepIndex) {
  const domain = DOMAINS[stepIndex - 1];
  const draft = getDraft();
  const saved = draft[domain.key] || {};

  let html = `
    <div class="domain-screen active">
      <div class="domain-eyebrow">Domain ${stepIndex} of 4</div>
      <h2 class="domain-title">${domain.title}</h2>
      <p class="domain-intro">${domain.intro}</p>`;

  domain.questions.forEach((q, i) => {
    const val = saved[q.key] || '';
    html += `
      <div class="question-block">
        <div class="question-label">${q.label}</div>
        ${q.hint ? `<div class="question-hint">${q.hint}</div>` : ''}
        <textarea id="q_${domain.key}_${q.key}" rows="4" placeholder="Your thoughts..."
          oninput="autoSave('${domain.key}','${q.key}',this.value)">${escapeHtml(val)}</textarea>
      </div>`;
  });

  // Alignment rating
  const ratingVal = saved['alignment_rating'] || '';
  const RATINGS = [
    { v: 1, text: 'Very misaligned' },
    { v: 2, text: 'Mostly misaligned' },
    { v: 3, text: 'In the middle' },
    { v: 4, text: 'Mostly aligned' },
    { v: 5, text: 'Fully aligned' },
  ];

  html += `
    <hr class="domain-divider">
    <div class="rating-block">
      <div class="rating-label">Overall, how aligned do you feel with your partner in this area right now?</div>
      <div class="rating-sub">This is your honest gut read — not where you want to be, where you actually are.</div>
      <div class="rating-options">
        ${RATINGS.map(r => `
          <div class="rating-option">
            <input type="radio" name="rating_${domain.key}" id="r_${domain.key}_${r.v}" value="${r.v}"
              ${ratingVal == r.v ? 'checked' : ''}
              onchange="autoSave('${domain.key}','alignment_rating','${r.v}')">
            <label for="r_${domain.key}_${r.v}">
              <span class="rating-num">${r.v}</span>
              <span class="rating-text">${r.text}</span>
            </label>
          </div>`).join('')}
      </div>
    </div>

    <div id="form-error-${domain.key}" class="form-error">Please answer all questions and select an alignment rating before continuing.</div>

    <div class="nav-buttons">
      <button class="btn-back" onclick="goToStep(${stepIndex - 1})">${stepIndex === 1 ? '← Back to Intro' : '← Previous'}</button>
      <div class="btn-next-spacer"></div>
      <button class="btn-next" onclick="handleNext('${domain.key}', ${stepIndex})">
        ${stepIndex < 4 ? 'Next Domain →' : 'Submit Diagnostic'}
      </button>
    </div>
  </div>`;

  document.getElementById('main').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function autoSave(domainKey, qKey, value) {
  const draft = getDraft();
  if (!draft[domainKey]) draft[domainKey] = {};
  draft[domainKey][qKey] = value;
  saveDraft(draft);
}

function handleNext(domainKey, stepIndex) {
  const domain = DOMAINS[stepIndex - 1];
  const draft = getDraft();
  const saved = draft[domainKey] || {};

  // Validate: all questions answered + alignment rating selected
  const missing = domain.questions.some(q => !saved[q.key]?.trim());
  const noRating = !saved['alignment_rating'];

  if (missing || noRating) {
    const err = document.getElementById(`form-error-${domainKey}`);
    if (err) { err.style.display = 'block'; err.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    return;
  }

  if (stepIndex < 4) {
    goToStep(stepIndex + 1);
  } else {
    submitDiagnostic();
  }
}

async function submitDiagnostic() {
  document.getElementById('main').innerHTML = `
    <div class="submitting-screen active">
      <div class="spinner"></div>
      <div class="submitting-title">Submitting your responses...</div>
      <p class="submitting-sub">This will just take a moment.</p>
    </div>`;
  document.getElementById('progress-bar-wrap').style.display = 'none';

  const draft = getDraft();

  try {
    const res = await fetch('/api/couples-submit-diagnostic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, couple_id: coupleId, responses: draft }),
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Submission failed');

    localStorage.removeItem(STORAGE_KEY);

    const main = document.getElementById('main');
    if (data.report_ready) {
      main.innerHTML = `
        <div style="text-align:center;padding:80px 0 40px;">
          <div style="font-size:48px;margin-bottom:24px;">🎉</div>
          <div style="font-family:'Instrument Serif',serif;font-size:36px;color:var(--cie-dark);margin-bottom:16px;">Your report is ready.</div>
          <p style="font-size:16px;color:var(--cie-muted);margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7;">Both partners have completed the diagnostic. Your Partnership Report is ready to view — see where you're aligned and where to focus your work together.</p>
          <a href="/programs/couples-report" style="display:inline-block;padding:14px 32px;background:#5DBE8A;color:#0F1729;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">View Your Partnership Report</a>
        </div>`;
    } else {
      main.innerHTML = `
        <div style="text-align:center;padding:80px 0 40px;">
          <div style="font-family:'Instrument Serif',serif;font-size:36px;color:var(--cie-dark);margin-bottom:16px;">You're done.</div>
          <p style="font-size:16px;color:var(--cie-muted);margin-bottom:16px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7;">Your responses have been saved privately. Once your partner completes their side, your Partnership Report will generate automatically.</p>
          <p style="font-size:14px;color:var(--cie-muted);margin-bottom:32px;">We'll email you both when it's ready.</p>
          <a href="/programs/couples-dashboard" style="display:inline-block;padding:14px 32px;background:var(--cie-crimson);color:#ffffff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">Back to Dashboard</a>
        </div>`;
    }
  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div style="text-align:center;padding:80px 0 40px;">
        <div style="font-family:'Instrument Serif',serif;font-size:28px;color:var(--cie-dark);margin-bottom:16px;">Something went wrong</div>
        <p style="font-size:14px;color:var(--cie-muted);margin-bottom:24px;">${err.message}</p>
        <p style="font-size:13px;color:var(--cie-muted);">Your answers are saved locally. Please try again or contact <a href="mailto:programs@mirajoco.org" style="color:var(--cie-crimson);">programs@mirajoco.org</a>.</p>
        <br><button class="btn-next" onclick="goToStep(4)" style="margin-top:16px;">← Go Back</button>
      </div>`;
    document.getElementById('progress-bar-wrap').style.display = '';
  }
}

function goToStep(step) {
  currentStep = step;
  updateProgressBar();
  if (step === 0) {
    renderIntro();
  } else {
    renderDomain(step);
  }
}

function updateProgressBar() {
  document.querySelectorAll('.progress-step').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.remove('active', 'done');
    if (s === currentStep) el.classList.add('active');
    else if (s < currentStep) el.classList.add('done');
  });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

init();
</script>

</body>
