<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses — MiRAjO Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest: #2A3A2A;
      --warm-parchment: #EDE8DF;
      --soft-white: #F7F4EF;
      --dry-sage: #C9B896;
      --bronze-earth: #A89068;
      --new-growth: #A8C5A0;
      --text-muted-dark: #9AAA94;
      --text-body-light: #4A5A48;
      --text-muted-light: #6A7A68;
      --border-light: rgba(42,58,42,0.08);
      --border-dark: rgba(237,232,223,0.12);
      --p-deep: #3D2B72;
      --p-mid: #5A3F9A;
      --p-light: #8B72C8;
      --p-dark: #1A1228;
      --p-silver: #C8C4DC;
      --p-pale: #EDE8F8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--soft-white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══ NAV ═══ */
    .dash-nav {
      background: linear-gradient(180deg, #4A6B4E, #2A3A2A);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(201,184,150,0.18);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dash-nav-logo img { height: 80px; width: auto; display: block; }
    .dash-nav-right { display: flex; align-items: center; gap: 20px; }
    .dash-nav-email { font-size: 13px; color: var(--dry-sage); }
    .dash-logout {
      font-size: 12px;
      color: var(--dry-sage);
      background: rgba(201,184,150,0.12);
      border: 1px solid rgba(201,184,150,0.2);
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.2s;
    }
    .dash-logout:hover { background: rgba(201,184,150,0.2); color: var(--warm-parchment); }

    /* ═══ HEADER ═══ */
    .dash-header {
      background: var(--deep-forest);
      padding: 56px 40px 48px;
    }
    .dash-header-inner { max-width: 1100px; margin: 0 auto; }
    .dash-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--dry-sage);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .dash-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 400;
      color: var(--warm-parchment);
      line-height: 1.2;
    }
    .dash-title span { color: var(--new-growth); font-style: italic; }

    /* ═══ CONTENT ═══ */
    .dash-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 40px;
    }
    .dash-section-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted-light);
      font-weight: 600;
      margin-bottom: 24px;
    }

    /* ═══ COURSE GRID ═══ */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }
    .course-card {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: block;
    }
    .course-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(42,58,42,0.1); }
    .course-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--p-deep), var(--p-mid));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .course-thumb img { width: 60px; height: auto; }
    .course-card-body { padding: 24px; }
    .course-card-tag {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--bronze-earth);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .course-card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--deep-forest);
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .course-card-desc {
      font-size: 14px;
      color: var(--text-muted-light);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .course-progress-wrap { margin-bottom: 16px; }
    .course-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted-light);
      margin-bottom: 6px;
    }
    .course-progress-bar {
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
    }
    .course-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--deep-forest), var(--new-growth));
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .course-btn {
      display: inline-block;
      padding: 10px 24px;
      background: var(--deep-forest);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ═══ EMPTY STATE ═══ */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 16px;
    }
    .empty-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--deep-forest);
      margin-bottom: 12px;
    }
    .empty-sub {
      font-size: 15px;
      color: var(--text-muted-light);
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .empty-btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--deep-forest);
      color: #fff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .empty-btn:hover { background: var(--text-body-light); }

    /* ═══ LOADING ═══ */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(90,63,154,0.15);
      border-top-color: var(--p-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .dash-nav { padding: 14px 20px; }
      .dash-nav-logo img { height: 56px; }
      .dash-nav-email { display: none; }
      .dash-header { padding: 40px 24px 32px; }
      .dash-content { padding: 40px 24px; }
      .courses-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="dash-nav">
  <a href="/programs/dashboard" class="dash-nav-logo">
    <img src="/img/Where Authenticity is the new blue check (250 x 150 px) (800 x 312 px) (450 x 70 px) (Logo) (1).png" alt="MiRAjO">
  </a>
  <div class="dash-nav-right">
    <span class="dash-nav-email" id="user-email"></span>
    <button class="dash-logout" id="logout-btn">Sign Out</button>
  </div>
</nav>

<!-- HEADER -->
<div class="dash-header">
  <div class="dash-header-inner">
    <div class="dash-eyebrow">Student Dashboard</div>
    <h1 class="dash-title">Your <span>Programs</span></h1>
  </div>
</div>

<!-- CONTENT -->
<div class="dash-content">
  <div class="dash-section-label">Enrolled Courses</div>
  <div id="courses-container">
    <div class="loading"><div class="loading-spinner"></div></div>
  </div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const db = window.supabase.createClient(
    window.SUPABASE_URL,
    window.SUPABASE_ANON_KEY
  );

  async function init() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) {
      window.location.href = '/programs/login';
      return;
    }

    document.getElementById('user-email').textContent = session.user.email;

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = '/programs/login';
    });

    loadCourses(session.user.id);
  }

  async function loadCourses(userId) {
    const container = document.getElementById('courses-container');

    try {
    const { data: enrollments, error } = await db
      .from('enrollments')
      .select(`
        course_id,
        courses (
          id, slug, title, description, thumbnail_url
        )
      `)
      .eq('user_id', userId);

    if (error || !enrollments || enrollments.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <h2 class="empty-title">No courses yet</h2>
          <p class="empty-sub">When you enroll in a program it will appear here.</p>
          <a href="https://www.mirajoco.org/25daysand25nights" class="empty-btn">Browse Programs</a>
        </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'courses-grid';

    for (const enrollment of enrollments) {
      const course = enrollment.courses;
      if (!course) continue;

      const progress = await getCourseProgress(userId, course.id);

      grid.innerHTML += `
        <a href="/programs/course/${course.slug}" class="course-card">
          <div class="course-thumb">
            <img src="/img/2525 Official Logo.png" alt="${course.title}">
          </div>
          <div class="course-card-body">
            <div class="course-card-tag">MiRAjO Program</div>
            <h3 class="course-card-title">${course.title}</h3>
            <p class="course-card-desc">${course.description || ''}</p>
            <div class="course-progress-wrap">
              <div class="course-progress-label">
                <span>Progress</span>
                <span>${progress}%</span>
              </div>
              <div class="course-progress-bar">
                <div class="course-progress-fill" style="width:${progress}%"></div>
              </div>
            </div>
            <span class="course-btn">${progress > 0 ? 'Continue' : 'Start Course'}</span>
          </div>
        </a>`;
    }

    container.innerHTML = '';
    container.appendChild(grid);
    } catch (err) {
      container.innerHTML = `<div class="empty-state"><h2 class="empty-title">Something went wrong</h2><p class="empty-sub">${err.message}</p></div>`;
    }
  }

  async function getCourseProgress(userId, courseId) {
    const { data: lessons } = await db
      .from('lessons')
      .select('id, modules!inner(course_id)')
      .eq('modules.course_id', courseId);

    if (!lessons || lessons.length === 0) return 0;

    const lessonIds = lessons.map(l => l.id);
    const { data: completed } = await db
      .from('progress')
      .select('id')
      .eq('user_id', userId)
      .eq('completed', true)
      .in('lesson_id', lessonIds);

    const pct = Math.round(((completed?.length || 0) / lessons.length) * 100);
    return pct;
  }

  init();
</script>

</body>
</html>
