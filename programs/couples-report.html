<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Partnership Report — Couples in Entrepreneurship | MiRAjO</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cie-dark:      #14090F;
      --cie-crimson:   #B82038;
      --cie-crimson-lt:#D43A56;
      --cie-rose:      #D4607A;
      --cie-blush:     #FBE8EE;
      --cie-blush-lt:  #FDF3F6;
      --cie-gold:      #C4A245;
      --cie-gold-lt:   #D9B96A;
      --cie-muted:     #7A6B74;
      --cie-border:    rgba(184,32,56,0.15);
      --aligned:       #5DBE8A;
      --partial:       #D9B96A;
      --needs-work:    #C07A72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--cie-blush-lt);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      color: var(--cie-dark);
    }

    /* ═══ NAV ═══ */
    .dash-nav {
      background: #ffffff;
      border-bottom: 1px solid var(--cie-border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dash-nav-logo img { height: 72px; width: auto; display: block; }
    .dash-nav-right { display: flex; align-items: center; gap: 16px; }
    .dash-nav-name { font-size: 13px; color: var(--cie-muted); }
    .dash-back {
      font-size: 12px;
      color: var(--cie-crimson);
      background: rgba(184,32,56,0.06);
      border: 1px solid var(--cie-border);
      border-radius: 6px;
      padding: 8px 16px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .dash-back:hover { background: rgba(184,32,56,0.12); }

    /* ═══ HERO ═══ */
    .report-hero {
      background: linear-gradient(180deg, var(--cie-blush) 0%, var(--cie-blush-lt) 100%);
      border-bottom: 1px solid var(--cie-border);
      padding: 72px 40px 60px;
      text-align: center;
    }
    .report-hero-inner { max-width: 680px; margin: 0 auto; }
    .report-eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 600;
      margin-bottom: 20px;
    }
    .report-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 400;
      color: var(--cie-dark);
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .report-title em { font-style: italic; color: var(--cie-crimson); }
    .report-date {
      font-size: 13px;
      color: var(--cie-muted);
      margin-bottom: 40px;
    }
    .report-note {
      background: rgba(184,32,56,0.05);
      border: 1px solid var(--cie-border);
      border-radius: 12px;
      padding: 18px 24px;
      font-size: 14px;
      color: var(--cie-muted);
      line-height: 1.7;
      text-align: left;
    }
    .report-note strong { color: var(--cie-dark); }

    /* ═══ SUMMARY STRIP ═══ */
    .summary-strip {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 40px 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .summary-chip {
      background: #ffffff;
      border: 1px solid var(--cie-border);
      border-radius: 12px;
      padding: 20px 18px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .summary-chip-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .bar-aligned  { background: var(--aligned); }
    .bar-partial  { background: var(--partial); }
    .bar-needs    { background: var(--needs-work); }
    .summary-chip-domain {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--cie-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .summary-chip-status {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .status-aligned  { color: var(--aligned); }
    .status-partial  { color: var(--partial); }
    .status-needs    { color: var(--needs-work); }

    /* ═══ CONTENT ═══ */
    .report-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 40px 80px;
    }

    /* ═══ TOGETHER NOTE ═══ */
    .together-note {
      background: linear-gradient(135deg, rgba(93,190,138,0.06) 0%, rgba(251,232,238,0.8) 100%);
      border: 1px solid rgba(93,190,138,0.2);
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 56px;
    }
    .together-note-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--aligned);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .together-note-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--cie-dark);
      font-weight: 400;
      margin-bottom: 8px;
    }
    .together-note-body {
      font-size: 14px;
      color: var(--cie-muted);
      line-height: 1.7;
    }

    /* ═══ DOMAIN SECTION ═══ */
    .domain-section {
      margin-bottom: 56px;
    }
    .domain-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .domain-header-left {}
    .domain-num {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cie-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .domain-name {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--cie-dark);
    }
    .alignment-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge-aligned  { background: rgba(93,190,138,0.1);  color: var(--aligned);    border: 1px solid rgba(93,190,138,0.25); }
    .badge-partial  { background: rgba(217,185,106,0.1); color: var(--partial);    border: 1px solid rgba(217,185,106,0.25); }
    .badge-needs    { background: rgba(192,122,114,0.1); color: var(--needs-work); border: 1px solid rgba(192,122,114,0.25); }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .bdot-aligned  { background: var(--aligned); }
    .bdot-partial  { background: var(--partial); }
    .bdot-needs    { background: var(--needs-work); }

    /* Rating comparison */
    .rating-compare {
      background: #ffffff;
      border: 1px solid var(--cie-border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .rating-compare-label {
      font-size: 12px;
      color: var(--cie-muted);
      flex-shrink: 0;
    }
    .rating-compare-bars {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .rating-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rating-bar-who {
      font-size: 11px;
      color: var(--cie-muted);
      width: 90px;
      flex-shrink: 0;
      text-align: right;
    }
    .rating-bar-track {
      flex: 1;
      height: 6px;
      background: rgba(184,32,56,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .rating-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s ease;
    }
    .fill-you     { background: var(--cie-crimson); }
    .fill-partner { background: var(--cie-muted); }
    .rating-bar-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--cie-dark);
      width: auto;
      min-width: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rating-bar-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--cie-muted);
      white-space: nowrap;
    }
    .rating-scale-note {
      font-size: 11px;
      color: var(--cie-muted);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--cie-border);
      width: 100%;
    }

    /* Q&A grid */
    .qa-grid { display: flex; flex-direction: column; gap: 0; }
    .qa-row {
      border: 1px solid rgba(184,32,56,0.1);
      border-bottom: none;
      overflow: hidden;
    }
    .qa-row:first-child { border-radius: 12px 12px 0 0; }
    .qa-row:last-child  { border-radius: 0 0 12px 12px; border-bottom: 1px solid rgba(184,32,56,0.1); }
    .qa-row:only-child  { border-radius: 12px; border-bottom: 1px solid rgba(184,32,56,0.1); }
    .qa-question {
      background: rgba(184,32,56,0.03);
      padding: 16px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--cie-dark);
      border-bottom: 1px solid rgba(184,32,56,0.08);
      line-height: 1.5;
    }
    .qa-answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .qa-answer {
      padding: 18px 20px;
      font-size: 14px;
      color: var(--cie-muted);
      line-height: 1.75;
    }
    .qa-answer:first-child {
      border-right: 1px solid rgba(184,32,56,0.08);
    }
    .qa-answer-who {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .who-you     { color: var(--cie-crimson); }
    .who-partner { color: var(--cie-muted); }
    .qa-answer-text {
      font-size: 14px;
      color: var(--cie-dark);
      line-height: 1.75;
    }
    .qa-answer-text.empty { color: rgba(122,107,116,0.4); font-style: italic; }

    /* ═══ COURSE PATH ═══ */
    .course-path-section {
      background: #ffffff;
      border: 1px solid var(--cie-border);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 48px;
    }
    .course-path-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .course-path-title {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      color: var(--cie-dark);
      font-weight: 400;
      margin-bottom: 8px;
    }
    .course-path-sub {
      font-size: 14px;
      color: var(--cie-muted);
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 520px;
    }
    .module-list { display: flex; flex-direction: column; gap: 10px; }
    .module-list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid transparent;
    }
    .module-list-item.unlocked {
      background: rgba(184,32,56,0.05);
      border-color: rgba(184,32,56,0.15);
    }
    .module-list-item.locked {
      background: rgba(20,9,15,0.03);
      opacity: 0.45;
    }
    .module-list-num {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--cie-crimson);
      font-weight: 700;
      width: 28px;
      flex-shrink: 0;
    }
    .module-list-item.locked .module-list-num { color: var(--cie-muted); }
    .module-list-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--cie-dark);
      flex: 1;
    }
    .module-list-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .mbadge-unlocked { background: rgba(184,32,56,0.08); color: var(--cie-crimson); border: 1px solid rgba(184,32,56,0.2); }
    .mbadge-foundation { background: rgba(93,190,138,0.1); color: var(--aligned); border: 1px solid rgba(93,190,138,0.2); }
    .mbadge-locked { background: transparent; color: var(--cie-muted); border: 1px solid rgba(122,107,116,0.15); }

    /* ═══ PROFILE SNAPSHOT ═══ */
    .profile-section {
      margin-bottom: 56px;
    }
    .profile-section-header {
      margin-bottom: 24px;
    }
    .profile-section-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cie-crimson);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .profile-section-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--cie-dark);
      margin-bottom: 6px;
    }
    .profile-section-sub {
      font-size: 14px;
      color: var(--cie-muted);
      line-height: 1.6;
    }
    .profile-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .profile-col {
      background: #ffffff;
      border: 1px solid var(--cie-border);
      border-radius: 14px;
      overflow: hidden;
    }
    .profile-col-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(184,32,56,0.08);
      background: rgba(184,32,56,0.03);
    }
    .profile-col-who {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .who-you-label    { color: var(--cie-crimson); }
    .who-partner-label { color: var(--cie-muted); }
    .profile-col-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--cie-dark);
    }
    .profile-field {
      padding: 13px 20px;
      border-bottom: 1px solid rgba(184,32,56,0.06);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .profile-field:last-child { border-bottom: none; }
    .profile-field-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--cie-muted);
      font-weight: 600;
    }
    .profile-field-value {
      font-size: 14px;
      color: var(--cie-dark);
      line-height: 1.5;
    }
    .profile-field-value.empty {
      color: rgba(122,107,116,0.4);
      font-style: italic;
      font-size: 13px;
    }
    .profile-field-value.gap {
      color: var(--cie-crimson);
      font-weight: 600;
    }
    .profile-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .profile-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 100px;
      background: rgba(184,32,56,0.06);
      border: 1px solid rgba(184,32,56,0.15);
      color: var(--cie-dark);
    }
    .profile-gap-row {
      background: rgba(196,162,69,0.06);
      border: 1px solid rgba(196,162,69,0.2);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--cie-dark);
      line-height: 1.6;
    }
    .profile-gap-row:last-child { margin-bottom: 0; }
    .profile-gap-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cie-gold);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-no-data {
      background: rgba(184,32,56,0.03);
      border: 1px dashed rgba(184,32,56,0.15);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--cie-muted);
    }
    @media (max-width: 640px) {
      .profile-cols { grid-template-columns: 1fr; }
    }

    /* ═══ CTA ═══ */
    .report-cta {
      text-align: center;
      padding: 16px 0 0;
    }
    .btn-gold {
      display: inline-block;
      padding: 16px 40px;
      background: var(--cie-crimson);
      color: #ffffff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-gold:hover { background: var(--cie-crimson-lt); transform: translateY(-2px); }

    /* ═══ LOADING / STATES ═══ */
    .page-loading {
      display: flex; align-items: center; justify-content: center; min-height: 60vh;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(184,32,56,0.12);
      border-top-color: var(--cie-crimson);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 768px) {
      .dash-nav { padding: 14px 20px; }
      .dash-nav-logo img { height: 52px; }
      .dash-nav-name { display: none; }
      .report-hero { padding: 48px 24px 40px; }
      .summary-strip { grid-template-columns: 1fr 1fr; padding: 32px 24px 0; }
      .report-content { padding: 40px 24px 60px; }
      .qa-answers { grid-template-columns: 1fr; }
      .qa-answer:first-child { border-right: none; border-bottom: 1px solid rgba(184,32,56,0.08); }
      .rating-compare { flex-direction: column; gap: 12px; }
      .course-path-section { padding: 28px 24px; }
      .domain-header { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .summary-strip { grid-template-columns: 1fr; }
    }
  </style>
  <!-- Site Analytics -->
  <script src="/analytics.js"></script>
</head>
<body>

<nav class="dash-nav">
  <a href="/programs/couples-dashboard" class="dash-nav-logo">
    <img src="/img/logo-horizontal.png" alt="MiRAjO">
  </a>
  <div class="dash-nav-right">
    <span class="dash-nav-name" id="user-name"></span>
    <a href="/programs/couples-dashboard" class="dash-back">← Dashboard</a>
  </div>
</nav>

<div id="page-body">
  <div class="page-loading"><div class="spinner"></div></div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const db = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

const DOMAINS_META = [
  {
    key: 'business',
    label: 'Business',
    questions: [
      { key: 'q1', text: 'What is your vision for the business in 3 years?' },
      { key: 'q2', text: 'What is your current role — and is it working?' },
      { key: 'q3', text: 'How are business decisions made — and do you feel heard?' },
      { key: 'q4', text: 'How do you feel about the current pace of growth?' },
    ],
  },
  {
    key: 'finances',
    label: 'Finances',
    questions: [
      { key: 'q1', text: 'How do you currently handle personal vs. business money?' },
      { key: 'q2', text: 'Who manages the finances — and does that arrangement feel right to you?' },
      { key: 'q3', text: 'Are you aligned on how much to reinvest vs. take home?' },
      { key: 'q4', text: 'What does financial security mean to you personally?' },
    ],
  },
  {
    key: 'family',
    label: 'Family & Home',
    questions: [
      { key: 'q1', text: 'How are home responsibilities divided between you?' },
      { key: 'q2', text: 'How is parenting (or other family responsibility) managed alongside the business?' },
      { key: 'q3', text: 'Where are the biggest points of friction in your daily home life?' },
      { key: 'q4', text: 'Do you feel the business takes too much from your family time?' },
    ],
  },
  {
    key: 'relationship',
    label: 'Relationship',
    questions: [
      { key: 'q1', text: 'How do you communicate when you disagree about the business?' },
      { key: 'q2', text: 'How do you handle conflict — do you resolve it or avoid it?' },
      { key: 'q3', text: 'How has intimacy changed since starting the business together?' },
      { key: 'q4', text: 'Do you feel like partners first — or business partners first?' },
      { key: 'q5', text: 'What do you need more of from each other?' },
      { key: 'q6', text: 'Do you have a shared spiritual or faith practice?' },
      { key: 'q7', text: 'Is faith or shared values something you want more present in the business?' },
      { key: 'q8', text: 'When things get genuinely hard, what do you return to together?' },
    ],
  },
];

const MODULE_LIST = [
  { num: 1, title: 'The Cost of Misalignment',  unlock_domain: null,           always: true },
  { num: 2, title: 'The Financial Playbook',     unlock_domain: 'finances' },
  { num: 3, title: 'The Game Plan',              unlock_domain: 'business' },
  { num: 4, title: 'Who Runs What',              unlock_domain: 'business' },
  { num: 5, title: 'The Life Architecture',      unlock_domain: 'family' },
  { num: 6, title: 'Protect What You Built',     unlock_domain: 'relationship' },
  { num: 7, title: 'Getting on the Same Page',   unlock_domain: 'relationship' },
  { num: 8, title: 'The Win',                    unlock_domain: null,           always_if_report: true },
];

function alignmentInfo(domain, unlockedDomains, reportData) {
  const avgA = reportData?.[domain]?.partner_a_avg;
  const avgB = reportData?.[domain]?.partner_b_avg;

  // No score data available — default to aligned
  if (avgA == null || avgB == null) {
    return { tier: 'aligned', label: 'Aligned', badgeClass: 'badge-aligned', dotClass: 'bdot-aligned', statusClass: 'status-aligned', barClass: 'bar-aligned', chipClass: 'bar-aligned' };
  }

  const gap   = Math.abs(avgA - avgB);
  const lower = Math.min(avgA, avgB);

  if (gap >= 1.0 || lower < 2.5) {
    return { tier: 'needs', label: 'Needs Attention', badgeClass: 'badge-needs', dotClass: 'bdot-needs', statusClass: 'status-needs', barClass: 'bar-needs', chipClass: 'bar-needs' };
  }
  if (gap >= 0.5 || lower < 3.5) {
    return { tier: 'partial', label: 'Partially Aligned', badgeClass: 'badge-partial', dotClass: 'bdot-partial', statusClass: 'status-partial', barClass: 'bar-partial', chipClass: 'bar-partial' };
  }
  return { tier: 'aligned', label: 'Aligned', badgeClass: 'badge-aligned', dotClass: 'bdot-aligned', statusClass: 'status-aligned', barClass: 'bar-aligned', chipClass: 'bar-aligned' };
}

async function init() {
  let { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = '/programs/login'; return; }

  const { data: refreshed } = await db.auth.refreshSession();
  if (refreshed?.session) session = refreshed.session;

  const user = session.user;
  const firstName = user.user_metadata?.first_name || user.email;
  document.getElementById('user-name').textContent = firstName;

  // Load couple
  const { data: couple } = await db
    .from('couples')
    .select('id, partner_a_user_id, partner_b_user_id')
    .or(`partner_a_user_id.eq.${user.id},partner_b_user_id.eq.${user.id}`)
    .single();

  if (!couple) { showError('No couple record found. Please contact support.'); return; }

  // Load report
  const { data: report } = await db
    .from('partnership_reports')
    .select('id, generated_at, unlocked_domains, report_data')
    .eq('couple_id', couple.id)
    .single();

  if (!report) {
    showNotReady();
    return;
  }

  const isPartnerA = user.id === couple.partner_a_user_id;
  const youLabel     = firstName || 'You';
  const partnerLabel = 'Your Partner';

  // Load both partner profiles (RLS allows partners to see each other)
  const { data: profileRows } = await db
    .from('partner_profiles')
    .select('*')
    .eq('couple_id', couple.id);

  const myProfile      = profileRows?.find(p => p.user_id === user.id) || null;
  const partnerProfile = profileRows?.find(p => p.user_id !== user.id) || null;

  // Load diagnostic notes for both partners
  const { data: notesRows } = await db
    .from('diagnostic_notes')
    .select('user_id, domain, note_text')
    .eq('couple_id', couple.id);

  const myNotes = {};
  const partnerNotes = {};
  for (const row of (notesRows || [])) {
    if (row.user_id === user.id) myNotes[row.domain] = row.note_text;
    else partnerNotes[row.domain] = row.note_text;
  }

  // If unlocked_domains is empty, regenerate before rendering
  if (!report.unlocked_domains?.length) {
    try {
      const regen = await fetch('/api/cie-regenerate-report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id, couple_id: couple.id }),
      });
      const regenData = await regen.json();
      if (regenData.unlocked_domains?.length) {
        report.unlocked_domains = regenData.unlocked_domains;
      }
    } catch (_) {}
  }

  renderReport(report, isPartnerA, youLabel, partnerLabel, user.id, myProfile, partnerProfile, myNotes, partnerNotes);
}

const LABEL = {
  age:     { 'under-25':'Under 25','25-34':'25–34','35-44':'35–44','45-54':'45–54','55+':'55+' },
  time:    { 'under-1':'Less than 1 year','1-3':'1–3 years','3-5':'3–5 years','5-10':'5–10 years','10+':'10+ years' },
  status:  { 'dating':'Dating','engaged':'Engaged','married':'Married' },
  family:  { 'no-kids':'No children','kids-together':'Children together','stepparent':'Stepparent','blended':'Blended family','unsure':'Not sure yet' },
  stage:   { 'idea':'Idea stage','startup':'Startup','growing':'Growing','established':'Established' },
  role:    { 'equal-partners':'Equal partners','i-lead':'Takes the lead','they-lead':'Partner leads','still-figuring':'Still figuring it out' },
  years:   { 'just-starting':'Just starting','under-2':'Under 2 years','2-5':'2–5 years','5+':'5+ years' },
  scale:   { 'low':'Low','medium':'Medium','high':'High' },
  debt:    { 'none':'Debt-free','manageable':'Manageable','significant':'Significant','overwhelming':'Overwhelming' },
  savings: { 'none':'No runway','1-3-months':'1–3 months','3-6-months':'3–6 months','6-plus':'6+ months' },
  vision:  { 'lifestyle':'Lifestyle business','scale-sell':'Scale and sell','generational':'Generational legacy','not-sure':'Not decided yet' },
  risk:    { 'very-conservative':'Very Conservative','conservative':'Conservative','moderate':'Moderate','calculated-risk':'Calculated Risk-Taker','aggressive':'Aggressive' },
  fulltime:{ 'both':'Both full-time','one-of-us':'One of us is','neither':'Neither yet' },
  visibility:{ 'very-private':'Keeps it very private','mostly-private':'Mostly private','selective':'Selective about sharing','comfortable':'Comfortable sharing publicly','personal-brand':'Building a personal brand' },
  income:  { 'yes':'Primary income','shared':'One of our sources','no':'Other primary income' },
};

function lbl(map, val) {
  return val ? (LABEL[map]?.[val] || val) : null;
}

function profileField(label, value, isGap) {
  if (!value) return `<div class="profile-field">
    <div class="profile-field-label">${label}</div>
    <div class="profile-field-value empty">Not provided</div>
  </div>`;
  return `<div class="profile-field">
    <div class="profile-field-label">${label}</div>
    <div class="profile-field-value${isGap ? ' gap' : ''}">${escHtml(value)}</div>
  </div>`;
}

function profileTagsField(label, arr) {
  if (!arr?.length) return `<div class="profile-field">
    <div class="profile-field-label">${label}</div>
    <div class="profile-field-value empty">Not provided</div>
  </div>`;
  return `<div class="profile-field">
    <div class="profile-field-label">${label}</div>
    <div class="profile-tags">${arr.map(t => `<span class="profile-tag">${escHtml(t)}</span>`).join('')}</div>
  </div>`;
}

function renderProfileCol(profile, whoClass, whoLabel, displayName) {
  if (!profile?.completed_at) {
    return `<div class="profile-col">
      <div class="profile-col-header">
        <div class="profile-col-who ${whoClass}">${whoLabel}</div>
        <div class="profile-col-name">${escHtml(displayName)}</div>
      </div>
      <div class="profile-no-data">Profile not completed yet.</div>
    </div>`;
  }

  const p = profile;
  return `<div class="profile-col">
    <div class="profile-col-header">
      <div class="profile-col-who ${whoClass}">${whoLabel}</div>
      <div class="profile-col-name">${escHtml(displayName)}</div>
    </div>
    ${profileField('Age Range', lbl('age', p.age_range))}
    ${profileTagsField('Cultural Background', p.cultural_backgrounds)}
    ${profileField('Faith Influence', lbl('scale', p.faith_influence))}
    ${profileField('Political Values Matter', lbl('scale', p.political_importance))}
    ${profileField('Time Together', lbl('time', p.time_together))}
    ${profileField('Relationship Status', lbl('status', p.relationship_status))}
    ${profileField('Family Structure', lbl('family', p.family_structure))}
    ${profileField('Business Stage', lbl('stage', p.business_stage))}
    ${profileField('My Role', lbl('role', p.business_role))}
    ${profileField('Years Building Together', lbl('years', p.years_building_together))}
    ${profileField('Long-Term Vision', lbl('vision', p.long_term_vision))}
    ${profileField('Risk Approach', lbl('risk', p.risk_tolerance))}
    ${profileField('Both Full-Time', lbl('fulltime', p.both_full_time))}
    ${profileField('Public Visibility', lbl('visibility', p.public_visibility))}
    ${profileField('Primary Income Source', lbl('income', p.primary_income))}
    ${profileField('Debt Level', lbl('debt', p.debt_level))}
    ${profileField('Savings Runway', lbl('savings', p.savings_runway))}
    ${profileField('Money Alignment', lbl('scale', p.money_alignment))}
    ${p.biggest_challenge ? profileField('Biggest Challenge', p.biggest_challenge) : ''}
    ${profileTagsField('Course Goals', p.course_goal)}
  </div>`;
}

function renderProfileSection(myProfile, partnerProfile, youLabel, partnerLabel) {
  const bothDone = myProfile?.completed_at && partnerProfile?.completed_at;

  // Surface notable gaps between completed profiles
  const gaps = [];
  if (bothDone) {
    const scaleScore = { low: 1, medium: 2, high: 3 };

    const faithA = scaleScore[myProfile.faith_influence] || 0;
    const faithB = scaleScore[partnerProfile.faith_influence] || 0;
    if (myProfile.faith_influence && partnerProfile.faith_influence && Math.abs(faithA - faithB) >= 2) {
      gaps.push(`Faith plays a <strong>${lbl('scale', myProfile.faith_influence)?.toLowerCase()}</strong> role for ${escHtml(youLabel)} and a <strong>${lbl('scale', partnerProfile.faith_influence)?.toLowerCase()}</strong> role for ${escHtml(partnerLabel)}. Worth an honest conversation about how that shows up in the business.`);
    }

    const polA = scaleScore[myProfile.political_importance] || 0;
    const polB = scaleScore[partnerProfile.political_importance] || 0;
    if (myProfile.political_importance && partnerProfile.political_importance && Math.abs(polA - polB) >= 2) {
      gaps.push(`Shared political values matter <strong>${lbl('scale', myProfile.political_importance)?.toLowerCase()}</strong> to ${escHtml(youLabel)} and <strong>${lbl('scale', partnerProfile.political_importance)?.toLowerCase()}</strong> to ${escHtml(partnerLabel)}. This difference can surface in business decisions and values alignment.`);
    }

    if (myProfile.family_structure && partnerProfile.family_structure && myProfile.family_structure !== partnerProfile.family_structure) {
      gaps.push(`You described your family structure differently — <strong>${lbl('family', myProfile.family_structure)}</strong> vs. <strong>${lbl('family', partnerProfile.family_structure)}</strong>. That discrepancy is worth talking through.`);
    }

    if (myProfile.business_role && partnerProfile.business_role && myProfile.business_role !== partnerProfile.business_role) {
      const roleA = lbl('role', myProfile.business_role);
      const roleB = lbl('role', partnerProfile.business_role);
      if (!(myProfile.business_role === 'equal-partners' && partnerProfile.business_role === 'equal-partners')) {
        gaps.push(`${escHtml(youLabel)} sees their role as <strong>${roleA?.toLowerCase()}</strong>. ${escHtml(partnerLabel)} sees it as <strong>${roleB?.toLowerCase()}</strong>. Role perception gaps are one of the most common friction points — your course addresses this directly.`);
      }
    }

    const monA = scaleScore[myProfile.money_alignment] || 0;
    const monB = scaleScore[partnerProfile.money_alignment] || 0;
    if (myProfile.money_alignment && partnerProfile.money_alignment && Math.abs(monA - monB) >= 2) {
      gaps.push(`${escHtml(youLabel)} rates money alignment as <strong>${lbl('scale', myProfile.money_alignment)?.toLowerCase()}</strong>. ${escHtml(partnerLabel)} rates it as <strong>${lbl('scale', partnerProfile.money_alignment)?.toLowerCase()}</strong>. That gap in perception is itself data.`);
    }

    if (myProfile.long_term_vision && partnerProfile.long_term_vision && myProfile.long_term_vision !== partnerProfile.long_term_vision) {
      gaps.push(`${escHtml(youLabel)} sees this as a <strong>${lbl('vision', myProfile.long_term_vision)?.toLowerCase()}</strong>. ${escHtml(partnerLabel)} sees it as a <strong>${lbl('vision', partnerProfile.long_term_vision)?.toLowerCase()}</strong>. Exit strategy misalignment is one of the most common — and most avoided — conversations in couple-owned businesses.`);
    }

    const riskOrder = { 'very-conservative': 1, 'conservative': 2, 'moderate': 3, 'calculated-risk': 4, 'aggressive': 5 };
    const riskA = riskOrder[myProfile.risk_tolerance] || 0;
    const riskB = riskOrder[partnerProfile.risk_tolerance] || 0;
    if (myProfile.risk_tolerance && partnerProfile.risk_tolerance && Math.abs(riskA - riskB) >= 2) {
      gaps.push(`${escHtml(youLabel)} approaches risk as <strong>${lbl('risk', myProfile.risk_tolerance)?.toLowerCase()}</strong>. ${escHtml(partnerLabel)} is <strong>${lbl('risk', partnerProfile.risk_tolerance)?.toLowerCase()}</strong>. This gap shows up in every major business decision — hiring, pricing, investment, growth pace.`);
    }

    const visOrder = { 'very-private': 1, 'mostly-private': 2, 'selective': 3, 'comfortable': 4, 'personal-brand': 5 };
    const visA = visOrder[myProfile.public_visibility] || 0;
    const visB = visOrder[partnerProfile.public_visibility] || 0;
    if (myProfile.public_visibility && partnerProfile.public_visibility && Math.abs(visA - visB) >= 2) {
      gaps.push(`When it comes to sharing the business and relationship publicly, ${escHtml(youLabel)} is <strong>${lbl('visibility', myProfile.public_visibility)?.toLowerCase()}</strong> while ${escHtml(partnerLabel)} is <strong>${lbl('visibility', partnerProfile.public_visibility)?.toLowerCase()}</strong>. This gap creates friction in marketing, social media, and brand decisions.`);
    }
  }

  return `<div class="profile-section">
    <div class="profile-section-header">
      <div class="profile-section-eyebrow">Your Starting Point</div>
      <div class="profile-section-title">About You Both</div>
      <div class="profile-section-sub">Individual profiles — completed separately before the course began.</div>
    </div>

    <div class="profile-cols">
      ${renderProfileCol(myProfile, 'who-you-label', 'You', youLabel)}
      ${renderProfileCol(partnerProfile, 'who-partner-label', 'Your Partner', partnerLabel)}
    </div>

    ${gaps.length ? `
    <div style="margin-top:8px;">
      <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--cie-gold);font-weight:700;margin-bottom:12px;">Worth Noting</div>
      ${gaps.map(g => `<div class="profile-gap-row">${g}</div>`).join('')}
    </div>` : ''}
  </div>`;
}

function renderReport(report, isPartnerA, youLabel, partnerLabel, userId, myProfile, partnerProfile, myNotes, partnerNotes) {
  const rd = report.report_data || {};
  const unlocked = report.unlocked_domains || [];
  const generated = report.generated_at ? new Date(report.generated_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';

  // Summary counts
  let alignedCount = 0;
  DOMAINS_META.forEach(d => {
    const info = alignmentInfo(d.key, unlocked, rd);
    if (info.tier === 'aligned') alignedCount++;
  });

  // Build page
  let html = `
    <div class="report-hero">
      <div class="report-hero-inner">
        <div class="report-eyebrow">Couples in Entrepreneurship</div>
        <h1 class="report-title">Your <em>Partnership Report</em></h1>
        ${generated ? `<div class="report-date">Generated ${generated}</div>` : ''}
        <div class="report-note">
          <strong>Read this together.</strong> Don't summarize it to each other later. Sit down, open this page side by side, and go through it as a team. What you see here is where the work begins.
        </div>
      </div>
    </div>

    <div class="summary-strip">
      ${DOMAINS_META.map(d => {
        const info = alignmentInfo(d.key, unlocked, rd);
        return `<div class="summary-chip">
          <div class="summary-chip-bar ${info.chipClass}"></div>
          <div class="summary-chip-domain">${d.label}</div>
          <div class="summary-chip-status ${info.statusClass}">${info.label}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="report-content">

      <div class="together-note">
        <div class="together-note-label">Before You Read</div>
        <div class="together-note-title">${alignedCount === 4 ? 'You\'re more aligned than most.' : alignedCount >= 2 ? 'You\'ve got a strong foundation to build on.' : 'This is exactly why you\'re here.'}</div>
        <div class="together-note-body">${alignedCount === 4
          ? 'All four domains show alignment. That doesn\'t mean there\'s nothing to work on — it means you\'ve got a strong base. Module 1 will help you understand how to protect it as the business grows.'
          : `${4 - alignedCount} ${4 - alignedCount === 1 ? 'domain' : 'domains'} show gaps. That\'s not a crisis — it\'s information. Your course path has been built specifically around what you need. Read each domain honestly before you respond to each other.`
        }</div>
      </div>

      ${renderProfileSection(myProfile, partnerProfile, youLabel, partnerLabel)}

      ${DOMAINS_META.map((d, i) => {
        const info       = alignmentInfo(d.key, unlocked, rd);
        const domainData = rd[d.key] || {};
        const avgYou     = isPartnerA ? domainData.partner_a_avg : domainData.partner_b_avg;
        const avgPartner = isPartnerA ? domainData.partner_b_avg : domainData.partner_a_avg;
        const myNote     = myNotes?.[d.key] || '';
        const partNote   = partnerNotes?.[d.key] || '';
        const hasNotes   = myNote || partNote;

        return `
        <div class="domain-section">
          <div class="domain-header">
            <div class="domain-header-left">
              <div class="domain-num">Domain ${i + 1} of 4</div>
              <div class="domain-name">${d.label}</div>
            </div>
            <div class="alignment-badge ${info.badgeClass}">
              <div class="badge-dot ${info.dotClass}"></div>
              ${info.label}
            </div>
          </div>

          ${avgYou != null && avgPartner != null ? `
          <div class="rating-compare">
            <div class="rating-compare-label">Scenario<br>average</div>
            <div class="rating-compare-bars">
              <div class="rating-bar-row">
                <div class="rating-bar-who">${escHtml(youLabel)}</div>
                <div class="rating-bar-track"><div class="rating-bar-fill fill-you" style="width:${(avgYou / 4 * 100).toFixed(0)}%"></div></div>
                <div class="rating-bar-val">${avgYou.toFixed(1)}<span class="rating-bar-label">${scoreLabel(avgYou)}</span></div>
              </div>
              <div class="rating-bar-row">
                <div class="rating-bar-who">${escHtml(partnerLabel)}</div>
                <div class="rating-bar-track"><div class="rating-bar-fill fill-partner" style="width:${(avgPartner / 4 * 100).toFixed(0)}%"></div></div>
                <div class="rating-bar-val">${avgPartner.toFixed(1)}<span class="rating-bar-label">${scoreLabel(avgPartner)}</span></div>
              </div>
            </div>
            <div class="rating-scale-note">Scored 1–4 · 1 = avoidant, 2 = reactive, 3 = intentional, 4 = proactive</div>
          </div>` : ''}

          ${hasNotes ? `
          <div class="qa-grid">
            <div class="qa-row">
              <div class="qa-question">Notes from the diagnostic</div>
              <div class="qa-answers">
                <div class="qa-answer">
                  <div class="qa-answer-who who-you">${escHtml(youLabel)}</div>
                  <div class="qa-answer-text ${myNote ? '' : 'empty'}">${myNote ? escHtml(myNote) : 'No notes added.'}</div>
                </div>
                <div class="qa-answer">
                  <div class="qa-answer-who who-partner">${escHtml(partnerLabel)}</div>
                  <div class="qa-answer-text ${partNote ? '' : 'empty'}">${partNote ? escHtml(partNote) : 'No notes added.'}</div>
                </div>
              </div>
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}

      <div class="course-path-section">
        <div class="course-path-eyebrow">Your Course Path</div>
        <div class="course-path-title">Modules unlocked for your path</div>
        <div class="course-path-sub">Based on your Partnership Report, these are the modules your course path includes. You both gain access to the same set.</div>
        <div class="module-list">
          ${MODULE_LIST.map(m => {
            const isUnlocked = m.always || m.always_if_report || unlocked.includes(m.unlock_domain) || unlocked.includes('all');
            return `<div class="module-list-item ${isUnlocked ? 'unlocked' : 'locked'}">
              <div class="module-list-num">${String(m.num).padStart(2, '0')}</div>
              <div class="module-list-name">${escHtml(m.title)}</div>
              <div class="module-list-badge ${m.always ? 'mbadge-foundation' : isUnlocked ? 'mbadge-unlocked' : 'mbadge-locked'}">
                ${m.always ? 'Foundation' : isUnlocked ? 'Unlocked' : 'Locked'}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="report-cta">
        <p style="font-family:'Instrument Serif',serif;font-size:clamp(20px,3vw,26px);color:var(--cie-dark);margin-bottom:10px;">Your course path is unlocked.</p>
        <p style="font-size:14px;color:var(--cie-muted);margin-bottom:28px;line-height:1.7;">The modules built for your specific gaps are ready. Head to your dashboard to begin.</p>
        <a href="/programs/couples-dashboard" class="btn-gold">Start Your Course →</a>
        <p style="margin-top:16px;font-size:13px;color:var(--cie-muted);"><a href="/programs/couples-dashboard" style="color:var(--cie-muted);text-decoration:underline;">Back to Dashboard</a></p>
      </div>

    </div>`;

  document.getElementById('page-body').innerHTML = html;
}

function showNotReady() {
  document.getElementById('page-body').innerHTML = `
    <div style="text-align:center;padding:100px 40px;">
      <div style="font-family:'Instrument Serif',serif;font-size:32px;color:var(--cie-dark);margin-bottom:16px;">Not ready yet</div>
      <p style="font-size:15px;color:var(--cie-muted);margin-bottom:32px;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.7;">Your Partnership Report will generate as soon as both partners have completed The Partnership Diagnostic. We'll email you both when it's ready.</p>
      <a href="/programs/couples-dashboard" style="display:inline-block;padding:14px 32px;background:var(--cie-crimson);color:#ffffff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">Back to Dashboard</a>
    </div>`;
}

function showError(msg) {
  document.getElementById('page-body').innerHTML = `
    <div style="text-align:center;padding:100px 40px;">
      <p style="font-family:'Instrument Serif',serif;font-size:28px;color:var(--cie-dark);margin-bottom:12px;">Something went wrong</p>
      <p style="font-size:14px;color:var(--cie-muted);margin-bottom:20px;">${msg}</p>
      <a href="mailto:programs@mirajoco.org" style="font-size:14px;color:var(--cie-crimson);">programs@mirajoco.org</a>
    </div>`;
}

function scoreLabel(avg) {
  if (avg == null) return '';
  if (avg < 1.75) return 'avoidant';
  if (avg < 2.5)  return 'reactive';
  if (avg < 3.25) return 'intentional';
  return 'proactive';
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
