<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Preview — MiRAjO Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest:  #122012;
      --forest-mid:   #1E4226;
      --living-green: #256B42;
      --new-growth:   #6DC48A;
      --dry-sage:     #C4A245;
      --parchment:    #F2EBD9;
      --muted:        #6B7B6B;
      --border:       rgba(18,32,18,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #F4F6F4;
      color: var(--deep-forest);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ──────────────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--deep-forest);
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-logo { height: 44px; width: auto; margin: 0 auto 32px; display: block; }
    .login-card h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .login-card p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
    .login-input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--deep-forest);
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--living-green); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--living-green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .login-error { display: none; margin-top: 14px; font-size: 13px; color: #c0392b; }

    /* ── DASHBOARD SHELL ────────────────────────────────────── */
    #app { display: none; height: 100vh; flex-direction: column; }

    .top-bar {
      background: var(--deep-forest);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .top-bar img { height: 36px; width: auto; }
    .top-bar-center {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .top-bar-link {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .top-bar-link:hover { color: rgba(255,255,255,0.85); }
    .logout-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.18); }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    .body-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ────────────────────────────────────────────── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
    }
    .sidebar-section {
      margin-bottom: 8px;
    }
    .sidebar-heading {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      color: var(--muted);
      padding: 8px 20px 6px;
    }
    .sidebar-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
    }
    .tag-trial { background: #FFF8E6; color: #A0720A; }
    .tag-paid  { background: #E8F5EE; color: #1E7E44; }

    .step-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      color: var(--deep-forest);
      transition: background 0.15s;
      line-height: 1.4;
    }
    .step-btn:hover { background: #F4F6F4; }
    .step-btn.active {
      background: #EDF4F0;
      color: var(--living-green);
      font-weight: 600;
    }
    .step-day {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
      display: block;
      margin-bottom: 2px;
    }
    .step-btn.active .step-day { color: var(--living-green); opacity: 0.7; }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 20px;
    }

    /* ── PREVIEW AREA ───────────────────────────────────────── */
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #F4F6F4;
    }

    .preview-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      flex-shrink: 0;
    }
    .preview-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .preview-sequence-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .preview-step-badge {
      font-size: 11px;
      background: #F4F6F4;
      color: var(--muted);
      padding: 2px 10px;
      border-radius: 20px;
    }
    .preview-subject {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      color: var(--deep-forest);
      font-weight: 400;
    }
    .preview-subline {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .preview-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .nav-btn {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: var(--deep-forest);
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #F4F6F4; }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .nav-label {
      font-size: 12px;
      color: var(--muted);
    }

    .preview-frame-wrap {
      flex: 1;
      overflow: auto;
      padding: 24px;
    }
    .preview-frame-outer {
      max-width: 620px;
      margin: 0 auto;
      background: #F9F6F0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(18,32,18,0.08);
    }
    #preview-iframe {
      width: 100%;
      border: none;
      display: block;
      min-height: 600px;
    }

    .empty-preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
    }
    .empty-preview svg { opacity: 0.3; }
    .empty-preview p { font-size: 14px; }

    .loading-bar {
      display: none;
      height: 3px;
      background: linear-gradient(90deg, var(--living-green) 0%, var(--new-growth) 100%);
      animation: loading 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes loading {
      0%   { opacity: 1; }
      50%  { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ───────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <img class="login-logo" src="/img/logo-horizontal.png" alt="MiRAjO">
    <h1>Email Previews</h1>
    <p>Admin access required</p>
    <input class="login-input" id="username" type="text" placeholder="Username" autocomplete="username">
    <input class="login-input" id="password" type="password" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── APP ─────────────────────────────────────────────────── -->
<div id="app">
  <div class="top-bar">
    <img src="/img/logo-horizontal.png" alt="MiRAjO">
    <span class="top-bar-center">Email Sequence Previews</span>
    <div class="top-bar-right">
      <a href="/admin/dashboard" class="top-bar-link">← Dashboard</a>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="body-wrap">

    <!-- sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-heading">Money Moves Trial <span class="sidebar-tag tag-trial">Free</span></div>
        <button class="step-btn" data-seq="mm-trial" data-step="1" onclick="loadStep(this)">
          <span class="step-day">Day 0</span>
          You're in. Let's build something real.
        </button>
        <button class="step-btn" data-seq="mm-trial" data-step="2" onclick="loadStep(this)">
          <span class="step-day">Day 3</span>
          The #1 reason budgets don't work
        </button>
        <button class="step-btn" data-seq="mm-trial" data-step="3" onclick="loadStep(this)">
          <span class="step-day">Day 7</span>
          One week in — are you using this yet?
        </button>
        <button class="step-btn" data-seq="mm-trial" data-step="4" onclick="loadStep(this)">
          <span class="step-day">Day 14</span>
          You don't need a perfect budget
        </button>
        <button class="step-btn" data-seq="mm-trial" data-step="5" onclick="loadStep(this)">
          <span class="step-day">Day 21</span>
          9 days left — upgrade nudge
        </button>
        <button class="step-btn" data-seq="mm-trial" data-step="6" onclick="loadStep(this)">
          <span class="step-day">Day 29</span>
          Last day of your trial
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="sidebar-heading">Money Moves Paid <span class="sidebar-tag tag-paid">Subscriber</span></div>
        <button class="step-btn" data-seq="mm-paid" data-step="1" onclick="loadStep(this)">
          <span class="step-day">Day 0</span>
          You're officially in. Welcome.
        </button>
        <button class="step-btn" data-seq="mm-paid" data-step="2" onclick="loadStep(this)">
          <span class="step-day">Day 3</span>
          Why the calendar method works
        </button>
        <button class="step-btn" data-seq="mm-paid" data-step="3" onclick="loadStep(this)">
          <span class="step-day">Day 7</span>
          A money habit that takes 5 minutes
        </button>
        <button class="step-btn" data-seq="mm-paid" data-step="4" onclick="loadStep(this)">
          <span class="step-day">Day 14</span>
          Are you tracking one-time expenses?
        </button>
        <button class="step-btn" data-seq="mm-paid" data-step="5" onclick="loadStep(this)">
          <span class="step-day">Day 21</span>
          Three weeks in. You're building something real.
        </button>
        <button class="step-btn" data-seq="mm-paid" data-step="6" onclick="loadStep(this)">
          <span class="step-day">Day 30</span>
          One month. A note from me.
        </button>
      </div>
    </div>

    <!-- preview -->
    <div class="preview-area" id="preview-area">
      <div class="loading-bar" id="loading-bar"></div>

      <div id="preview-header" class="preview-header" style="display:none;">
        <div class="preview-meta">
          <span class="preview-sequence-label" id="preview-seq-label"></span>
          <span class="preview-step-badge" id="preview-step-badge"></span>
        </div>
        <div class="preview-subject" id="preview-subject"></div>
        <div class="preview-subline" id="preview-subline"></div>
        <div class="preview-nav">
          <button class="nav-btn" id="btn-prev" onclick="navStep(-1)">← Prev</button>
          <button class="nav-btn" id="btn-next" onclick="navStep(1)">Next →</button>
          <span class="nav-label" id="nav-label"></span>
        </div>
      </div>

      <div id="empty-state" class="empty-preview">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#122012" stroke-width="1.5">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 8l10 7 10-7"/>
        </svg>
        <p>Select an email from the sidebar to preview it</p>
      </div>

      <div id="frame-wrap" class="preview-frame-wrap" style="display:none;">
        <div class="preview-frame-outer">
          <iframe id="preview-iframe" title="Email preview" scrolling="no"></iframe>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const STEPS = {
    'mm-trial': 6,
    'mm-paid':  6,
  };

  const SEQ_LABELS = {
    'mm-trial': 'Money Moves — Trial',
    'mm-paid':  'Money Moves — Paid',
  };

  let creds    = null;
  let curSeq   = null;
  let curStep  = null;

  // ── AUTH ─────────────────────────────────────────────────────────
  async function login() {
    const btn  = document.getElementById('login-btn');
    const err  = document.getElementById('login-error');
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.style.display = 'none';

    try {
      const res = await fetch('/api/admin-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Invalid credentials');

      creds = { username: user, password: pass };
      sessionStorage.setItem('epCreds', JSON.stringify(creds));
      showApp();
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function logout() {
    sessionStorage.removeItem('epCreds');
    location.reload();
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // ── INIT ─────────────────────────────────────────────────────────
  const saved = sessionStorage.getItem('epCreds');
  if (saved) { creds = JSON.parse(saved); showApp(); }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
  }

  // ── LOAD STEP ────────────────────────────────────────────────────
  async function loadStep(btn) {
    const seq  = btn.dataset.seq;
    const step = parseInt(btn.dataset.step, 10);

    document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    curSeq  = seq;
    curStep = step;

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('frame-wrap').style.display   = 'none';
    document.getElementById('preview-header').style.display = 'none';
    document.getElementById('loading-bar').style.display  = 'block';

    try {
      const res = await fetch('/api/email-preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...creds, sequence: seq, step }),
      });

      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      // Subject + meta
      document.getElementById('preview-seq-label').textContent = SEQ_LABELS[seq] || seq;
      document.getElementById('preview-step-badge').textContent = `Email ${step} of ${STEPS[seq]}`;
      document.getElementById('preview-subject').textContent    = data.subject;
      document.getElementById('preview-subline').textContent    = `From: Miranda J <mirandaj@mirajoco.org>`;
      document.getElementById('nav-label').textContent          = `${step} / ${STEPS[seq]}`;
      document.getElementById('btn-prev').disabled              = step <= 1;
      document.getElementById('btn-next').disabled              = step >= STEPS[seq];

      // Render into iframe
      const iframe = document.getElementById('preview-iframe');
      iframe.srcdoc = data.html;
      iframe.onload = () => {
        const h = iframe.contentDocument?.body?.scrollHeight;
        if (h) iframe.style.minHeight = (h + 32) + 'px';
      };

      document.getElementById('preview-header').style.display = 'block';
      document.getElementById('frame-wrap').style.display     = 'block';
    } catch (e) {
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('empty-state').querySelector('p').textContent = 'Failed to load preview — ' + e.message;
    } finally {
      document.getElementById('loading-bar').style.display = 'none';
    }
  }

  function navStep(dir) {
    if (!curSeq || !curStep) return;
    const next = curStep + dir;
    if (next < 1 || next > STEPS[curSeq]) return;
    const btn = document.querySelector(`.step-btn[data-seq="${curSeq}"][data-step="${next}"]`);
    if (btn) loadStep(btn);
  }
</script>
</body>
</html>
