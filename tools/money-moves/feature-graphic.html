<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Money Moves — Feature Graphic</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #0d1c0d;
  }

  .graphic {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0d1c0d 0%, #122012 40%, #1a2e1a 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 70px 0 60px;
    position: relative;
    overflow: hidden;
  }

  /* subtle grid pattern overlay */
  .graphic::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(109,196,138,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(109,196,138,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* glow blob behind logo */
  .glow {
    position: absolute;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,107,66,0.18) 0%, transparent 70%);
    left: -60px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  /* left column */
  .left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 24px;
    z-index: 2;
    flex: 0 0 auto;
  }

  .logo-wrap img {
    height: 80px;
    width: auto;
    display: block;
  }

  .tagline {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 36px;
    color: #C4A245;
    line-height: 1.25;
    letter-spacing: 0.01em;
  }

  .tagline span {
    display: block;
  }

  /* right column — dashboard preview card */
  .right {
    z-index: 2;
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: flex-end;
  }

  .stats-card {
    background: rgba(18,32,18,0.85);
    border: 1px solid rgba(109,196,138,0.2);
    border-radius: 12px;
    overflow: hidden;
    width: 530px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .stats-card img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }

  /* pill badges */
  .badges {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge {
    background: rgba(37,107,66,0.25);
    border: 1px solid rgba(109,196,138,0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #6DC48A;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* app name below tagline */
  .app-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: rgba(242,235,217,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="graphic">
  <div class="glow"></div>

  <div class="left">
    <div class="logo-wrap">
      <img src="/img/mm-logo.png" alt="Money Moves logo">
    </div>
    <div class="tagline">
      <span>Your money.</span>
      <span>Your calendar.</span>
      <span>Your move.</span>
    </div>
    <div class="app-name">Money Moves by MiRAjO</div>
  </div>

  <div class="right">
    <div class="stats-card">
      <img src="/tools/money-moves/feature-stats.png" alt="Dashboard preview">
    </div>
    <div class="badges">
      <span class="badge">7-Year Forecast</span>
      <span class="badge">Mortgage Calculator</span>
      <span class="badge">DTI & Debt Payoff</span>
      <span class="badge">Family Plan</span>
    </div>
  </div>
</div>
</body>
</html>
