<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="manifest" href="/tools/money-moves/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Money Moves">
  <meta name="theme-color" content="#122012">
  <title>Confirming... — Money Moves by MiRAjO</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest:    #122012;
      --living-green:   #256B42;
      --new-growth:     #6DC48A;
      --dry-sage:       #C4A245;
      --warm-parchment: #F2EBD9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--new-growth);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 40px rgba(18,32,18,0.12);
    }
    .logo { height: 64px; width: auto; margin: 0 auto 8px; display: block; }
    .badge {
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--dry-sage); margin-bottom: 32px;
      display: block;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(37,107,66,0.15);
      border-top-color: var(--living-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px; color: var(--deep-forest); margin-bottom: 12px;
    }
    .sub { font-size: 14px; color: var(--living-green); opacity: 0.75; line-height: 1.7; }
    .error { font-size: 14px; color: #c0392b; line-height: 1.7; }
    .back {
      display: inline-block; margin-top: 28px; font-size: 13px;
      color: var(--living-green); text-decoration: none; opacity: 0.7;
    }
    .back:hover { opacity: 1; }
    .resend-input {
      width: 100%; padding: 14px 18px; margin-top: 16px;
      border: 1px solid rgba(37,107,66,0.25); border-radius: 10px;
      font-size: 15px; font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--deep-forest); background: #f5faf7; outline: none;
      transition: border-color 0.2s;
    }
    .resend-input:focus { border-color: var(--living-green); }
    .set-pw-btn {
      width: 100%; margin-top: 14px; padding: 16px;
      background: var(--deep-forest); color: var(--warm-parchment);
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.2s;
    }
    .set-pw-btn:hover { opacity: 0.85; }
    .set-pw-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .pw-msg { margin-top: 14px; font-size: 14px; line-height: 1.6; min-height: 20px; }
  </style>
  <script src="/analytics.js"></script>
</head>
<body>
<div class="card">
  <a href="https://www.mirajoco.org">
    <img src="/img/logo-horizontal.png" alt="MiRAjO" class="logo">
  </a>
  <span class="badge">Money Moves</span>
  <div class="spinner" id="spinner"></div>
  <h1 class="title" id="title">Signing you in...</h1>
  <p class="sub" id="sub">Just a moment while we confirm your link.</p>
  <a href="/tools/money-moves/login" class="back" id="back-link" style="display:none">← Back to Login</a>

  <!-- Set password form (shown on password reset flow) -->
  <div id="set-password-section" style="display:none;margin-top:8px;text-align:left;">
    <input type="password" id="pw-input" class="resend-input" placeholder="New password (min 8 characters)">
    <input type="password" id="pw-confirm" class="resend-input" placeholder="Confirm password" style="margin-top:10px;">
    <button class="set-pw-btn" id="set-pw-btn">Set Password</button>
    <p class="pw-msg" id="pw-msg"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/api/config"></script>
<script>
(async function () {
  const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  async function confirm() {
    // Exchange the token in the URL hash for a session
    const { data, error } = await supabase.auth.getSession();

    if (error || !data.session) {
      // Try exchanging code from URL (magic link flow)
      const hashParams = new URLSearchParams(window.location.hash.replace('#', '?').slice(1));
      const accessToken  = hashParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token');

      if (accessToken) {
        const { error: setErr } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        if (setErr) return showError();
        return afterSession();
      }

      // PKCE / code flow
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (code) {
        const { error: exchErr } = await supabase.auth.exchangeCodeForSession(code);
        if (exchErr) return showError();
        return afterSession();
      }

      return showError();
    }

    afterSession();
  }

  async function afterSession() {
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace('#', '?').slice(1));

    // Password reset flow — show set-password form
    if (params.get('setup') === '1' || hashParams.get('type') === 'recovery') {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Set your password';
      document.getElementById('sub').textContent = 'Choose a password to use every time you log in.';
      document.getElementById('set-password-section').style.display = 'block';

      document.getElementById('set-pw-btn').addEventListener('click', async function () {
        const pw  = document.getElementById('pw-input').value;
        const pw2 = document.getElementById('pw-confirm').value;
        const msg = document.getElementById('pw-msg');

        if (pw.length < 8) {
          msg.textContent = 'Password must be at least 8 characters.';
          msg.style.color = '#c0392b';
          return;
        }
        if (pw !== pw2) {
          msg.textContent = 'Passwords do not match.';
          msg.style.color = '#c0392b';
          return;
        }

        this.textContent = 'Setting password...';
        this.disabled = true;

        const { error } = await supabase.auth.updateUser({ password: pw });
        if (error) {
          msg.textContent = 'Something went wrong. Please try again.';
          msg.style.color = '#c0392b';
          this.textContent = 'Set Password';
          this.disabled = false;
          return;
        }

        msg.textContent = 'Password set! Taking you to your dashboard...';
        msg.style.color = '#256B42';
        setTimeout(() => { window.location.href = '/tools/money-moves/dashboard'; }, 1500);
      });
      return;
    }

    // Activate invited household members (no-op for owners/returning users)
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.access_token) {
        const r = await fetch('/api/mm-activate-member', {
          method: 'POST',
          headers: { Authorization: `Bearer ${session.access_token}` },
        });
        const result = await r.json();
        if (result.activated) {
          document.getElementById('title').textContent = 'You\'re in!';
          document.getElementById('sub').textContent = 'You have joined the household. Taking you to your dashboard...';
          setTimeout(() => { window.location.href = '/tools/money-moves/dashboard?welcome=member'; }, 1800);
          return;
        }
      }
    } catch (e) {
      console.warn('[confirm] Activation check failed:', e.message);
    }
    redirect();
  }

  function redirect() {
    const params = new URLSearchParams(window.location.search);
    // New subscriber coming from Stripe success
    if (params.get('checkout') === 'success') {
      document.getElementById('title').textContent = 'You\'re in!';
      document.getElementById('sub').textContent = 'Your Money Moves account is ready. Taking you to your dashboard...';
      setTimeout(() => { window.location.href = '/tools/money-moves/dashboard?welcome=1'; }, 1800);
    } else {
      window.location.href = '/tools/money-moves/dashboard';
    }
  }

  function showError() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'This link has expired.';
    document.getElementById('sub').className = 'error';
    document.getElementById('sub').textContent = 'Magic links expire after 1 hour. Request a new one below.';
    document.getElementById('back-link').style.display = 'inline-block';
  }

  confirm();
})();
</script>
</body>
</html>
