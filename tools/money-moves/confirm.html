<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirming... — Money Moves by MiRAjO</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest:    #122012;
      --living-green:   #256B42;
      --new-growth:     #6DC48A;
      --dry-sage:       #C4A245;
      --warm-parchment: #F2EBD9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--new-growth);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 40px rgba(18,32,18,0.12);
    }
    .logo { height: 64px; width: auto; margin: 0 auto 8px; display: block; }
    .badge {
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--dry-sage); margin-bottom: 32px;
      display: block;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(37,107,66,0.15);
      border-top-color: var(--living-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px; color: var(--deep-forest); margin-bottom: 12px;
    }
    .sub { font-size: 14px; color: var(--living-green); opacity: 0.75; line-height: 1.7; }
    .error { font-size: 14px; color: #c0392b; line-height: 1.7; }
    .back {
      display: inline-block; margin-top: 28px; font-size: 13px;
      color: var(--living-green); text-decoration: none; opacity: 0.7;
    }
    .back:hover { opacity: 1; }
  </style>
  <script src="/analytics.js"></script>
</head>
<body>
<div class="card">
  <a href="https://www.mirajoco.org">
    <img src="/img/Where Authenticity is the new blue check (250 x 150 px) (800 x 312 px) (450 x 70 px) (Logo) (1).png" alt="MiRAjO" class="logo">
  </a>
  <span class="badge">Money Moves</span>
  <div class="spinner" id="spinner"></div>
  <h1 class="title" id="title">Signing you in...</h1>
  <p class="sub" id="sub">Just a moment while we confirm your link.</p>
  <a href="/tools/money-moves/login" class="back" id="back-link" style="display:none">← Back to Login</a>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const supabase = createClient(
    'https://YOUR_SUPABASE_URL.supabase.co',
    'YOUR_SUPABASE_ANON_KEY'
  );

  async function confirm() {
    // Exchange the token in the URL hash for a session
    const { data, error } = await supabase.auth.getSession();

    if (error || !data.session) {
      // Try exchanging code from URL (magic link flow)
      const hashParams = new URLSearchParams(window.location.hash.replace('#', '?').slice(1));
      const accessToken  = hashParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token');

      if (accessToken) {
        const { error: setErr } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        if (setErr) return showError();
        return redirect();
      }

      // PKCE / code flow
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (code) {
        const { error: exchErr } = await supabase.auth.exchangeCodeForSession(code);
        if (exchErr) return showError();
        return redirect();
      }

      return showError();
    }

    redirect();
  }

  function redirect() {
    const params = new URLSearchParams(window.location.search);
    // New subscriber coming from Stripe success
    if (params.get('checkout') === 'success') {
      document.getElementById('title').textContent = 'You\'re in!';
      document.getElementById('sub').textContent = 'Your Money Moves account is ready. Taking you to your dashboard...';
      setTimeout(() => { window.location.href = '/tools/money-moves/dashboard?welcome=1'; }, 1800);
    } else {
      window.location.href = '/tools/money-moves/dashboard';
    }
  }

  function showError() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'This link has expired.';
    document.getElementById('sub').className = 'error';
    document.getElementById('sub').textContent = 'Magic links expire after 1 hour. Request a new one below.';
    document.getElementById('back-link').style.display = 'inline-block';
  }

  confirm();
</script>
</body>
</html>
