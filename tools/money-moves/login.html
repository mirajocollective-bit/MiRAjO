<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="manifest" href="/tools/money-moves/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Money Moves">
  <meta name="theme-color" content="#122012">
  <title>Login — Money Moves by MiRAjO</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest:    #122012;
      --forest-mid:     #1E4226;
      --living-green:   #256B42;
      --new-growth:     #6DC48A;
      --dry-sage:       #C4A245;
      --warm-parchment: #F2EBD9;
      --soft-white:     #FAF7F2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--new-growth);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 4px 40px rgba(18,32,18,0.12);
    }

    .logo { height: 32px; width: auto; display: block; }

    .product-badge {
      display: inline-block;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--dry-sage);
      margin-bottom: 24px;
    }

    .title {
      font-family: 'Instrument Serif', serif;
      font-size: 30px;
      font-weight: 400;
      color: var(--deep-forest);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .sub {
      font-size: 14px;
      color: var(--forest-mid);
      margin-bottom: 36px;
      line-height: 1.7;
      opacity: 0.75;
    }

    .form { display: flex; flex-direction: column; gap: 12px; }

    .input {
      width: 100%;
      padding: 16px 20px;
      background: #f5faf7;
      border: 1px solid rgba(37,107,66,0.2);
      border-radius: 10px;
      font-size: 15px;
      color: var(--deep-forest);
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
    }

    .input::placeholder { color: rgba(37,107,66,0.35); }
    .input:focus { border-color: var(--living-green); }

    .btn {
      width: 100%;
      padding: 18px;
      background: var(--deep-forest);
      color: var(--warm-parchment);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 8px 32px rgba(18,32,18,0.2);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(18,32,18,0.28); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
      min-height: 20px;
      color: var(--living-green);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(18,32,18,0.08);
      margin: 32px 0 24px;
    }

    .new-user {
      font-size: 13px;
      color: var(--forest-mid);
      opacity: 0.75;
      margin-bottom: 12px;
    }

    .cta-link {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      color: var(--living-green);
      text-decoration: none;
      border: 1px solid rgba(37,107,66,0.3);
      border-radius: 8px;
      padding: 10px 20px;
      transition: background 0.2s, color 0.2s;
    }
    .cta-link:hover { background: var(--living-green); color: #fff; }

    .back {
      display: block;
      margin-top: 24px;
      font-size: 13px;
      color: var(--forest-mid);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .back:hover { opacity: 1; }

    @media (max-width: 480px) { .card { padding: 40px 28px; } }
  </style>
  <script src="/analytics.js"></script>
</head>
<body>

<div class="card">
  <a href="https://www.mirajoco.org" style="display:block;text-align:right;margin-bottom:20px;">
    <img src="/img/logo-horizontal.png" alt="MiRAjO" class="logo">
  </a>
  <div class="product-badge">Money Moves</div>

  <h1 class="title">Welcome Back</h1>
  <p class="sub">Enter your email and we'll send you a secure login link. No password needed.</p>

  <form class="form" id="login-form">
    <input type="email" class="input" id="email-input" placeholder="Your email address" required>
    <button type="submit" class="btn" id="login-btn">Send My Login Link</button>
  </form>

  <p class="msg" id="login-msg"></p>

  <hr class="divider">
  <p class="new-user">Don't have an account yet?</p>
  <a href="/tools/money-moves" class="cta-link">Start Your Free Trial</a>

  <a href="https://www.mirajoco.org" class="back">← Back to MiRAjO</a>
</div>

<script>
  // Check if already logged in
  (async function () {
    const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/tools/money-moves/dashboard';
  })();

  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn   = document.getElementById('login-btn');
    const msg   = document.getElementById('login-msg');
    const email = document.getElementById('email-input').value.trim();

    btn.textContent = 'Sending...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/mm-auth-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      if (res.ok) {
        msg.textContent = 'Check your email — your login link is on its way.';
        msg.style.color = '#256B42';
        btn.textContent = 'Send My Login Link';
        btn.disabled = false;
        this.reset();
      } else {
        throw new Error();
      }
    } catch {
      msg.textContent = 'Something went wrong. Please try again.';
      msg.style.color = '#E88080';
      btn.textContent = 'Send My Login Link';
      btn.disabled = false;
    }
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/api/config"></script>

</body>
</html>
