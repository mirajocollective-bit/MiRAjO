<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Money Moves by MiRAjO</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --deep-forest:    #111111;
      --forest-mid:     #374151;
      --living-green:   #111111;
      --new-growth:     #9CA3AF;
      --dry-sage:       #F59E0B;
      --warm-parchment: #F5F5F4;
      --soft-white:     #FAFAFA;
      --income-color:   #059669;
      --expense-color:  #EF4444;
      --neutral:        #6b7280;
      --border:         rgba(0,0,0,0.07);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #E8E4DC;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--deep-forest);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Nav ── */
    .nav {
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      padding: 0 32px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-logo  { height: 36px; width: auto; }
    .nav-product { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #9CA3AF; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-back { font-size: 13px; color: #6B7280; text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: #111; }
    .export-btn {
      font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 8px;
      border: none; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
      transition: opacity 0.2s;
    }
    .export-btn:hover { opacity: 0.8; }
    .export-csv { background: var(--dry-sage); color: var(--deep-forest); }
    .export-pdf { background: var(--warm-parchment); color: var(--deep-forest); }

    /* ── Filters bar ── */
    .filters-bar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 8px 20px; display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--neutral); }
    .filter-select {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 12px; font-family: 'IBM Plex Sans', sans-serif;
      color: var(--deep-forest); background: #fff; outline: none; cursor: pointer;
      transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--living-green); }
    .filter-divider { width: 1px; height: 24px; background: var(--border); }

    /* ── Layout ── */
    .layout {
      max-width: 1200px; margin: 0 auto; padding: 14px 20px 40px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Cards ── */
    .report-card {
      background: #fff; border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .card-header {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-family: 'Instrument Serif', serif; font-size: 16px; color: var(--deep-forest); }
    .card-sub   { font-size: 11px; color: var(--neutral); margin-top: 1px; }
    .card-body  { padding: 14px 16px; }

    /* ── Summary row ── */
    .summary-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px;
    }
    .summary-tile {
      background: var(--soft-white); border-radius: 8px; padding: 10px 14px;
      border: 1px solid var(--border);
    }
    .tile-label  { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--neutral); margin-bottom: 4px; }
    .tile-amount { font-family: 'IBM Plex Sans', sans-serif; font-size: 20px; font-weight: 400; line-height: 1.1; }
    .tile-amount.income  { color: var(--income-color); }
    .tile-amount.expense { color: var(--expense-color); }
    .tile-amount.net     { color: var(--deep-forest); }
    .tile-sub { font-size: 11px; color: var(--neutral); margin-top: 3px; }

    /* ── P&L Table ── */
    .pl-table { width: 100%; border-collapse: collapse; }
    .pl-table th {
      font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
      color: var(--neutral); padding: 7px 12px; text-align: left;
      border-bottom: 1px solid var(--border); background: var(--soft-white);
    }
    .pl-table th:not(:first-child) { text-align: right; }
    .pl-table td {
      padding: 7px 12px; font-size: 12px; border-bottom: 1px solid var(--border);
    }
    .pl-table td:not(:first-child) { text-align: right; font-weight: 500; }
    .pl-table tr:last-child td { border-bottom: none; }
    .pl-table tr:hover td { background: rgba(0,0,0,0.015); }

    .pl-section-header td {
      background: rgba(0,0,0,0.03); font-size: 10px; font-weight: 500;
      letter-spacing: 1.5px; text-transform: uppercase; color: var(--neutral);
      padding: 5px 12px;
    }
    .pl-total-row td {
      background: rgba(0,0,0,0.03); font-weight: 500; font-size: 12px;
      border-top: 1px solid var(--border);
    }
    .pl-net-row td {
      background: #111; color: #fff;
      font-weight: 500; font-size: 13px;
    }
    .pl-net-row td:not(:first-child) { text-align: right; }

    .positive { color: var(--income-color); }
    .negative { color: var(--expense-color); }

    /* ── Category breakdown ── */
    .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .cat-item { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; }
    .cat-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .cat-item-name { font-size: 12px; font-weight: 400; }
    .cat-item-amt  { font-size: 12px; font-weight: 400; }
    .cat-item-amt.income  { color: var(--income-color); }
    .cat-item-amt.expense { color: var(--expense-color); }
    .cat-item-bar { height: 3px; background: rgba(0,0,0,0.07); border-radius: 99px; overflow: hidden; }
    .cat-item-fill { height: 100%; border-radius: 99px; }
    .cat-item-pct { font-size: 10px; color: var(--neutral); margin-top: 3px; }

    /* ── Monthly trend ── */
    .trend-table { width: 100%; border-collapse: collapse; }
    .trend-table th {
      font-size: 10px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--neutral); padding: 6px 10px; text-align: right; border-bottom: 1px solid var(--border);
    }
    .trend-table th:first-child { text-align: left; }
    .trend-table td { padding: 7px 10px; font-size: 12px; text-align: right; border-bottom: 1px solid var(--border); }
    .trend-table td:first-child { text-align: left; font-weight: 400; }
    .trend-table tr:last-child td { border-bottom: none; }
    .trend-table tr:hover td { background: rgba(0,0,0,0.015); }
    .trend-bar-cell { width: 90px; padding: 7px 10px; }
    .trend-bar { height: 4px; background: rgba(0,0,0,0.07); border-radius: 99px; overflow: hidden; }
    .trend-bar-fill { height: 100%; border-radius: 99px; background: var(--living-green); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 28px 16px;
      font-size: 13px; color: var(--neutral);
    }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    /* ── Date input ── */
    .filter-input {
      padding: 5px 8px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 12px; font-family: 'IBM Plex Sans', sans-serif;
      color: var(--deep-forest); background: #fff; outline: none;
      transition: border-color 0.2s; cursor: pointer;
    }
    .filter-input:focus { border-color: var(--living-green); }
    .custom-range { display: none; align-items: center; gap: 6px; }
    .custom-range.visible { display: flex; }

    /* ── Export dropdown ── */
    .export-wrap { position: relative; }
    .export-main {
      font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 8px;
      border: none; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
      background: #F59E0B; color: #111;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .export-main:hover { opacity: 0.85; }
    .export-menu {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: #fff; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(18,32,18,0.14);
      min-width: 220px; z-index: 200; overflow: hidden;
    }
    .export-menu.open { display: block; }
    .export-menu button {
      display: block; width: 100%; text-align: left;
      padding: 12px 16px; border: none; background: none; cursor: pointer;
      font-size: 13px; font-family: 'IBM Plex Sans', sans-serif;
      color: var(--deep-forest); transition: background 0.15s;
    }
    .export-menu button:hover { background: var(--soft-white); }
    .export-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .export-menu-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--neutral); padding: 8px 16px 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .nav { padding: 0 12px; }
      .filters-bar { padding: 6px 12px; gap: 7px; }
      .layout { padding: 10px 12px 40px; }
      .summary-row { grid-template-columns: 1fr; }
      .cat-grid { grid-template-columns: 1fr; }
      .card-body { padding: 10px 12px; }
      .card-header { padding: 8px 12px; }
      .filter-divider { display: none; }
    }
  </style>
  <script src="/analytics.js"></script>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-left">
    <a href="https://www.mirajoco.org">
      <img src="/img/mm-logo.png" alt="Money Moves" class="nav-logo">
    </a>
    <span class="nav-product">Money Moves</span>
  </div>
  <div class="nav-right">
    <div class="export-wrap" id="export-wrap">
      <button class="export-main" onclick="toggleExportMenu()">Export ▾</button>
      <div class="export-menu" id="export-menu">
        <div class="export-menu-label">CSV</div>
        <button onclick="exportCSV(); closeExportMenu()">Transaction List (.csv)</button>
        <div class="export-menu-divider"></div>
        <div class="export-menu-label">PDF</div>
        <button onclick="exportPDF('pl'); closeExportMenu()">P&amp;L Statement (.pdf)</button>
        <button onclick="exportPDF('categories'); closeExportMenu()">Category Report (.pdf)</button>
        <button onclick="exportPDF('transactions'); closeExportMenu()">Transaction List (.pdf)</button>
      </div>
    </div>
    <a href="/tools/money-moves/dashboard" class="nav-back">← Dashboard</a>
  </div>
</nav>

<!-- Filters -->
<div class="filters-bar">
  <span class="filter-label">Account</span>
  <select class="filter-select" id="filter-account" onchange="applyFilters()">
    <option value="all">All Accounts</option>
  </select>
  <div class="filter-divider"></div>
  <span class="filter-label">Period</span>
  <select class="filter-select" id="filter-period" onchange="onPeriodChange()">
    <option value="this_month">This Month</option>
    <option value="last_month">Last Month</option>
    <option value="this_quarter">This Quarter</option>
    <option value="last_quarter">Last Quarter</option>
    <option value="this_year" selected>This Year</option>
    <option value="last_year">Last Year</option>
    <option value="all_time">All Time</option>
    <option value="custom">Custom Range</option>
  </select>
  <div class="custom-range" id="custom-range">
    <input type="date" class="filter-input" id="custom-start" onchange="applyFilters()">
    <span style="font-size:12px;color:var(--neutral)">to</span>
    <input type="date" class="filter-input" id="custom-end" onchange="applyFilters()">
  </div>
  <div class="filter-divider"></div>
  <span class="filter-label">Type</span>
  <select class="filter-select" id="filter-type" onchange="applyFilters()">
    <option value="all">All</option>
    <option value="income">Income</option>
    <option value="expense">Expenses</option>
  </select>
  <div class="filter-divider"></div>
  <span class="filter-label">Category</span>
  <select class="filter-select" id="filter-category" onchange="applyFilters()">
    <option value="all">All Categories</option>
  </select>
  <div class="filter-divider"></div>
  <span class="filter-label">View</span>
  <select class="filter-select" id="filter-view" onchange="applyFilters()">
    <option value="pl">P&amp;L Statement</option>
    <option value="categories">By Category</option>
    <option value="monthly">Monthly Trend</option>
    <option value="transactions">Transaction List</option>
  </select>
</div>

<!-- Main content -->
<div class="layout" id="report-layout">
  <div class="empty-state">
    <div class="empty-icon">📊</div>
    Loading your reports...
  </div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(async function () {
  const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  // ── Auth guard ──────────────────────────────────────────────────────────────
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/tools/money-moves/login'; return; }
  const user = session.user;

  // ── Subscription gate ────────────────────────────────────────────────────────
  {
    const { data: sub } = await supabase.from('mm_subscriptions')
      .select('status, period_end, stripe_subscription_id')
      .eq('user_id', user.id).maybeSingle();
    const isPending = !sub || sub.stripe_subscription_id === 'pending';
    const trialExpired = isPending && sub && new Date(sub.period_end) < new Date();
    const realSubActive = sub && ['active', 'trialing'].includes(sub.status) && sub.stripe_subscription_id !== 'pending';
    if (!realSubActive && (!sub || trialExpired)) { window.location.href = '/tools/money-moves/pricing'; return; }
  }

  let householdId  = null;
  let accounts     = [];
  let transactions = [];
  let categories   = [];
  let filtered     = [];

  // ── Load ────────────────────────────────────────────────────────────────────
  async function loadAll() {
    const { data: members } = await supabase
      .from('mm_members').select('household_id').eq('user_id', user.id).eq('status','active').limit(1);
    if (!members?.length) return;
    householdId = members[0].household_id;

    const [acctRes, txnRes, catRes] = await Promise.all([
      supabase.from('mm_accounts').select('*').eq('household_id', householdId).eq('is_active', true),
      supabase.from('mm_transactions').select('*').eq('household_id', householdId).order('date'),
      supabase.from('mm_categories').select('*').eq('household_id', householdId),
    ]);

    accounts     = acctRes.data || [];
    transactions = txnRes.data  || [];
    categories   = catRes.data  || [];

    // Populate account filter
    const sel = document.getElementById('filter-account');
    accounts.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id; opt.textContent = a.name;
      sel.appendChild(opt);
    });

    // Populate category filter
    const catSel = document.getElementById('filter-category');
    categories.sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      catSel.appendChild(opt);
    });

    applyFilters();
  }

  // ── Period UI handler ──────────────────────────────────────────────────────
  window.onPeriodChange = function () {
    const period = document.getElementById('filter-period').value;
    const cr = document.getElementById('custom-range');
    if (period === 'custom') {
      cr.classList.add('visible');
    } else {
      cr.classList.remove('visible');
      applyFilters();
    }
  };

  // ── Date range helper ────────────────────────────────────────────────────────
  function getDateRange(period) {
    const now   = new Date();
    const y     = now.getFullYear();
    const m     = now.getMonth();
    const q     = Math.floor(m / 3);

    if (period === 'custom') {
      const s = document.getElementById('custom-start').value;
      const e = document.getElementById('custom-end').value;
      return [s ? new Date(s + 'T00:00:00') : null, e ? new Date(e + 'T23:59:59') : null];
    }

    switch (period) {
      case 'this_month':    return [new Date(y, m, 1),        new Date(y, m + 1, 0)];
      case 'last_month':    return [new Date(y, m - 1, 1),    new Date(y, m, 0)];
      case 'this_quarter':  return [new Date(y, q * 3, 1),    new Date(y, q * 3 + 3, 0)];
      case 'last_quarter':  return [new Date(y, (q-1)*3, 1),  new Date(y, q * 3, 0)];
      case 'this_year':     return [new Date(y, 0, 1),        new Date(y, 11, 31)];
      case 'last_year':     return [new Date(y-1, 0, 1),      new Date(y-1, 11, 31)];
      default:              return [null, null]; // all time
    }
  }

  function periodLabel(period) {
    const map = {
      this_month: 'This Month', last_month: 'Last Month',
      this_quarter: 'This Quarter', last_quarter: 'Last Quarter',
      this_year: 'This Year', last_year: 'Last Year',
      all_time: 'All Time',
    };
    if (period === 'custom') {
      const s = document.getElementById('custom-start').value;
      const e = document.getElementById('custom-end').value;
      return `${s || '—'} to ${e || '—'}`;
    }
    return map[period] || period;
  }

  function fmt(n) {
    return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ── Apply filters ────────────────────────────────────────────────────────────
  window.applyFilters = function () {
    const accountId  = document.getElementById('filter-account').value;
    const period     = document.getElementById('filter-period').value;
    const view       = document.getElementById('filter-view').value;
    const typeFilter = document.getElementById('filter-type').value;
    const catFilter  = document.getElementById('filter-category').value;
    const [start, end] = getDateRange(period);

    filtered = transactions.filter(t => {
      if (accountId !== 'all' && t.account_id !== accountId) return false;
      if (t.type === 'transfer') return false;
      if (typeFilter !== 'all' && t.type !== typeFilter) return false;
      if (catFilter  !== 'all' && t.category_id !== catFilter) return false;
      if (start && new Date(t.date + 'T00:00:00') < start) return false;
      if (end   && new Date(t.date + 'T00:00:00') > end)   return false;
      return true;
    });

    if      (view === 'pl')           renderPL(period);
    else if (view === 'categories')   renderCategories();
    else if (view === 'monthly')      renderMonthly();
    else if (view === 'transactions') renderTransactionList();
  };

  // ── P&L Statement ────────────────────────────────────────────────────────────
  function renderPL(period) {
    const incomes  = filtered.filter(t => t.type === 'income');
    const expenses = filtered.filter(t => t.type === 'expense');

    const totalIncome  = incomes.reduce((s, t)  => s + Number(t.amount), 0);
    const totalExpense = expenses.reduce((s, t) => s + Number(t.amount), 0);
    const net          = totalIncome - totalExpense;

    // Group by category
    const incomeCats  = groupByCategory(incomes);
    const expenseCats = groupByCategory(expenses);

    const layout = document.getElementById('report-layout');
    layout.innerHTML = `
      <div class="summary-row">
        <div class="summary-tile">
          <div class="tile-label">Total Income</div>
          <div class="tile-amount income">${fmt(totalIncome)}</div>
          <div class="tile-sub">${incomes.length} transactions</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">Total Expenses</div>
          <div class="tile-amount expense">${fmt(totalExpense)}</div>
          <div class="tile-sub">${expenses.length} transactions</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">Net ${net >= 0 ? 'Profit' : 'Loss'}</div>
          <div class="tile-amount net ${net >= 0 ? 'positive' : 'negative'}">${net >= 0 ? '' : '-'}${fmt(net)}</div>
          <div class="tile-sub">${Math.round((totalIncome > 0 ? (net / totalIncome) : 0) * 100)}% margin</div>
        </div>
      </div>

      <div class="report-card">
        <div class="card-header">
          <div>
            <div class="card-title">Profit & Loss Statement</div>
            <div class="card-sub" id="pl-period-label"></div>
          </div>
        </div>
        <div class="card-body" style="padding:0">
          <div style="overflow-x:auto">
            <table class="pl-table" id="pl-table">
              <thead>
                <tr>
                  <th style="width:60%">Description</th>
                  <th>Amount</th>
                  <th>% of Total</th>
                </tr>
              </thead>
              <tbody id="pl-body"></tbody>
            </table>
          </div>
        </div>
      </div>`;

    // Build P&L rows
    const body = document.getElementById('pl-body');

    // Income section
    body.innerHTML += `<tr class="pl-section-header"><td colspan="3">INCOME</td></tr>`;
    incomeCats.forEach(c => {
      const pct = totalIncome > 0 ? ((c.total / totalIncome) * 100).toFixed(1) : '0.0';
      body.innerHTML += `<tr>
        <td style="padding-left:28px">${c.name}</td>
        <td class="positive">${fmt(c.total)}</td>
        <td>${pct}%</td>
      </tr>`;
    });
    body.innerHTML += `<tr class="pl-total-row">
      <td>Total Income</td>
      <td class="positive">${fmt(totalIncome)}</td>
      <td>100%</td>
    </tr>`;

    // Expense section
    body.innerHTML += `<tr class="pl-section-header"><td colspan="3">EXPENSES</td></tr>`;
    expenseCats.forEach(c => {
      const pct = totalExpense > 0 ? ((c.total / totalExpense) * 100).toFixed(1) : '0.0';
      body.innerHTML += `<tr>
        <td style="padding-left:28px">${c.name}</td>
        <td class="negative">${fmt(c.total)}</td>
        <td>${pct}%</td>
      </tr>`;
    });
    body.innerHTML += `<tr class="pl-total-row">
      <td>Total Expenses</td>
      <td class="negative">${fmt(totalExpense)}</td>
      <td>100%</td>
    </tr>`;

    // Net row
    body.innerHTML += `<tr class="pl-net-row">
      <td>NET ${net >= 0 ? 'PROFIT' : 'LOSS'}</td>
      <td>${net >= 0 ? '' : '-'}${fmt(net)}</td>
      <td>${totalIncome > 0 ? Math.round((net / totalIncome) * 100) : 0}%</td>
    </tr>`;
  }

  function groupByCategory(txns) {
    const map = {};
    txns.forEach(t => {
      const cat = categories.find(c => c.id === t.category_id);
      const key = cat ? cat.id : 'uncategorized';
      const name = cat ? cat.name : 'Uncategorized';
      if (!map[key]) map[key] = { name, total: 0 };
      map[key].total += Number(t.amount);
    });
    return Object.values(map).sort((a, b) => b.total - a.total);
  }

  // ── Category Breakdown ────────────────────────────────────────────────────────
  function renderCategories() {
    const incomes  = filtered.filter(t => t.type === 'income');
    const expenses = filtered.filter(t => t.type === 'expense');
    const totalIn  = incomes.reduce((s,t)  => s + Number(t.amount), 0);
    const totalOut = expenses.reduce((s,t) => s + Number(t.amount), 0);
    const net      = totalIn - totalOut;

    const incomeCats  = groupByCategory(incomes);
    const expenseCats = groupByCategory(expenses);
    const maxIncome   = incomeCats[0]?.total  || 1;
    const maxExpense  = expenseCats[0]?.total || 1;

    const layout = document.getElementById('report-layout');
    layout.innerHTML = `
      <div class="summary-row">
        <div class="summary-tile">
          <div class="tile-label">Total Income</div>
          <div class="tile-amount income">${fmt(totalIn)}</div>
          <div class="tile-sub">${incomeCats.length} categories</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">Total Expenses</div>
          <div class="tile-amount expense">${fmt(totalOut)}</div>
          <div class="tile-sub">${expenseCats.length} categories</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">Net</div>
          <div class="tile-amount net ${net >= 0 ? 'positive' : 'negative'}">${net >= 0 ? '' : '-'}${fmt(net)}</div>
          <div class="tile-sub">&nbsp;</div>
        </div>
      </div>

      <div class="report-card">
        <div class="card-header">
          <div><div class="card-title">Income by Category</div></div>
        </div>
        <div class="card-body">
          <div class="cat-grid" id="income-cats"></div>
        </div>
      </div>

      <div class="report-card">
        <div class="card-header">
          <div><div class="card-title">Expenses by Category</div></div>
        </div>
        <div class="card-body">
          <div class="cat-grid" id="expense-cats"></div>
        </div>
      </div>`;

    function renderCatGrid(containerId, cats, total, max, type) {
      const el = document.getElementById(containerId);
      if (!cats.length) { el.innerHTML = '<p style="font-size:13px;color:var(--neutral)">No transactions in this period.</p>'; return; }
      el.innerHTML = cats.map(c => {
        const pct   = total > 0 ? ((c.total / total) * 100).toFixed(1) : '0.0';
        const width = max > 0 ? ((c.total / max) * 100) : 0;
        const color = type === 'income' ? 'var(--living-green)' : 'var(--expense-color)';
        return `
          <div class="cat-item">
            <div class="cat-item-top">
              <span class="cat-item-name">${c.name}</span>
              <span class="cat-item-amt ${type}">${fmt(c.total)}</span>
            </div>
            <div class="cat-item-bar">
              <div class="cat-item-fill" style="width:${width}%;background:${color}"></div>
            </div>
            <div class="cat-item-pct">${pct}% of total ${type}</div>
          </div>`;
      }).join('');
    }

    renderCatGrid('income-cats',  incomeCats,  totalIn,  maxIncome,  'income');
    renderCatGrid('expense-cats', expenseCats, totalOut, maxExpense, 'expense');
  }

  // ── Monthly Trend ─────────────────────────────────────────────────────────────
  function renderMonthly() {
    const now  = new Date();
    const rows = [];
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // Last 12 months
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const prefix = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}`;
      const monthTxns = transactions.filter(t => {
        const accountId = document.getElementById('filter-account').value;
        if (accountId !== 'all' && t.account_id !== accountId) return false;
        return t.type !== 'transfer' && t.date?.startsWith(prefix);
      });
      const income  = monthTxns.filter(t => t.type === 'income').reduce((s,t)  => s + Number(t.amount), 0);
      const expense = monthTxns.filter(t => t.type === 'expense').reduce((s,t) => s + Number(t.amount), 0);
      rows.push({ label: `${monthNames[d.getMonth()]} ${d.getFullYear()}`, income, expense, net: income - expense });
    }

    const maxVal = Math.max(...rows.map(r => Math.max(r.income, r.expense)), 1);
    const totalIncome  = rows.reduce((s,r) => s + r.income,  0);
    const totalExpense = rows.reduce((s,r) => s + r.expense, 0);
    const totalNet     = totalIncome - totalExpense;

    const layout = document.getElementById('report-layout');
    layout.innerHTML = `
      <div class="summary-row">
        <div class="summary-tile">
          <div class="tile-label">12-Month Income</div>
          <div class="tile-amount income">${fmt(totalIncome)}</div>
          <div class="tile-sub">avg ${fmt(totalIncome / 12)}/month</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">12-Month Expenses</div>
          <div class="tile-amount expense">${fmt(totalExpense)}</div>
          <div class="tile-sub">avg ${fmt(totalExpense / 12)}/month</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">12-Month Net</div>
          <div class="tile-amount net ${totalNet >= 0 ? 'positive' : 'negative'}">${totalNet >= 0 ? '' : '-'}${fmt(totalNet)}</div>
          <div class="tile-sub">avg ${fmt(totalNet / 12)}/month</div>
        </div>
      </div>

      <div class="report-card">
        <div class="card-header">
          <div><div class="card-title">Monthly Trend — Last 12 Months</div></div>
        </div>
        <div class="card-body" style="padding:0">
          <div style="overflow-x:auto">
            <table class="trend-table">
              <thead>
                <tr>
                  <th>Month</th>
                  <th>Income</th>
                  <th>Expenses</th>
                  <th>Net</th>
                  <th class="trend-bar-cell">Visual</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(r => `
                  <tr>
                    <td>${r.label}</td>
                    <td class="positive">${fmt(r.income)}</td>
                    <td class="negative">${fmt(r.expense)}</td>
                    <td class="${r.net >= 0 ? 'positive' : 'negative'}">${r.net >= 0 ? '+' : '-'}${fmt(r.net)}</td>
                    <td class="trend-bar-cell">
                      <div class="trend-bar">
                        <div class="trend-bar-fill" style="width:${(r.income / maxVal) * 100}%"></div>
                      </div>
                    </td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  // ── Transaction List View ─────────────────────────────────────────────────────
  function renderTransactionList() {
    const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));
    const totalIn  = filtered.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const totalOut = filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    const net      = totalIn - totalOut;

    const layout = document.getElementById('report-layout');
    layout.innerHTML = `
      <div class="summary-row">
        <div class="summary-tile">
          <div class="tile-label">Total Income</div>
          <div class="tile-amount income">${fmt(totalIn)}</div>
          <div class="tile-sub">${filtered.filter(t=>t.type==='income').length} transactions</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">Total Expenses</div>
          <div class="tile-amount expense">${fmt(totalOut)}</div>
          <div class="tile-sub">${filtered.filter(t=>t.type==='expense').length} transactions</div>
        </div>
        <div class="summary-tile">
          <div class="tile-label">Net</div>
          <div class="tile-amount net ${net>=0?'positive':'negative'}">${net>=0?'':'-'}${fmt(net)}</div>
          <div class="tile-sub">${sorted.length} total entries</div>
        </div>
      </div>
      <div class="report-card">
        <div class="card-header">
          <div><div class="card-title">Transaction List</div><div class="card-sub">${sorted.length} transactions</div></div>
        </div>
        <div class="card-body" style="padding:0">
          <div style="overflow-x:auto">
            <table class="pl-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th style="text-align:left">Description</th>
                  <th style="text-align:left">Category</th>
                  <th style="text-align:left">Account</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody>
                ${sorted.length ? sorted.map(t => {
                  const cat  = categories.find(c=>c.id===t.category_id)?.name || '—';
                  const acct = accounts.find(a=>a.id===t.account_id)?.name    || '—';
                  const cls  = t.type==='income'?'positive':'negative';
                  const sign = t.type==='income'?'+':'-';
                  return `<tr>
                    <td style="white-space:nowrap">${t.date}</td>
                    <td style="text-align:left">${t.description||'—'}</td>
                    <td style="text-align:left;color:var(--neutral)">${cat}</td>
                    <td style="text-align:left;color:var(--neutral)">${acct}</td>
                    <td class="${cls}">${sign}${fmt(t.amount)}</td>
                  </tr>`;
                }).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--neutral);padding:32px">No transactions match the current filters.</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  // ── Export helpers ────────────────────────────────────────────────────────────
  window.toggleExportMenu = function () {
    document.getElementById('export-menu').classList.toggle('open');
  };
  window.closeExportMenu = function () {
    document.getElementById('export-menu').classList.remove('open');
  };
  document.addEventListener('click', e => {
    if (!document.getElementById('export-wrap')?.contains(e.target)) closeExportMenu();
  });

  // ── CSV Export ────────────────────────────────────────────────────────────────
  window.exportCSV = function () {
    const period = document.getElementById('filter-period').value;
    const sorted = [...filtered].sort((a,b) => a.date.localeCompare(b.date));

    const headers = ['Date','Description','Type','Amount','Category','Account','Notes'];
    const lines = [headers.join(',')];

    sorted.forEach(t => {
      const cat   = categories.find(c => c.id === t.category_id)?.name || '';
      const acct  = accounts.find(a => a.id === t.account_id)?.name   || '';
      const amt   = t.type === 'expense' ? `-${Number(t.amount).toFixed(2)}` : Number(t.amount).toFixed(2);
      lines.push([
        t.date,
        `"${(t.description || '').replace(/"/g, '""')}"`,
        t.type,
        amt,
        `"${cat}"`,
        `"${acct}"`,
        `"${(t.notes || '').replace(/"/g, '""')}"`,
      ].join(','));
    });

    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `money-moves-transactions-${period}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── PDF Export ─────────────────────────────────────────────────────────────────
  function pdfHeader(doc, subtitle, period) {
    doc.setFillColor(18, 32, 18);
    doc.rect(0, 0, 210, 28, 'F');
    doc.setTextColor(242, 235, 217);
    doc.setFontSize(16); doc.setFont('helvetica', 'bold');
    doc.text('Money Moves by MiRAjO', 14, 12);
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text(`${subtitle} — ${periodLabel(period).toUpperCase()}`, 14, 20);
    doc.text(`Generated ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`, 140, 20);
  }

  function pdfSummaryBoxes(doc, totalIn, totalOut, net, y) {
    const boxes = [
      { label: 'TOTAL INCOME',  value: `$${totalIn.toFixed(2)}`,  color: [37,107,66] },
      { label: 'TOTAL EXPENSES', value: `$${totalOut.toFixed(2)}`, color: [192,57,43] },
      { label: `NET ${net >= 0 ? 'PROFIT' : 'LOSS'}`, value: `${net >= 0 ? '' : '-'}$${Math.abs(net).toFixed(2)}`, color: [18,32,18] },
    ];
    boxes.forEach((b, i) => {
      const x = 14 + i * 62;
      doc.setFillColor(248, 246, 242);
      doc.roundedRect(x, y, 58, 20, 2, 2, 'F');
      doc.setFontSize(7); doc.setFont('helvetica', 'bold'); doc.setTextColor(107, 114, 128);
      doc.text(b.label, x + 4, y + 7);
      doc.setFontSize(12); doc.setTextColor(...b.color);
      doc.text(b.value, x + 4, y + 16);
    });
    return y + 30;
  }

  function pdfFooter(doc) {
    doc.setFontSize(8); doc.setTextColor(150,150,150); doc.setFont('helvetica','normal');
    doc.text('Money Moves by MiRAjO · mirajoco.org', 105, 290, { align: 'center' });
  }

  window.exportPDF = function (mode) {
    const { jsPDF } = window.jspdf;
    const doc    = new jsPDF();
    const period = document.getElementById('filter-period').value;

    const incomes  = filtered.filter(t => t.type === 'income');
    const expenses = filtered.filter(t => t.type === 'expense');
    const totalIn  = incomes.reduce((s,t) => s + Number(t.amount), 0);
    const totalOut = expenses.reduce((s,t) => s + Number(t.amount), 0);
    const net      = totalIn - totalOut;

    if (mode === 'pl') {
      pdfHeader(doc, 'Profit & Loss Statement', period);
      let y = pdfSummaryBoxes(doc, totalIn, totalOut, net, 38);

      const incomeCats  = groupByCategory(incomes);
      const expenseCats = groupByCategory(expenses);

      doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(107,114,128);
      doc.text('INCOME', 14, y); y += 5;
      doc.setDrawColor(200,200,200); doc.line(14, y, 196, y); y += 5;
      incomeCats.forEach(c => {
        doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(18,32,18);
        doc.text(c.name, 22, y);
        doc.setTextColor(37,107,66); doc.setFont('helvetica','bold');
        doc.text(`$${c.total.toFixed(2)}`, 160, y, { align: 'right' }); y += 6;
      });
      doc.setFont('helvetica','bold'); doc.setTextColor(18,32,18);
      doc.text('Total Income', 14, y);
      doc.setTextColor(37,107,66);
      doc.text(`$${totalIn.toFixed(2)}`, 160, y, { align: 'right' }); y += 10;

      doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(107,114,128);
      doc.text('EXPENSES', 14, y); y += 5;
      doc.setDrawColor(200,200,200); doc.line(14, y, 196, y); y += 5;
      expenseCats.forEach(c => {
        if (y > 265) { doc.addPage(); y = 20; pdfFooter(doc); }
        doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(18,32,18);
        doc.text(c.name, 22, y);
        doc.setTextColor(192,57,43); doc.setFont('helvetica','bold');
        doc.text(`$${c.total.toFixed(2)}`, 160, y, { align: 'right' }); y += 6;
      });
      doc.setFont('helvetica','bold'); doc.setTextColor(18,32,18);
      doc.text('Total Expenses', 14, y);
      doc.setTextColor(192,57,43);
      doc.text(`$${totalOut.toFixed(2)}`, 160, y, { align: 'right' }); y += 10;

      doc.setFillColor(18,32,18);
      doc.rect(14, y, 182, 10, 'F');
      doc.setTextColor(242,235,217); doc.setFontSize(10); doc.setFont('helvetica','bold');
      doc.text(`NET ${net >= 0 ? 'PROFIT' : 'LOSS'}`, 18, y + 7);
      doc.text(`${net >= 0 ? '' : '-'}$${Math.abs(net).toFixed(2)}`, 192, y + 7, { align: 'right' });

      pdfFooter(doc);
      doc.save(`money-moves-pl-${period}.pdf`);

    } else if (mode === 'categories') {
      pdfHeader(doc, 'Category Report', period);
      let y = pdfSummaryBoxes(doc, totalIn, totalOut, net, 38);

      const incomeCats  = groupByCategory(incomes);
      const expenseCats = groupByCategory(expenses);

      function renderCatSection(title, cats, total, color) {
        doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(107,114,128);
        doc.text(title, 14, y); y += 5;
        doc.setDrawColor(200,200,200); doc.line(14, y, 196, y); y += 6;
        cats.forEach(c => {
          if (y > 265) { doc.addPage(); y = 20; }
          const pct   = total > 0 ? ((c.total / total) * 100).toFixed(1) : '0.0';
          const barW  = total > 0 ? Math.round((c.total / total) * 80) : 0;
          doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(18,32,18);
          doc.text(c.name, 14, y);
          doc.setTextColor(...color); doc.setFont('helvetica','bold');
          doc.text(`$${c.total.toFixed(2)}`, 130, y, { align: 'right' });
          doc.setTextColor(107,114,128); doc.setFont('helvetica','normal');
          doc.text(`${pct}%`, 145, y);
          doc.setFillColor(230,230,230); doc.rect(155, y - 4, 80, 4, 'F');
          doc.setFillColor(...color); doc.rect(155, y - 4, barW, 4, 'F');
          y += 8;
        });
        y += 4;
      }

      renderCatSection('INCOME BY CATEGORY', incomeCats, totalIn, [37,107,66]);
      renderCatSection('EXPENSES BY CATEGORY', expenseCats, totalOut, [192,57,43]);

      pdfFooter(doc);
      doc.save(`money-moves-categories-${period}.pdf`);

    } else if (mode === 'transactions') {
      pdfHeader(doc, 'Transaction List', period);
      let y = 38;
      const sorted = [...filtered].sort((a,b) => a.date.localeCompare(b.date));

      // Column headers
      doc.setFillColor(248,246,242);
      doc.rect(14, y, 182, 8, 'F');
      doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(107,114,128);
      doc.text('DATE',        16, y + 5.5);
      doc.text('DESCRIPTION', 42, y + 5.5);
      doc.text('CATEGORY',    110, y + 5.5);
      doc.text('ACCOUNT',     148, y + 5.5);
      doc.text('AMOUNT',      196, y + 5.5, { align: 'right' });
      y += 10;

      sorted.forEach(t => {
        if (y > 270) {
          doc.addPage();
          y = 20;
          doc.setFillColor(248,246,242); doc.rect(14, y, 182, 8, 'F');
          doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(107,114,128);
          doc.text('DATE', 16, y+5.5); doc.text('DESCRIPTION', 42, y+5.5);
          doc.text('CATEGORY', 110, y+5.5); doc.text('ACCOUNT', 148, y+5.5);
          doc.text('AMOUNT', 196, y+5.5, { align: 'right' });
          y += 10;
        }
        const cat  = categories.find(c=>c.id===t.category_id)?.name || '—';
        const acct = accounts.find(a=>a.id===t.account_id)?.name    || '—';
        const sign = t.type === 'income' ? '+' : '-';
        const amtColor = t.type === 'income' ? [37,107,66] : [192,57,43];

        doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(18,32,18);
        doc.text(t.date, 16, y);
        doc.text((t.description||'—').substring(0,28), 42, y);
        doc.setTextColor(107,114,128); doc.setFontSize(7.5);
        doc.text(cat.substring(0,18), 110, y);
        doc.text(acct.substring(0,16), 148, y);
        doc.setTextColor(...amtColor); doc.setFont('helvetica','bold'); doc.setFontSize(8);
        doc.text(`${sign}$${Number(t.amount).toFixed(2)}`, 196, y, { align: 'right' });
        y += 7;
      });

      // Totals footer
      y += 4;
      if (y > 265) { doc.addPage(); y = 20; }
      doc.setDrawColor(200,200,200); doc.line(14, y, 196, y); y += 6;
      doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(18,32,18);
      doc.text(`Total Income:`, 14, y);
      doc.setTextColor(37,107,66);
      doc.text(`$${totalIn.toFixed(2)}`, 80, y);
      doc.setTextColor(18,32,18);
      doc.text(`Total Expenses:`, 100, y);
      doc.setTextColor(192,57,43);
      doc.text(`$${totalOut.toFixed(2)}`, 170, y);
      y += 8;
      doc.setFillColor(18,32,18); doc.rect(14, y, 182, 10, 'F');
      doc.setTextColor(242,235,217);
      doc.text(`NET ${net >= 0 ? 'PROFIT' : 'LOSS'}`, 18, y + 7);
      doc.text(`${net >= 0 ? '' : '-'}$${Math.abs(net).toFixed(2)}`, 192, y + 7, { align: 'right' });

      pdfFooter(doc);
      doc.save(`money-moves-transactions-${period}.pdf`);
    }
  };

  // ── Init ─────────────────────────────────────────────────────────────────────
  loadAll();
})();
</script>
</body>
